<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Docentes · Liceo Moderno Suesca</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--red:#c0392b;--red-dark:#96281b;--navy:#1a237e;--navy-light:#283593;--orange:#ff5a00;--green:#27ae60;--yellow:#f39c12;--blue:#1565c0;--bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fb;--border:#e2e5ea;--text:#1a1d23;--text2:#5a6072;--text3:#9099a8;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:14px;--radius-sm:8px;--header-h:60px;--nav-h:66px;--font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;align-items:center;}
#app{width:100%;max-width:600px;min-height:100vh;background:var(--surface);display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.1);}
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1d23;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.success{background:var(--green);}#toast.error{background:var(--red);}
#loadingScreen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingScreen p{color:rgba(255,255,255,.7);margin-top:14px;font-size:13px;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:linear-gradient(160deg,var(--navy) 0%,var(--navy-light) 40%,var(--red) 100%);}
#loginScreen h1{color:#fff;font-size:22px;font-weight:800;text-align:center;line-height:1.3;}
.login-sub{color:rgba(255,255,255,.7);font-size:13px;margin-top:4px;text-align:center;}
.login-logo{width:90px;height:90px;background:#fff;border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.25);font-size:44px;}
.login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;margin-top:28px;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.fw{margin-bottom:14px;}
.fw label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.inp{width:100%;height:48px;border:2px solid var(--border);border-radius:var(--radius-sm);padding:0 14px;font-size:15px;font-family:var(--font);outline:none;transition:border .2s;background:var(--surface2);}
.inp:focus{border-color:var(--navy);background:#fff;}
.btn-login{width:100%;height:50px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .2s;margin-top:4px;}
.btn-login:hover{background:var(--navy-light);}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}
.login-err{color:var(--red);font-size:13px;font-weight:600;text-align:center;margin-top:10px;min-height:18px;}
#header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:none;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;}
.hdr-logo{width:34px;height:34px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-sub{font-size:11px;color:var(--text2);}
.hdr-period{background:var(--navy);color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
#content{flex:1;overflow-y:auto;padding-bottom:calc(var(--nav-h)+8px);}
.tab-pane{display:none;padding:16px;}
.tab-pane.active{display:block;}
#nav{height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:none;align-items:stretch;position:sticky;bottom:0;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;font-family:var(--font);color:var(--text3);transition:color .2s;padding:0;position:relative;}
.nav-item.active{color:var(--navy);}
.nav-item.active::after{content:'';position:absolute;top:0;left:15%;right:15%;height:2.5px;background:var(--navy);border-radius:0 0 3px 3px;}
.nav-icon{font-size:24px;line-height:1;}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.banner{border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.banner .bi{font-size:20px;flex-shrink:0;}
.banner .bm{font-size:13px;font-weight:600;}
.bwarn{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:1px solid #ffb74d;}.bwarn .bm{color:#e65100;}
.bok{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border:1px solid #81c784;}.bok .bm{color:#2e7d32;}
.binfo{background:linear-gradient(135deg,#e3f2fd,#bbdefb);border:1px solid #90caf9;}.binfo .bm{color:var(--blue);}
.bred{background:linear-gradient(135deg,#ffebee,#ffcdd2);border:1px solid #ef9a9a;}.bred .bm{color:var(--red-dark);}
.prog-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px;}
.prog-bar{height:100%;border-radius:3px;transition:width .4s;}
.pgr{background:var(--red);}.pgo{background:var(--orange);}.pgg{background:var(--green);}
.cpicker{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.cpill{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px 12px;cursor:pointer;font-family:var(--font);text-align:left;transition:all .2s;display:flex;flex-direction:column;gap:4px;}
.cpill:hover{border-color:var(--navy-light);background:#f5f7ff;}
.cpill.sel{border-color:var(--navy);background:#eef0ff;box-shadow:0 0 0 3px rgba(26,35,126,.1);}
.cpill-nm{font-size:14px;font-weight:800;color:var(--navy);}
.cpill-sub{font-size:11px;color:var(--text2);}
.srow{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;margin-bottom:8px;}
.srow:hover{border-color:var(--navy);background:#f5f7ff;transform:translateX(2px);}
.srow-icon{width:42px;height:42px;border-radius:10px;background:var(--navy);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0;}
.srow-info{flex:1;min-width:0;}
.srow-nm{font-size:14px;font-weight:700;margin-bottom:2px;}
.srow-sub{font-size:11px;color:var(--text2);}
.srow-grade{font-family:var(--mono);font-size:15px;font-weight:700;}
.bc{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.bcbtn{font-size:12px;color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);font-weight:600;font-family:var(--font);}
.bcbtn:hover{background:var(--border);}
.bcsep{color:var(--text3);font-size:12px;}
.bccur{font-size:12px;font-weight:700;color:var(--navy);}
.sg{display:grid;gap:8px;margin-bottom:12px;}
.sg2{grid-template-columns:1fr 1fr;}.sg3{grid-template-columns:1fr 1fr 1fr;}
.sw{display:flex;flex-direction:column;gap:4px;}
.sw label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.sw select,.sw input[type=date],.sw input[type=time]{height:44px;border:2px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;font-size:13px;font-weight:600;font-family:var(--font);background:var(--surface);outline:none;cursor:pointer;width:100%;}
.sw select:focus,.sw input:focus{border-color:var(--navy);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:44px;padding:0 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;transition:all .2s;}
.btnp{background:var(--navy);color:#fff;}.btnp:hover{background:var(--navy-light);}
.btns{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}.btns:hover{background:var(--border);}
.btnr{background:var(--red);color:#fff;}.btnr:hover{background:var(--red-dark);}
.btng{background:var(--green);color:#fff;}
.btnsm{height:34px;padding:0 12px;font-size:12px;border-radius:6px;}
.btnfull{width:100%;}
.btnic{width:34px;height:34px;padding:0;border-radius:6px;font-size:15px;}
.mode-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:14px;gap:3px;}
.mode-btn{flex:1;padding:8px;border:none;background:none;font-family:var(--font);font-size:12px;font-weight:700;color:var(--text2);border-radius:8px;cursor:pointer;transition:all .2s;}
.mode-btn.active{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(26,35,126,.3);}
.act-sel{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.act-chip{padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;}
.act-chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.act-chip.done{border-color:var(--green);color:var(--green);}
.act-chip.active.done{background:var(--green);color:#fff;border-color:var(--green);}
.grade-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;}
.grade-row:last-child{border-bottom:none;}
.gr-num{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:22px;flex-shrink:0;}
.gr-name{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gr-final{font-family:var(--mono);font-size:12px;font-weight:700;min-width:36px;text-align:right;flex-shrink:0;}
.gr-input{width:72px;height:44px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 4px;font-size:16px;font-family:var(--mono);font-weight:700;text-align:center;outline:none;transition:border .2s;background:var(--surface);flex-shrink:0;}
.gr-input:focus{border-color:var(--navy);background:#f0f4ff;}
.gr-input.changed{background:#fff9c4;border-color:var(--yellow);}
.gr-input.saved{background:#e8f5e9;border-color:var(--green);}
.cat-block{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.cat-hdr{background:var(--surface2);padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.cat-nm{font-size:13px;font-weight:700;flex:1;}
.cat-pct{font-family:var(--mono);font-size:12px;color:var(--text2);}
.cat-acts{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.act-tag{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:4px;}
.act-tag-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0;}
.add-act-inp{height:32px;border:1.5px dashed var(--border);border-radius:6px;padding:0 10px;font-size:12px;font-family:var(--font);outline:none;width:110px;}
.add-act-inp:focus{border-color:var(--navy);}
.att-s{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;}
.att-s:last-child{border-bottom:none;}
.att-nm{flex:1;font-size:13px;font-weight:600;}
.att-btns{display:flex;gap:4px;}
.att-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.aP{background:#e8f5e9;border-color:var(--green);box-shadow:0 0 0 2px rgba(39,174,96,.2);}
.aA{background:#ffebee;border-color:var(--red);box-shadow:0 0 0 2px rgba(192,57,43,.2);}
.aT{background:#fff3e0;border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,90,0,.2);}
.aE{background:#e3f2fd;border-color:var(--blue);box-shadow:0 0 0 2px rgba(21,101,192,.2);}
.ftabs{display:flex;gap:6px;margin-bottom:14px;}
.ftab{padding:7px 16px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;}
.ftab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.sc{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.sc-hdr{display:flex;align-items:center;padding:14px 16px;cursor:pointer;background:var(--surface);gap:10px;user-select:none;}
.sc-hdr:hover{background:var(--surface2);}
.sc-icon{font-size:20px;flex-shrink:0;}
.sc-title{flex:1;font-size:14px;font-weight:700;}
.sc-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.sc-chev{color:var(--text3);font-size:14px;transition:transform .2s;flex-shrink:0;}
.sc-chev.open{transform:rotate(180deg);}
.sc-body{display:none;padding:16px;border-top:1px solid var(--border);}
.sc-body.open{display:block;}
.pb{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;}
.pb-pend{background:#fff3e0;color:#e65100;}
.pb-ok{background:#e8f5e9;color:#2e7d32;}
.pb-rej{background:#ffebee;color:#c62828;}
.perm-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.perm-item:last-child{margin-bottom:0;}
.p-hero{background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:var(--radius);padding:22px 20px;margin-bottom:12px;text-align:center;color:#fff;}
.p-av{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 10px;border:3px solid rgba(255,255,255,.3);}
.p-nm{font-size:17px;font-weight:800;margin-bottom:3px;}
.p-id{font-size:12px;opacity:.8;}
.p-badges{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px;}
.pbadge{background:rgba(255,255,255,.15);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:700;}
.pbadge-warn{background:rgba(255,90,0,.3);}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.att-table{width:100%;border-collapse:collapse;font-size:11px;}
.att-table th{background:var(--surface2);padding:6px;border-bottom:2px solid var(--border);text-align:left;font-weight:700;white-space:nowrap;}
.att-table td{padding:5px 6px;border-bottom:1px solid var(--border);white-space:nowrap;}
.stitle{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.textarea{width:100%;border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:var(--font);outline:none;resize:vertical;min-height:70px;transition:border .2s;}
.textarea:focus{border-color:var(--navy);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
/* Student accordion */
.stu-row{display:flex;align-items:center;padding:11px 14px;cursor:pointer;gap:10px;border-bottom:1px solid var(--border);transition:background .15s;user-select:none;}
.stu-row:hover{background:var(--surface2);}
.stu-row.open{background:#eef0ff;}
.stu-row:last-of-type{border-bottom:none;}
.stu-chev{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.stu-chev.open{transform:rotate(180deg);}
.stu-detail{display:none;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
.stu-detail.open{display:block;}
.stu-search{width:100%;height:42px;border:2px solid var(--border);border-radius:var(--radius-sm);padding:0 14px 0 36px;font-size:14px;font-family:var(--font);outline:none;transition:border .2s;background:var(--surface);margin-bottom:10px;}
.stu-search:focus{border-color:var(--navy);}
.stu-search-wrap{position:relative;margin-bottom:10px;}
.stu-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
/* Grade chip */
.grade-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700;font-family:var(--mono);}
.gc-sup{background:#e8f5e9;color:#2e7d32;}
.gc-alt{background:#e3f2fd;color:#1565c0;}
.gc-bas{background:#fff8e1;color:#f57f17;}
.gc-low{background:#ffebee;color:#c62828;}
.gc-na{background:var(--border);color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:10px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;display:none;align-items:flex-end;justify-content:center;}
.overlay.active{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:24px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px;}
#footer{text-align:center;font-size:10px;color:var(--text3);padding:6px;border-top:1px solid var(--border);background:var(--surface);display:none;}
.cd-bar{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.cd-num{font-family:var(--mono);font-size:22px;font-weight:700;background:rgba(255,255,255,.15);border-radius:6px;padding:2px 10px;}
@media(min-width:600px){body{padding:20px 0;}#app{border-radius:20px;min-height:auto;height:92vh;}#content{height:calc(92vh - var(--header-h) - var(--nav-h));}}
</style>
</head>
<body>
<div id="loadingScreen"><div class="spinner"></div><p>Conectando...</p></div>
<div id="toast"></div>
<div id="app">
  <div id="loginScreen">
    <div class="login-logo">🏫</div>
    <h1>I.E.T. Liceo Moderno<br>Suesca</h1>
    <p class="login-sub">Portal Docentes · 2026</p>
    <div class="login-card">
      <div class="fw"><label>ID de Usuario</label><input type="text" id="loginUser" class="inp" placeholder="Ej: 20" autocomplete="username" style="text-transform:uppercase"></div>
      <div class="fw"><label>Clave</label><input type="password" id="loginPass" class="inp" placeholder="••••" autocomplete="current-password"></div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">Ingresar</button>
      <div class="login-err" id="loginError"></div>
    </div>
  </div>
  <div id="header">
    <div class="hdr-logo">🏫</div>
    <div class="hdr-info"><div class="hdr-name" id="hdrName">Docente</div><div class="hdr-sub">Liceo Moderno Suesca</div></div>
    <div class="hdr-period" id="hdrPeriod">P–</div>
    <button onclick="logout()" style="background:none;border:none;cursor:pointer;font-size:20px;padding:4px;flex-shrink:0;" title="Cerrar Sesión">🚪</button>
  </div>
  <div id="content">
    <div class="tab-pane active" id="tab-inicio"><div id="inicioContent"></div></div>
    <div class="tab-pane" id="tab-notas"><div id="notasContent"></div></div>
    <div class="tab-pane" id="tab-asistencia"><div id="asistenciaContent"></div></div>
    <div class="tab-pane" id="tab-perfil"><div id="perfilContent"></div></div>
  </div>
  <nav id="nav">
    <button class="nav-item active" data-tab="inicio"><span class="nav-icon">🏠</span><span class="nav-label">Inicio</span></button>

function calcSG(cats,vals,si,total){
  let fg=0,any=false;
  (cats||[]).forEach(cat=>{
    if(!cat.activities?.length)return;
    if(cat.type==="puntos"){const act=cat.activities[0];let mx=0;for(let i=0;i<total;i++){const v=vals[`${i}_${cat.id}_${act.id}`];if(v!==undefined&&v!==null&&v!==""){const pv=parseFloat(v);if(pv>mx)mx=pv;}}const mp=parseFloat(vals[`${si}_${cat.id}_${act.id}`]||0);if(vals[`${si}_${cat.id}_${act.id}`]!==undefined){any=true;fg+=(mx>0&&mp>0?Math.min((mp/mx)*4+1,5):1)*(cat.pct/100);}}
    else{let cs=0,cc=0;(cat.activities||[]).forEach(act=>{const v=vals[`${si}_${cat.id}_${act.id}`];if(v!==undefined&&v!==null&&v!==""){cs+=parseFloat(v);cc++;any=true;}});if(cc>0)fg+=(cs/cc)*(cat.pct/100);}
  });
  return any?Math.round(fg*100)/100:null;
}
function calcAll(gd,total){const{categories=[],gradeValues={}}=gd;return Array.from({length:total},(_,i)=>calcSG(categories,gradeValues,i,total));}
async function saveDB(){
  // 1. Guardar copia local siempre
  localStorage.setItem("docente_data",JSON.stringify(db));
  localStorage.setItem("docente_backup_"+new Date().toISOString().slice(0,10), JSON.stringify(db));
  if(!fbOk)return;
  // 2. Protección anti-borrado: nunca guardar si DB está vacía
  if(!(db.courses||[]).length&&!(db.teachers||[]).length){
    console.warn("Blocked empty DB save");return;
  }
  // 3. Protección: recargar datos frescos de Firebase y fusionar antes de guardar
  try{
    const fresh=await getDoc(doc(fDb,"system","data"));
    if(fresh.exists()){
      const fd=fresh.data();
      // Solo fusionar campos que NO son de docentes (para no perder datos de otros módulos)
      const merged=Object.assign({},fd,{
        grades:Object.assign({},fd.grades||{},db.grades||{}),
        attendance:Object.assign({},fd.attendance||{},db.attendance||{}),
        logros:Object.assign({},fd.logros||{},db.logros||{}),
        observations:Object.assign({},fd.observations||{},db.observations||{}),
        absences:[...new Map([...(fd.absences||[]),...(db.absences||[])].map(a=>[a.id,a])).values()],
        teachers:(db.teachers||[]).length>0?db.teachers:fd.teachers,
        _lastModified:Date.now(),
        _lastModifiedBy:"teacher_"+sess.tId
      });
      // Actualizar db local con datos fusionados
      db=merged;
      localStorage.setItem("docente_data",JSON.stringify(db));
      await setDoc(doc(fDb,"system","data"),JSON.parse(JSON.stringify(merged)));
    }
  }catch(e){
    console.error("Save error:",e);
    toast("Error al guardar — datos guardados localmente","error");
  }
}

window.toggleStu=function(si){

window.filterStudents=function(query){
  const q=query.toLowerCase().trim();
  const rows=document.querySelectorAll(".stu-row");
  const details=document.querySelectorAll(".stu-detail");
  rows.forEach((row,i)=>{
    const name=(row.querySelector("span:nth-child(2)")?.textContent||"").toLowerCase();
    const match=!q||name.includes(q);
    row.style.display=match?"":"none";
    if(details[i])details[i].style.display=match?details[i].classList.contains("open")?"block":"none":"none";
  });
  // Si hay exactamente un resultado, abrirlo automáticamente
  const visible=[...rows].filter(r=>r.style.display!=="none");

    const idx=visible[0].id.replace("sr_","");

};

  let totalG=[],bySC={};
  asgn.forEach(a=>{const key=gk(t.id,a.subjectId,a.courseId,period),gd=(db.grades||{})[key]||{},course=(db.courses||[]).find(c=>c.id===a.courseId);if(!course)return;const sts=actSts(course);if(gd.categories&&gd.gradeValues){const gs=calcAll(gd,sts.length).filter(g=>g!==null);totalG=[...totalG,...gs];const lb=`${sName(a.subjectId)} – ${cName(a.courseId)}`;bySC[lb]=[...(bySC[lb]||[]),...gs];}});
  const oAvg=totalG.length?(totalG.reduce((s,g)=>s+g,0)/totalG.length).toFixed(2):null;
  let html=`<div class="p-hero"><div class="p-av">${t.emoji||"👤"}</div><div class="p-nm">${t.name||""}</div><div class="p-id">ID: ${t.userId||"–"} · Periodo ${period}</div><div class="p-badges"><span class="pbadge">📚 ${asgn.length} materias</span>${isDir?`<span class="pbadge">🏫 Dir: ${dirC?.name||""}</span>`:""}${pendC>0?`<span class="pbadge pbadge-warn">⏳ ${pendC} permiso${pendC>1?"s":""} pendiente${pendC>1?"s":""}</span>`:""}</div></div>`;
  // Estado último permiso destacado
  if(lastP){const stM={pendiente:{cls:"bwarn",icon:"⏳",txt:"Pendiente de aprobación"},aprobado:{cls:"bok",icon:"✅",txt:"Aprobado por coordinación"},rechazado:{cls:"bred",icon:"❌",txt:"Rechazado"}};const st=stM[lastP.status]||stM.pendiente;html+=`<div class="banner ${st.cls}" style="flex-direction:column;align-items:flex-start;gap:4px"><div style="display:flex;align-items:center;gap:8px;width:100%"><span class="bi" style="font-size:24px">${st.icon}</span><div><div class="bm" style="font-size:14px">Último permiso: ${st.txt}</div><div style="font-size:12px;opacity:.85;margin-top:2px">${lastP.date} · ${lastP.timeFrom}–${lastP.timeTo} · ${lastP.reason}</div></div></div></div>`;}
  // Mis materias
  const bC={};asgn.forEach(a=>{if(!bC[a.courseId])bC[a.courseId]=[];bC[a.courseId].push(a.subjectId);});
  let mb=asgn.length?``:(`<p style="color:var(--text3);font-size:13px;text-align:center;padding:8px">Sin materias asignadas</p><div style="margin-top:12px;background:var(--surface2);border-radius:8px;padding:12px;font-size:12px;color:var(--text2)">💡 Para que te asignen una materia, solicítalo al administrador desde el panel principal del sistema.</div>`);
  if(asgn.length){sortCourses().filter(c=>bC[c.id]).forEach(course=>{mb+=`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">🏫 ${course.name}</div>`;bC[course.id].forEach(sId=>{const key=gk(t.id,sId,course.id,period),gd=(db.grades||{})[key]||{},sts=actSts(course),grades=gd.categories&&gd.gradeValues?calcAll(gd,sts.length):[],filled=grades.filter(g=>g!==null).length,pct=sts.length?Math.round(filled/sts.length*100):0;mb+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><div style="flex:1"><div style="font-size:13px;font-weight:700">${sName(sId)}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${filled}/${sts.length} calificados · ${pct}%</div><div class="prog-wrap"><div class="prog-bar ${pct>=70?"pgg":pct>=30?"pgo":"pgr"}" style="width:${pct}%"></div></div></div><button class="btn btnp btnsm" onclick="openSub('${sId}','${course.id}');switchTab('notas')">Calificar →</button></div>`;});mb+=`</div>`;});mb+=`<div style="background:var(--surface2);border-radius:8px;padding:10px;font-size:12px;color:var(--text2)">💡 Para agregar o cambiar materias, solicítalo al administrador del sistema.</div>`;}
  html+=SC("mats","📚","Mis Materias",`${asgn.length} asignaciones activas`,mb,true);
  // Rendimiento
  let rb=oAvg?`<div class="stat-row"><span style="font-size:13px;color:var(--text2)">Promedio general</span><span style="font-family:var(--mono);font-size:14px;font-weight:700;color:${gColor(oAvg)}">${oAvg}</span></div>`:`<p style="color:var(--text3);font-size:13px;text-align:center;padding:8px">Sin notas aún</p>`;
  if(oAvg)Object.entries(bySC).forEach(([nm,gs])=>{const avg=(gs.reduce((s,g)=>s+g,0)/gs.length).toFixed(2);rb+=`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px">${nm}</span><span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${gColor(avg)}">${avg}</span></div><div class="prog-wrap"><div class="prog-bar ${parseFloat(avg)>=3.6?"pgg":"pgr"}" style="width:${parseFloat(avg)/5*100}%"></div></div></div>`;});
  html+=SC("rend","📊","Mi Rendimiento",oAvg?`Promedio: ${oAvg}`:"Sin datos",rb,false);
  // Permisos
  let pb=`<div style="font-size:13px;font-weight:700;margin-bottom:10px">Solicitar Permiso</div><div class="fw"><label>Fecha</label><input class="inp" type="date" id="pD" value="${new Date().toISOString().slice(0,10)}"></div><div style="display:flex;gap:8px;margin-bottom:12px"><div class="sw" style="flex:1"><label>Desde</label><input class="inp" type="time" id="pF" value="08:00"></div><div class="sw" style="flex:1"><label>Hasta</label><input class="inp" type="time" id="pT" value="12:00"></div></div><div class="fw" style="margin-bottom:12px"><label>Motivo</label><textarea class="textarea" id="pR" placeholder="Describe el motivo"></textarea></div><button class="btn btnp btnfull" onclick="subPerm()" style="margin-bottom:16px">📤 Enviar Solicitud</button>`;
  if(myP.length){pb+=`<div style="font-size:13px;font-weight:700;margin-bottom:10px">Historial de Permisos</div>`;[...myP].reverse().forEach(p=>{const stM={pendiente:{cls:"pb-pend",icon:"⏳"},aprobado:{cls:"pb-ok",icon:"✅"},rechazado:{cls:"pb-rej",icon:"❌"}},st=stM[p.status]||stM.pendiente;pb+=`<div class="perm-item"><div><div style="font-size:13px;font-weight:700">${p.date}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">⏱ ${p.timeFrom}–${p.timeTo}</div><div style="font-size:12px;color:var(--text2)">📝 ${p.reason}</div></div><span class="pb ${st.cls}">${st.icon} ${p.status||"pendiente"}</span></div>`;});}
  else pb+=`<p style="color:var(--text3);font-size:13px;text-align:center;padding:8px">Sin solicitudes aún</p>`;
  const pSub=lastP?`Último: ${lastP.status==="pendiente"?"⏳ pendiente":lastP.status==="aprobado"?"✅ aprobado":"❌ rechazado"}`:"Sin solicitudes";
  html+=SC("perms","📝","Permisos",pSub,pb,false);
  // Observaciones (director)
  if(isDir&&dirC){const obsK=`${dirC.id}_${period}`;if(!db.observations)db.observations={};const obs=db.observations[obsK]||{},sts=actSts(dirC);let ob=``;sts.forEach((s,si)=>{const nm=s.name||"";ob+=`<div style="margin-bottom:12px"><label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px">${String(si+1).padStart(2,"0")}. ${nm}</label><textarea class="textarea" rows="2" placeholder="Observación para boletín..." oninput="upObs('${obsK}',${si},this.value)">${obs[String(si)]||""}</textarea></div>`;});ob+=`<button class="btn btnp btnfull" onclick="saveDB().then(()=>toast('Guardado ✅','success'))">💾 Guardar</button>`;html+=SC("obs","📋","Observaciones del Curso",dirC.name,ob,false);}
  // Seguridad
  const sb=`<div class="fw"><label>Clave Actual</label><input class="inp" type="password" id="oK" placeholder="••••"></div><div class="fw"><label>Nueva Clave</label><input class="inp" type="password" id="nK" placeholder="••••"></div><div class="fw" style="margin-bottom:12px"><label>Confirmar</label><input class="inp" type="password" id="cK" placeholder="••••"></div><button class="btn btnp btnfull" onclick="chKey()">🔑 Cambiar Clave</button>`;
  html+=SC("sec","🔒","Seguridad","Cambiar clave de acceso",sb,false);
  html+=`<button class="btn btnr btnfull" style="margin-top:4px;margin-bottom:20px" onclick="logout()">🚪 Cerrar Sesión</button>`;
  el.innerHTML=html;
}
window.chKey=function(){const old=$("oK").value,nw=$("nK").value,cf=$("cK").value;if(!old||!nw||!cf){toast("Completa los campos","error");return;}if(old!==sess.t.key){toast("Clave incorrecta","error");return;}if(nw!==cf){toast("Las claves no coinciden","error");return;}if(nw.length<4){toast("Mínimo 4 caracteres","error");return;}const ti=(db.teachers||[]).findIndex(t=>t.id===sess.tId);if(ti<0)return;db.teachers[ti].key=nw;sess.t.key=nw;saveDB().then(()=>{toast("Clave actualizada ✅","success");renderPerfil();});};
window.subPerm=function(){const date=$("pD").value,from=$("pF").value,to=$("pT").value,reason=($("pR").value||"").trim();if(!date||!from||!to||!reason){toast("Completa los campos","error");return;}if(!db.absences)db.absences=[];db.absences.push({id:mkId(),teacherId:sess.tId,date,timeFrom:from,timeTo:to,reason,status:"pendiente"});saveDB().then(()=>{toast("Solicitud enviada ✅","success");renderPerfil();});};
window.upObs=function(k,si,v){if(!db.observations)db.observations={};if(!db.observations[k])db.observations[k]={};db.observations[k][String(si)]=v;sched();};
window.logout=function(){if(!confirm("¿Cerrar sesión?"))return;localStorage.removeItem("lms_session");location.reload();};
window.openModal=function(){$("modalOverlay").classList.add("active");};
window.closeModal=function(){$("modalOverlay").classList.remove("active");};
$("modalOverlay").addEventListener("click",e=>{if(e.target===$("modalOverlay"))closeModal();});
async function init(){
  $("versionLabel").textContent=APP_VERSION;
  ["loginUser","loginPass"].forEach(id=>{$(id)?.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});});
  const s=localStorage.getItem("lms_session");
  if(s){
    try{
      const p=JSON.parse(s);
      const loaded=await loadDB();
      if(loaded){
        const t=(db.teachers||[]).find(t=>t.id===p.teacherId);
        if(t&&t.userId){
          // Validar que el docente aún existe y tiene userId válido
          sess.tId=t.id;sess.t=t;
          $("loginScreen").style.display="none";
          $("loadingScreen").style.display="none";
          startApp();return;
        }else{
          // Sesión inválida - limpiar
          localStorage.removeItem("lms_session");
        }
      }
    }catch(e){
      localStorage.removeItem("lms_session");
    }
  }
  $("loadingScreen").style.display="none";
}
init();
// Advertir si hay cambios sin guardar al cerrar la página
let hasUnsaved=false;
const origSched=window.sched;
window.sched=function(){hasUnsaved=true;stimer=setTimeout(()=>{saveDB();hasUnsaved=false;},900);};
window.addEventListener("beforeunload",e=>{
  if(hasUnsaved){e.preventDefault();e.returnValue="Hay cambios sin guardar. ¿Salir de todas formas?";}
});
</script>
</body>
