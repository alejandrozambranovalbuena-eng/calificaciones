<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Docentes · Liceo Moderno Suesca</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
:root{--red:#c0392b;--red-dark:#96281b;--navy:#1a237e;--navy-light:#283593;--orange:#ff5a00;--green:#27ae60;--yellow:#f39c12;--blue:#1565c0;--bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fb;--border:#e2e5ea;--text:#1a1d23;--text2:#5a6072;--text3:#9099a8;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:14px;--radius-sm:8px;--header-h:60px;--nav-h:66px;--font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;align-items:center;}
#app{width:100%;max-width:600px;min-height:100vh;background:var(--surface);display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,.1);}
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1d23;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.success{background:var(--green);}#toast.error{background:var(--red);}
#loadingScreen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingScreen p{color:rgba(255,255,255,.7);margin-top:14px;font-size:13px;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:linear-gradient(160deg,var(--navy) 0%,var(--navy-light) 40%,var(--red) 100%);}
#loginScreen h1{color:#fff;font-size:22px;font-weight:800;text-align:center;line-height:1.3;}
.login-sub{color:rgba(255,255,255,.7);font-size:13px;margin-top:4px;text-align:center;}
.login-logo{width:90px;height:90px;background:#fff;border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.25);font-size:44px;}
.login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;margin-top:28px;box-shadow:0 8px 32px rgba(0,0,0,.12);}
.fw{margin-bottom:14px;}
.fw label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.inp{width:100%;height:48px;border:2px solid var(--border);border-radius:var(--radius-sm);padding:0 14px;font-size:15px;font-family:var(--font);outline:none;transition:border .2s;background:var(--surface2);}
.inp:focus{border-color:var(--navy);background:#fff;}
.btn-login{width:100%;height:50px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .2s;margin-top:4px;}
.btn-login:hover{background:var(--navy-light);}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}
.login-err{color:var(--red);font-size:13px;font-weight:600;text-align:center;margin-top:10px;min-height:18px;}
#header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:none;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;}
.hdr-logo{width:34px;height:34px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-sub{font-size:11px;color:var(--text2);}
.hdr-period{background:var(--navy);color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
#content{flex:1;overflow-y:auto;padding-bottom:calc(var(--nav-h)+8px);}
.tab-pane{display:none;padding:16px;}
.tab-pane.active{display:block;}
#nav{height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:none;align-items:stretch;position:sticky;bottom:0;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;font-family:var(--font);color:var(--text3);transition:color .2s;padding:0;position:relative;}
.nav-item.active{color:var(--navy);}
.nav-item.active::after{content:'';position:absolute;top:0;left:15%;right:15%;height:2.5px;background:var(--navy);border-radius:0 0 3px 3px;}
.nav-icon{font-size:24px;line-height:1;}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.banner{border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.banner .bi{font-size:20px;flex-shrink:0;}
.banner .bm{font-size:13px;font-weight:600;}
.bwarn{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:1px solid #ffb74d;}.bwarn .bm{color:#e65100;}
.bok{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border:1px solid #81c784;}.bok .bm{color:#2e7d32;}
.binfo{background:linear-gradient(135deg,#e3f2fd,#bbdefb);border:1px solid #90caf9;}.binfo .bm{color:var(--blue);}
.bred{background:linear-gradient(135deg,#ffebee,#ffcdd2);border:1px solid #ef9a9a;}.bred .bm{color:var(--red-dark);}
.prog-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px;}
.prog-bar{height:100%;border-radius:3px;transition:width .4s;}
.pgr{background:var(--red);}.pgo{background:var(--orange);}.pgg{background:var(--green);}
.cpicker{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.cpill{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px 12px;cursor:pointer;font-family:var(--font);text-align:left;transition:all .2s;display:flex;flex-direction:column;gap:4px;}
.cpill:hover{border-color:var(--navy-light);background:#f5f7ff;}
.cpill.sel{border-color:var(--navy);background:#eef0ff;box-shadow:0 0 0 3px rgba(26,35,126,.1);}
.cpill-nm{font-size:14px;font-weight:800;color:var(--navy);}
.cpill-sub{font-size:11px;color:var(--text2);}
.srow{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;margin-bottom:8px;}
.srow:hover{border-color:var(--navy);background:#f5f7ff;transform:translateX(2px);}
.srow-icon{width:42px;height:42px;border-radius:10px;background:var(--navy);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0;}
.srow-info{flex:1;min-width:0;}
.srow-nm{font-size:14px;font-weight:700;margin-bottom:2px;}
.srow-sub{font-size:11px;color:var(--text2);}
.srow-grade{font-family:var(--mono);font-size:15px;font-weight:700;}
.bc{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.bcbtn{font-size:12px;color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);font-weight:600;font-family:var(--font);}
.bcbtn:hover{background:var(--border);}
.bcsep{color:var(--text3);font-size:12px;}
.bccur{font-size:12px;font-weight:700;color:var(--navy);}
.sg{display:grid;gap:8px;margin-bottom:12px;}
.sg2{grid-template-columns:1fr 1fr;}.sg3{grid-template-columns:1fr 1fr 1fr;}
.sw{display:flex;flex-direction:column;gap:4px;}
.sw label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.sw select,.sw input[type=date],.sw input[type=time]{height:44px;border:2px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;font-size:13px;font-weight:600;font-family:var(--font);background:var(--surface);outline:none;cursor:pointer;width:100%;}
.sw select:focus,.sw input:focus{border-color:var(--navy);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:44px;padding:0 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;transition:all .2s;}
.btnp{background:var(--navy);color:#fff;}.btnp:hover{background:var(--navy-light);}
.btns{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}.btns:hover{background:var(--border);}
.btnr{background:var(--red);color:#fff;}.btnr:hover{background:var(--red-dark);}
.btng{background:var(--green);color:#fff;}
.btnsm{height:34px;padding:0 12px;font-size:12px;border-radius:6px;}
.btnfull{width:100%;}
.btnic{width:34px;height:34px;padding:0;border-radius:6px;font-size:15px;}
.mode-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:14px;gap:3px;}
.mode-btn{flex:1;padding:8px;border:none;background:none;font-family:var(--font);font-size:12px;font-weight:700;color:var(--text2);border-radius:8px;cursor:pointer;transition:all .2s;}
.mode-btn.active{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(26,35,126,.3);}
.act-sel{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.act-chip{padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;}
.act-chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.act-chip.done{border-color:var(--green);color:var(--green);}
.act-chip.active.done{background:var(--green);color:#fff;border-color:var(--green);}
.grade-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;}
.grade-row:last-child{border-bottom:none;}
.gr-num{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:22px;flex-shrink:0;}
.gr-name{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gr-final{font-family:var(--mono);font-size:12px;font-weight:700;min-width:36px;text-align:right;flex-shrink:0;}
.gr-input{width:72px;height:44px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 4px;font-size:16px;font-family:var(--mono);font-weight:700;text-align:center;outline:none;transition:border .2s;background:var(--surface);flex-shrink:0;}
.gr-input:focus{border-color:var(--navy);background:#f0f4ff;}
.gr-input.changed{background:#fff9c4;border-color:var(--yellow);}
.gr-input.saved{background:#e8f5e9;border-color:var(--green);}
.cat-block{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.cat-hdr{background:var(--surface2);padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.cat-nm{font-size:13px;font-weight:700;flex:1;}
.cat-pct{font-family:var(--mono);font-size:12px;color:var(--text2);}
.cat-acts{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.act-tag{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:4px;}
.act-tag-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0;}
.add-act-inp{height:32px;border:1.5px dashed var(--border);border-radius:6px;padding:0 10px;font-size:12px;font-family:var(--font);outline:none;width:110px;}
.add-act-inp:focus{border-color:var(--navy);}
.att-s{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;}
.att-s:last-child{border-bottom:none;}
.att-nm{flex:1;font-size:13px;font-weight:600;}
.att-btns{display:flex;gap:4px;}
.att-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.aP{background:#e8f5e9;border-color:var(--green);box-shadow:0 0 0 2px rgba(39,174,96,.2);}
.aA{background:#ffebee;border-color:var(--red);box-shadow:0 0 0 2px rgba(192,57,43,.2);}
.aT{background:#fff3e0;border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,90,0,.2);}
.aE{background:#e3f2fd;border-color:var(--blue);box-shadow:0 0 0 2px rgba(21,101,192,.2);}
.ftabs{display:flex;gap:6px;margin-bottom:14px;}
.ftab{padding:7px 16px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;}
.ftab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.sc{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.sc-hdr{display:flex;align-items:center;padding:14px 16px;cursor:pointer;background:var(--surface);gap:10px;user-select:none;}
.sc-hdr:hover{background:var(--surface2);}
.sc-icon{font-size:20px;flex-shrink:0;}
.sc-title{flex:1;font-size:14px;font-weight:700;}
.sc-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.sc-chev{color:var(--text3);font-size:14px;transition:transform .2s;flex-shrink:0;}
.sc-chev.open{transform:rotate(180deg);}
.sc-body{display:none;padding:16px;border-top:1px solid var(--border);}
.sc-body.open{display:block;}
.pb{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;}
.pb-pend{background:#fff3e0;color:#e65100;}
.pb-ok{background:#e8f5e9;color:#2e7d32;}
.pb-rej{background:#ffebee;color:#c62828;}
.perm-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.perm-item:last-child{margin-bottom:0;}
.p-hero{background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:var(--radius);padding:22px 20px;margin-bottom:12px;text-align:center;color:#fff;}
.p-av{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 10px;border:3px solid rgba(255,255,255,.3);}
.p-nm{font-size:17px;font-weight:800;margin-bottom:3px;}
.p-id{font-size:12px;opacity:.8;}
.p-badges{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:10px;}
.pbadge{background:rgba(255,255,255,.15);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:700;}
.pbadge-warn{background:rgba(255,90,0,.3);}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.att-table{width:100%;border-collapse:collapse;font-size:11px;}
.att-table th{background:var(--surface2);padding:6px;border-bottom:2px solid var(--border);text-align:left;font-weight:700;white-space:nowrap;}
.att-table td{padding:5px 6px;border-bottom:1px solid var(--border);white-space:nowrap;}
.stitle{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.textarea{width:100%;border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:var(--font);outline:none;resize:vertical;min-height:70px;transition:border .2s;}
.textarea:focus{border-color:var(--navy);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}

/* ANNOUNCEMENTS */
.announce-popup{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;}
.announce-box{background:var(--surface);border-radius:var(--radius);width:100%;max-width:520px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popIn .3s ease;}
@keyframes popIn{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.announce-box-hdr{padding:16px 20px;display:flex;align-items:center;gap:10px;}
.announce-box-hdr.urgent{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;}
.announce-box-hdr.reminder{background:linear-gradient(135deg,var(--orange),#e65100);color:#fff;}
.announce-box-hdr.normal{background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;}
.announce-box-icon{font-size:28px;flex-shrink:0;}
.announce-box-title{font-size:16px;font-weight:800;flex:1;}
.announce-box-body{padding:20px;}
.announce-box-text{font-size:14px;line-height:1.7;color:var(--text);white-space:pre-wrap;}
.announce-box-meta{font-size:11px;color:var(--text3);margin-top:12px;display:flex;align-items:center;gap:6px;}
.announce-banner{border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;position:relative;}
.announce-banner.urgent{background:linear-gradient(135deg,#ffebee,#ffcdd2);border:1px solid #ef9a9a;}
.announce-banner.reminder{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:1px solid #ffb74d;}
.announce-banner.normal{background:linear-gradient(135deg,#e3f2fd,#bbdefb);border:1px solid #90caf9;}
.announce-banner-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.announce-banner-content{flex:1;min-width:0;}
.announce-banner-title{font-size:13px;font-weight:800;margin-bottom:3px;}
.announce-banner.urgent .announce-banner-title{color:var(--red-dark);}
.announce-banner.reminder .announce-banner-title{color:#e65100;}
.announce-banner.normal .announce-banner-title{color:var(--blue);}
.announce-banner-text{font-size:12px;line-height:1.6;color:var(--text2);}
.announce-banner-meta{font-size:11px;color:var(--text3);margin-top:4px;}
.announce-close{position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:2px 6px;border-radius:4px;}
.announce-close:hover{background:rgba(0,0,0,.08);}
.logro-block{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;}
.logro-hdr{background:var(--surface2);padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.logro-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text2);}
.logro-body{padding:14px;}
.guide-toggle{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:13px;font-weight:700;margin-bottom:8px;font-family:var(--font);}
.guide-body{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;font-size:12px;line-height:1.8;color:var(--text2);display:none;}
.guide-body.open{display:block;}
/* Student accordion */
.stu-row{display:flex;align-items:center;padding:11px 14px;cursor:pointer;gap:10px;border-bottom:1px solid var(--border);transition:background .15s;user-select:none;}
.stu-row:hover{background:var(--surface2);}
.stu-row.open{background:#eef0ff;}
.stu-row:last-of-type{border-bottom:none;}
.stu-chev{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.stu-chev.open{transform:rotate(180deg);}
.stu-detail{display:none;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
.stu-detail.open{display:block;}
.stu-search{width:100%;height:42px;border:2px solid var(--border);border-radius:var(--radius-sm);padding:0 14px 0 36px;font-size:14px;font-family:var(--font);outline:none;transition:border .2s;background:var(--surface);margin-bottom:10px;}
.stu-search:focus{border-color:var(--navy);}
.stu-search-wrap{position:relative;margin-bottom:10px;}
.stu-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}

.cat-sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.act-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
.act-card{border-radius:10px;padding:12px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:2px solid transparent;transition:all .15s;font-family:var(--font);width:100%;min-height:80px;}

<script type="module">
import{initializeApp,getApp,getApps}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const APP_VERSION="v2.8.0";
const COURSE_COLORS=[
  {bg:"#EEF0FF",border:"#3949AB",text:"#1A237E",dot:"#3949AB"},{bg:"#E8F5E9",border:"#2E7D32",text:"#1B5E20",dot:"#2E7D32"},
  {bg:"#FFF3E0",border:"#E65100",text:"#BF360C",dot:"#E65100"},{bg:"#FCE4EC",border:"#C2185B",text:"#880E4F",dot:"#C2185B"},
  {bg:"#E3F2FD",border:"#1565C0",text:"#0D47A1",dot:"#1565C0"},{bg:"#F3E5F5",border:"#7B1FA2",text:"#4A148C",dot:"#7B1FA2"},
  {bg:"#E0F2F1",border:"#00695C",text:"#004D40",dot:"#00695C"},{bg:"#FFF8E1",border:"#F57F17",text:"#E65100",dot:"#F57F17"},
];
const CAT_COLORS=[
  {bg:"#E3F2FD",border:"#1565C0",text:"#0D47A1",dot:"#1565C0"},{bg:"#E8F5E9",border:"#2E7D32",text:"#1B5E20",dot:"#2E7D32"},
  {bg:"#F3E5F5",border:"#7B1FA2",text:"#4A148C",dot:"#7B1FA2"},{bg:"#FFF3E0",border:"#E65100",text:"#BF360C",dot:"#E65100"},
  {bg:"#E0F2F1",border:"#00695C",text:"#004D40",dot:"#00695C"},{bg:"#FCE4EC",border:"#C2185B",text:"#880E4F",dot:"#C2185B"},
  {bg:"#EDE7F6",border:"#512DA8",text:"#311B92",dot:"#512DA8"},{bg:"#FFF8E1",border:"#F57F17",text:"#E65100",dot:"#F57F17"},
];
function hashColor(id,arr){let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))%arr.length;return arr[h];}
function getCourseColor(id){return hashColor(id,COURSE_COLORS);}
function getCatColor(idx){return CAT_COLORS[idx%CAT_COLORS.length];}
const FC={apiKey:"AIzaSyBoQmO-jPv9b5VnKpoBA9g_GhIdHC9q7I0",authDomain:"liceo-suesca-notas.firebaseapp.com",projectId:"liceo-suesca-notas",storageBucket:"liceo-suesca-notas.firebasestorage.app",messagingSenderId:"1000406739498",appId:"1:1000406739498:web:0a4f75c4e7e8c03f9a4e2a"};
let fDb,fbOk=false;
try{
  // getApps() evita el error "already initialized"
  const fbApp=getApps().length>0?getApp():initializeApp(FC);
  fDb=getFirestore(fbApp);
  fbOk=true;
}catch(e){ console.error("Firebase init error:",e); }
let db={courses:[],teachers:[],subjects:[],grades:{},attendance:{},logros:{},absences:[],observations:{},schoolInfo:{}};
let sess={tId:null,t:null};
let stimer=null,failC=parseInt(localStorage.getItem("lms_fail")||"0"),lockU=parseInt(localStorage.getItem("lms_lock")||"0");
let iState={cId:null},nState={sId:null,cId:null,per:null,mode:"act",catId:null,actId:null,catsOpen:false},lState={sId:null,cId:null,per:null},attDate=new Date().toISOString().slice(0,10),attData={},attFil="dia";
const $=id=>document.getElementById(id);
function toast(m,t="",d=2500){const el=$("toast");el.textContent=m;el.className="show "+t;clearTimeout(el._t);el._t=setTimeout(()=>{el.className=""},d);}
function sortCourses(){return[...(db.courses||[])].sort((a,b)=>(a.order||0)-(b.order||0));}
function actSts(c){return(c.students||[]).filter(s=>s.status!=="retirado");}
function sName(id){if(!id)return"–";const s=(db.subjects||[]).find(x=>x.id===id);return s?s.name:`(${id.slice(0,5)})`;}
function cName(id){if(!id)return"–";const c=(db.courses||[]).find(x=>x.id===id);return c?c.name:`(${id.slice(0,5)})`;}
function validAsgn(t){return(t.assignments||[]).filter(a=>(db.courses||[]).some(c=>c.id===a.courseId)&&(db.subjects||[]).some(s=>s.id===a.subjectId));}
function gColor(g){if(g===null||g===undefined)return"var(--text3)";const v=parseFloat(g);if(v>=3.6)return"var(--green)";if(v>=3.0)return"var(--yellow)";return"var(--red)";}
function dLeft(){const i=db.schoolInfo||{};if(!i.deadline)return null;return Math.ceil((new Date(i.deadline+(i.deadlineTime?"T"+i.deadlineTime:""))-new Date())/864e5);}
function perLocked(p){const i=db.schoolInfo||{};if(String(p)!==String(i.activePeriod||"1"))return true;if(i.deadline&&new Date()>new Date(i.deadline+(i.deadlineTime?"T"+i.deadlineTime:"")))return true;return false;}
function isSubjectLocked(subjectId){return((db.schoolInfo||{}).lockedSubjects||[]).includes(subjectId);}
function gk(tId,sId,cId,p){return`${tId}_${sId}__${cId}_${p}`;}
function mkId(){return Math.random().toString(36).slice(2,8);}

function calcSG(cats,vals,si,total){
  let fg=0,any=false;
  (cats||[]).forEach(cat=>{
    if(!cat.activities?.length)return;
    if(cat.type==="puntos"){const act=cat.activities[0];let mx=0;for(let i=0;i<total;i++){const v=vals[`${i}_${cat.id}_${act.id}`];if(v!==undefined&&v!==null&&v!==""){const pv=parseFloat(v);if(pv>mx)mx=pv;}}const mp=parseFloat(vals[`${si}_${cat.id}_${act.id}`]||0);if(vals[`${si}_${cat.id}_${act.id}`]!==undefined){any=true;fg+=(mx>0&&mp>0?Math.min((mp/mx)*4+1,5):1)*(cat.pct/100);}}
    else{let cs=0,cc=0;(cat.activities||[]).forEach(act=>{const v=vals[`${si}_${cat.id}_${act.id}`];if(v!==undefined&&v!==null&&v!==""){cs+=parseFloat(v);cc++;any=true;}});if(cc>0)fg+=(cs/cc)*(cat.pct/100);}
  });
  return any?Math.round(fg*100)/100:null;
}
// toast, checkAnnouncements, renderAnnounceBanners are used internally
// window.X assigned after all functions are defined
function calcAll(gd,total){const{categories=[],gradeValues={}}=gd;return Array.from({length:total},(_,i)=>calcSG(categories,gradeValues,i,total));}
async function saveDB(){
  // 1. SIEMPRE guardar local primero — NUNCA fallar aquí
  try{
    db._savedAt=Date.now();
    db._savedBy="teacher_"+sess.tId;
    const dbStr=JSON.stringify(db);
    localStorage.setItem("docente_data",dbStr);
    localStorage.setItem("isc_v2",dbStr);
    // Backup del día actual
    const today=new Date().toISOString().split("T")[0];
    localStorage.setItem("docente_backup_"+today,dbStr);
  }catch(le){console.error("Local save error:",le);}

  // 2. Intentar guardar en Firebase con reintentos
  if(!fbOk||!(db.courses||[]).length&&!(db.teachers||[]).length)return;
  let saved=false;
  for(let attempt=1;attempt<=3;attempt++){
    try{
      db._lastModified=Date.now();
      db._lastModifiedBy="teacher_"+sess.tId;
      db._pendingSync=false;
      // ARQUITECTURA SEPARADA: cada docente solo escribe sus propias notas
      const _myG={};
      Object.keys(db.grades||{}).forEach(k=>{if(k.startsWith(sess.tId))_myG[k]=db.grades[k];});
      // 1. Documento propio del docente: solo SUS grades
      await setDoc(doc(fDb,"grades",sess.tId),{
        teacherId:sess.tId,teacherName:sess.t&&sess.t.name||"",
        updatedAt:Date.now(),grades:_myG,
        totalNotes:Object.values(_myG).reduce((s,g)=>s+Object.keys(g&&g.gradeValues||{}).length,0),
        lastSavedAt:new Date().toISOString()
      });
      // 2. system/data: estructura sin grades (nadie puede borrar notas ajenas)
      const _dbSave=Object.assign({},db);delete _dbSave.grades;
      await setDoc(doc(fDb,"system","data"),JSON.parse(JSON.stringify(_dbSave)));
      localStorage.setItem("isc_v2",JSON.stringify(db));
      localStorage.setItem("docente_data",JSON.stringify(db));
      saved=true;
      break;
    }catch(e){
      console.warn("Save attempt "+attempt+" failed:",e.message);
      if(attempt<3){await new Promise(r=>setTimeout(r,1500*attempt));}
    }
  }
  if(!saved){
    // Marcar como pendiente para próxima conexión
    db._pendingSync=true;
    localStorage.setItem("isc_v2",JSON.stringify(db));
    localStorage.setItem("docente_data",JSON.stringify(db));
    localStorage.setItem("pendingSync","1");
    toast("⚠️ Sin internet — notas guardadas localmente. Se subirán al reconectarse.","");
  }
}
window.saveDB=saveDB; // expose to HTML onclick

async function loadDB(){
  // Primero cargar caché local (instantáneo)
  const keys=["isc_v2","docente_data","lms_db"];
  let cacheLoaded=false;
  for(const k of keys){
    const l=localStorage.getItem(k);
    if(l)try{
      const parsed=JSON.parse(l);
      if((parsed.courses||[]).length>0||(parsed.teachers||[]).length>0){
        db=parsed; cacheLoaded=true;
        console.log("Cache loaded from:",k);
        break;
      }
    }catch(e){}
  }
  // Luego intentar Firebase
  try{
    if(fbOk){
      const sn=await getDoc(doc(fDb,"system","data"));
      if(sn.exists()){
        const fresh=sn.data();
        if(cacheLoaded){
          // Backup diario antes de fusionar
          const today=new Date().toISOString().split("T")[0];
          const bk="docente_backup_"+today;
          if(!localStorage.getItem(bk)&&Object.keys(db.grades||{}).length>0){
            localStorage.setItem(bk,JSON.stringify(db));
          }
          // Fusionar: preservar datos locales
          mergeWithFresh(fresh);
        }else{
          // Primera carga: fusionar para no perder datos locales
          mergeWithFresh(fresh);
        }
        return true;
      }
    }
  }catch(e){
    console.warn("Firebase load failed:",e.message);
  }
  return cacheLoaded;
}
window.doLogin=async function(){
  const now=Date.now();if(now<lockU){$("loginError").textContent=`Bloqueado ${Math.ceil((lockU-now)/1000)}s`;return;}
  const uid=$("loginUser").value.trim().replace(/\s+/g,"").toUpperCase(),pass=$("loginPass").value;
  if(!uid||!pass){$("loginError").textContent="Completa todos los campos";return;}
  const btn=$("loginBtn");btn.disabled=true;btn.textContent="Verificando...";
  try{const sn=await getDoc(doc(fDb,"system","data"));if(sn.exists()){
      const _fresh=sn.data();
      if((db.courses||[]).length>0){mergeWithFresh(_fresh);}
      else{mergeWithFresh(_fresh);}
      // Recuperar backup del docente si hay notas faltantes
      try{
        const _today=new Date().toISOString().split("T")[0];
        const _yday=new Date(Date.now()-86400000).toISOString().split("T")[0];
        for(const _d of [_today,_yday]){
          const _bRef=doc(fDb,"teacher_backups",sess.tId+"_"+_d);
          const _bSnap=await getDoc(_bRef);
          if(_bSnap.exists()){
            const _bG=_bSnap.data().grades||{};
            let _restored=false;
            Object.keys(_bG).forEach(_k=>{
              const _bc=Object.keys(_bG[_k]?.gradeValues||{}).length;
              const _lc=Object.keys((db.grades||{})[_k]?.gradeValues||{}).length;
              if(_bc>_lc){
                if(!db.grades)db.grades={};
                db.grades[_k]=Object.assign({},_bG[_k],(db.grades[_k]||{}),{gradeValues:Object.assign({},_bG[_k].gradeValues||{},(db.grades[_k]?.gradeValues||{}))});
                _restored=true;
              }
            });
            if(_restored){localStorage.setItem("isc_v2",JSON.stringify(db));localStorage.setItem("docente_data",JSON.stringify(db));console.log("Restaurado desde backup",_d);}
            break;
          }
        }
      }catch(_be){console.warn("Backup recovery failed:",_be);}
    }
    const t=(db.teachers||[]).find(t=>(t.userId||"").replace(/\s+/g,"").toUpperCase()===uid&&t.key===pass);
    if(t){failC=0;localStorage.setItem("lms_fail","0");sess.tId=t.id;sess.t=t;
      // Guardar sesión en múltiples claves para compatibilidad
      const sessData=JSON.stringify({teacherId:t.id,tId:t.id});
      localStorage.setItem("lms_session",sessData);
      localStorage.setItem("session",sessData);
      startApp();}
    else{failC++;localStorage.setItem("lms_fail",String(failC));if(failC>=3){const u=Date.now()+3e5;localStorage.setItem("lms_lock",String(u));lockU=u;failC=0;localStorage.setItem("lms_fail","0");$("loginError").textContent="3 intentos. Bloqueado 5 min.";}else $("loginError").textContent=`ID o clave incorrectos (${failC}/3)`;}
  }catch(e){$("loginError").textContent="Error de conexión.";}
  btn.disabled=false;btn.textContent="Ingresar";
};
function startApp(){
  $("loginScreen").style.display="none";$("header").style.display="flex";$("nav").style.display="flex";$("footer").style.display="block";

window.toggleStu=function(si){
  const row=document.getElementById("sr_"+si);
  const detail=document.getElementById("sd_"+si);
  const chev=document.getElementById("sch_"+si);
  if(!detail)return;
  const isOpen=detail.classList.contains("open");
  // Cerrar todos primero
  document.querySelectorAll(".stu-detail.open").forEach(d=>d.classList.remove("open"));
  document.querySelectorAll(".stu-row.open").forEach(r=>r.classList.remove("open"));
  document.querySelectorAll(".stu-chev.open").forEach(c=>c.classList.remove("open"));
  // Abrir el seleccionado si estaba cerrado
  if(!isOpen){
    detail.classList.add("open");
    row.classList.add("open");
    if(chev)chev.classList.add("open");
    // Scroll suave al estudiante
    setTimeout(()=>row.scrollIntoView({behavior:"smooth",block:"nearest"}),50);
  }
};

window.filterStudents=function(query){
  const q=query.toLowerCase().trim();
  const rows=document.querySelectorAll(".stu-row");
  const details=document.querySelectorAll(".stu-detail");
  rows.forEach((row,i)=>{
    const name=(row.querySelector("span:nth-child(2)")?.textContent||"").toLowerCase();
    const match=!q||name.includes(q);
    row.style.display=match?"":"none";
    if(details[i])details[i].style.display=match?details[i].classList.contains("open")?"block":"none":"none";
  });
  // Si hay exactamente un resultado, abrirlo automáticamente
  const visible=[...rows].filter(r=>r.style.display!=="none");
  if(visible.length===1){
    const idx=visible[0].id.replace("sr_","");
    window.toggleStu(parseInt(idx));
  }
};

window.openGradeModal=function(catId,actId){
  if(!nState.sId||!nState.cId){toast("Selecciona curso y materia","error");return;}
  const key=gk(sess.tId,nState.sId,nState.cId,nState.per||db.schoolInfo?.activePeriod||"1");
  if(!db.grades)db.grades={};
  if(!db.grades[key])db.grades[key]={categories:[],gradeValues:{}};
  const gd=db.grades[key];
  const course=(db.courses||[]).find(c=>c.id===nState.cId);
  const students=course?actSts(course):[];
  const cat=(gd.categories||[]).find(c=>c.id===catId);
  const act=(cat?.activities||[]).find(a=>a.id===actId);
  if(!cat||!act){toast("Actividad no encontrada","error");return;}
  const locked=perLocked(nState.per)||isSubjectLocked(nState.sId);
  const catIdx=(gd.categories||[]).findIndex(c=>c.id===catId);
  const cc=getCatColor(catIdx>=0?catIdx:0);
  const allG=calcAll(gd,students.length);
  const graded=students.filter((_,si)=>{const v=(gd.gradeValues||{})[si+"_"+catId+"_"+actId];return v!==undefined&&v!==null&&v!=="";}).length;
  let rows="";
  students.forEach((stu,si)=>{
    const vkey=si+"_"+catId+"_"+actId;
    const val=(gd.gradeValues||{})[vkey];
    const dv=(val!==undefined&&val!==null&&val!=="")?""+val:"";
    const fg=allG[si];
    const fgCls=fg===null?"gc-na":fg>=4.6?"gc-sup":fg>=4.0?"gc-alt":fg>=3.6?"gc-bas":"gc-low";
    const hasVal=dv!=="";
    rows+=`<div class="gm-row"><span class="gm-num">${String(si+1).padStart(2,"0")}</span><span class="gm-name">${stu.name||""}</span><span class="grade-chip ${fgCls}" id="gm-chip-${si}" style="font-size:10px;padding:2px 7px;flex-shrink:0">${fg!==null?fg.toFixed(2):"–"}</span>${locked?`<div style="width:72px;height:44px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:16px;font-weight:800;background:var(--surface2);border-radius:8px;flex-shrink:0">${dv||"–"}</div>`:`<input class="gm-input${hasVal?" has-val":""}" type="number" min="1" max="5" step="0.1" value="${dv}" placeholder="–" data-vkey="${vkey}" data-gkey="${key}" oninput="this.classList.add('changed')" onchange="window.onGradeInputChange(this)">`}</div>`;
  });
  const modalHtml=`<div class="modal-grade"><div class="gm-hdr" style="background:${cc.dot}"><div style="flex:1"><div class="gm-hdr-act">${act.name}</div><div class="gm-hdr-sub">${cat.name} · ${cat.pct}% · ${sName(nState.sId)}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:10px;color:rgba(255,255,255,.7)">calificados</div><div style="font-size:20px;font-weight:800" id="gm-cnt">${graded}/${students.length}</div></div></div><div class="gm-cols"><span style="font-size:11px;color:var(--text3);font-weight:600">ESTUDIANTE</span><span style="font-size:11px;color:var(--text3);font-weight:600">PROM.</span><span style="font-size:11px;color:var(--text3);font-weight:600;min-width:72px;text-align:center">NOTA</span></div><div class="gm-list">${rows}</div>${locked?`<div class="gm-footer"><button class="btn btn-secondary" style="width:100%" onclick="closeModal()">Cerrar</button></div>`:`<div class="gm-footer"><button class="btn btn-primary" style="flex:1;height:48px;font-size:14px;font-weight:800" onclick="saveGradeModal('${key}','${catId}','${actId}')">💾 Guardar notas</button><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button></div>`}</div>`;
  const overlay=document.getElementById("modalOverlay");
  if(overlay){document.getElementById("modalBody").innerHTML=modalHtml;overlay.classList.add("active");setTimeout(()=>{const f=document.querySelector(".gm-input:not(.has-val)");if(f)f.focus();},100);}
};
window.onGradeInputChange=function(inp){
  const vkey=inp.dataset.vkey,gkey=inp.dataset.gkey;
  let n=parseFloat(inp.value);
  if(!isNaN(n)){
    n=Math.max(1,Math.min(5,n));inp.value=n;
    if(!db.grades[gkey])return;
    db.grades[gkey].gradeValues[vkey]=n;
    inp.classList.add("has-val");
  }else{
    if(db.grades[gkey])delete db.grades[gkey].gradeValues[vkey];
    inp.classList.remove("has-val");
  }
  // ── Actualizar nota definitiva en tiempo real ──
  const gd2=db.grades[gkey]||{};
  const course2=(db.courses||[]).find(c=>c.id===nState.cId);
  const sts2=course2?actSts(course2):[];
  const allG2=calcAll(gd2,sts2.length);
  // Actualizar contador de calificados en modal header
  const vkParts=vkey.split('_');
  const si2=parseInt(vkParts[0]);
  const catId2=vkParts[1];
  const actId2=vkParts[2];
  const graded2=sts2.filter((_,si)=>{
    const v=(gd2.gradeValues||{})[si+'_'+catId2+'_'+actId2];
    return v!==undefined&&v!==null&&v!=='';
  }).length;
  const cnt2=document.getElementById('gm-cnt');
  if(cnt2)cnt2.textContent=graded2+'/'+sts2.length;
  // Actualizar chip de nota definitiva en cada fila del modal
  sts2.forEach((_,si)=>{
    const fg2=allG2[si];
    // En modal (gm-chip-si) y en lista (fg_si, gf_si)
    const chipEl=document.getElementById('gm-chip-'+si);
    if(chipEl){
      chipEl.textContent=fg2!==null?fg2.toFixed(2):'–';
      chipEl.className='grade-chip '+(fg2===null?'gc-na':fg2>=4.6?'gc-sup':fg2>=4.0?'gc-alt':fg2>=3.6?'gc-bas':'gc-low');
    }
    const e1=document.getElementById('gf_'+si);
    const e2=document.getElementById('fg_'+si);
    if(e1){e1.textContent=fg2!==null?fg2.toFixed(1):'–';e1.style.color=gColor(fg2);}
    if(e2){e2.textContent=fg2!==null?fg2.toFixed(2):'–';e2.style.color=gColor(fg2);}
  });
  // 1. Guardar local inmediato (para offline)
  try{const _s=JSON.stringify(db);localStorage.setItem('docente_data',_s);localStorage.setItem('isc_v2',_s);}catch(_e){}

  // 2. PATCH directo a Firebase — solo este valor, inmediatamente
  // Igual que EduColombia: cada nota va al servidor al instante sin esperar botón
  if(fbOk&&fDb&&sess&&sess.tId){
    clearTimeout(inp._fbTimer);
    inp._fbTimer=setTimeout(async()=>{
      try{
        // Leer grades actuales del docente desde Firebase
        const _gsnap=await getDoc(doc(fDb,"grades",sess.tId));
        const _gdata=_gsnap.exists()?(_gsnap.data().grades||{}):{};
        // Actualizar SOLO este gradeKey con los valores actuales en memoria
        _gdata[gkey]=db.grades[gkey]||{categories:[],gradeValues:{}};
        const _myG=Object.fromEntries(Object.entries(db.grades||{}).filter(([k])=>k.startsWith(sess.tId)));
        await setDoc(doc(fDb,"grades",sess.tId),{
          teacherId:sess.tId,teacherName:sess.t&&sess.t.name||"",
          updatedAt:Date.now(),grades:_myG,
          totalNotes:Object.values(_myG).reduce((s,g)=>s+Object.keys(g&&g.gradeValues||{}).length,0),
          lastSavedAt:new Date().toISOString()
        });
        // Confirmar con un indicador visual sutil en el campo
        inp.style.background='#e8f5e9';
        setTimeout(()=>{inp.style.background='';},800);
        // Marcar como guardado en Firebase
        localStorage.setItem('isc_v2',JSON.stringify(db));
        localStorage.removeItem('pendingSync');
      }catch(_fe){
        // Si falla Firebase (sin internet) → marcar pendingSync para subir después
        localStorage.setItem('pendingSync','1');
        inp.style.background='#fff3e0';
        setTimeout(()=>{inp.style.background='';},1000);
        console.warn('Auto-save failed, pendingSync set');
      }
    },600); // 600ms debounce — espera a que termine de escribir
  }else{
    // Sin Firebase disponible → pendingSync
    localStorage.setItem('pendingSync','1');
  }
};
window.saveGradeModal=async function(key,catId,actId){
  // Block if pct != 100
  const _mCats=(db.grades[key]?.categories||[]);
  const _mPct=_mCats.reduce((s,c)=>s+parseFloat(c.pct||0),0);
  if(_mCats.length>0&&Math.abs(_mPct-100)>0.1){
    closeModal();
    toast(`❌ Los porcentajes de las categorías suman ${Math.round(_mPct)}%. Corrígelos a 100% antes de guardar notas.`,"error");
    return;
  }
  document.querySelectorAll(".gm-input.changed").forEach(inp=>{window.onGradeInputChange(inp);inp.classList.remove("changed");});
  // 1. Guardar local SIEMPRE primero
  const dbStr=JSON.stringify(db);
  localStorage.setItem("docente_data",dbStr);
  localStorage.setItem("isc_v2",dbStr);
  const today=new Date().toISOString().split("T")[0];
  localStorage.setItem("docente_backup_"+today,dbStr);
  // 2. Firebase con reintentos
  let saved=false;
  if(fbOk&&fDb){
    for(let i=1;i<=3;i++){
      try{
        db._lastModified=Date.now();db._lastModifiedBy="teacher_"+sess.tId;db._pendingSync=false;
        const _mg2=Object.fromEntries(Object.entries(db.grades||{}).filter(([k])=>k.startsWith(sess.tId)));
        await setDoc(doc(fDb,"grades",sess.tId),{teacherId:sess.tId,teacherName:sess.t&&sess.t.name||"",updatedAt:Date.now(),grades:_mg2,totalNotes:Object.values(_mg2).reduce((s,g)=>s+Object.keys(g&&g.gradeValues||{}).length,0),lastSavedAt:new Date().toISOString()});
        const _mdb=Object.assign({},db);delete _mdb.grades;
        await setDoc(doc(fDb,"system","data"),JSON.parse(JSON.stringify(_mdb)));
        // Backup individual del docente
        try{
          const tbRef=doc(fDb,"teacher_backups",sess.tId+"_"+today);
          const tbData={teacherId:sess.tId,teacherName:sess.t?.name||"",savedAt:Date.now(),grades:Object.fromEntries(Object.entries(db.grades||{}).filter(([k])=>k.startsWith(sess.tId)))};
          setDoc(tbRef,tbData).catch(()=>{});
        }catch(be){}
        saved=true;break;
      }catch(e){if(i<3)await new Promise(r=>setTimeout(r,1500*i));}
    }
  }
  closeModal();
  // Always update local with freshest data for index.html sync
  const _latestDb=JSON.stringify(db);
  localStorage.setItem("isc_v2",_latestDb);
  localStorage.setItem("docente_data",_latestDb);
  if(saved){
    localStorage.removeItem("pendingSync");
    toast("✅ Notas guardadas en Firebase","success");
  }else{
    localStorage.setItem("pendingSync","1");
    toast("✅ Guardado local — se sincronizará al reconectarse","");
  }
  setTimeout(()=>renderNotas(),300);
};

window.inlineGrade=function(inp){
  const vkey=inp.dataset.vkey;
  const gkey=inp.dataset.gkey;
  const si=parseInt(inp.dataset.si);
  let n=parseFloat(inp.value);
  if(isNaN(n)||inp.value==="")return;
  n=Math.max(1,Math.min(5,n));
  inp.value=n.toFixed(1);
  if(!db.grades)db.grades={};
  if(!db.grades[gkey])db.grades[gkey]={categories:[],gradeValues:{}};
  db.grades[gkey].gradeValues[vkey]=n;

      }
    }

  // 4. Guardar local INMEDIATO
  try{const _s=JSON.stringify(db);localStorage.setItem("docente_data",_s);localStorage.setItem("isc_v2",_s);localStorage.setItem("pendingSync","1");}catch(_e){}
  try{const _si=JSON.stringify(db);localStorage.setItem("docente_data",_si);localStorage.setItem("isc_v2",_si);localStorage.setItem("pendingSync","1");}catch(_e){}

  sched();
};

function genIndicators(text){
  if(!text||!text.trim())return{superior:"",alto:"",basico:"",bajo:""};
  const lower=text.toLowerCase().trim();
  for(const[verb,levels]of Object.entries(VERB_MAP)){
    if(lower.includes(verb)){
      const vIdx=lower.indexOf(verb);
      const c=text.substring(vIdx+verb.length).trim();
      const suf=c?" "+c:"";
      return{superior:`${levels.sup}${suf}`,alto:`${levels.alt}${suf}`,basico:`${levels.bas}${suf}`,bajo:`${levels.low}${suf}`};
    }
  }
  return{
    superior:`Demuestra dominio superior, profundidad y autonomía en: ${text}`,
    alto:`Alcanza de forma satisfactoria los aprendizajes relacionados con: ${text}`,
    basico:`Alcanza de forma básica los aprendizajes mínimos relacionados con: ${text}`,
    bajo:`Presenta dificultad para alcanzar los aprendizajes relacionados con: ${text}`
  };
}

window.genInd=function(key,li){
  if(!db.logros||!db.logros[key]||!db.logros[key][li]){toast("Logro no encontrado","error");return;}

  if(!log.text?.trim()){toast("Escribe el logro primero","error");return;}
  const ind=genIndicators(log.text);
  db.logros[key][li].superior=ind.superior;
  db.logros[key][li].alto=ind.alto;
  db.logros[key][li].basico=ind.basico;
  db.logros[key][li].bajo=ind.bajo;
  const ids={superior:`ls_${li}`,alto:`la_${li}`,basico:`lb_${li}`,bajo:`ll_${li}`};
  let n=0;
  Object.entries(ids).forEach(([f,id])=>{const el=document.getElementById(id);if(el){el.value=db.logros[key][li][f];el.style.background="#e8f5e9";n++;}});if(n>0)window.saveLogroInstant(key);

// ── FUSIÓN SEGURA: nunca pierde datos locales ────────────────────────────
function mergeWithFresh(fresh){
  if(!fresh)return;
  const mergedTeachers=(fresh.teachers||[]).map(ft=>{
    const localT=(db.teachers||[]).find(t=>t.id===ft.id);
    if(localT&&localT.id===sess.tId)return {...ft,assignments:localT.assignments||ft.assignments||[]};
    return ft;
  });
  const freshIds=new Set((fresh.teachers||[]).map(t=>t.id));
  const extraLocal=(db.teachers||[]).filter(t=>!freshIds.has(t.id));

  // Merge grades: winner is whoever has MORE notes AND more categories
  const mergedGrades=(()=>{
    const merged={};
    const allKeys=new Set([...Object.keys(fresh.grades||{}),...Object.keys(db.grades||{})]);
    allKeys.forEach(k=>{
      const fGd=(fresh.grades||{})[k]||{};
      const lGd=(db.grades||{})[k]||{};
      const fNotes=Object.keys(fGd.gradeValues||{}).length;
      const lNotes=Object.keys(lGd.gradeValues||{}).length;
      const fCats=(fGd.categories||[]).length;
      const lCats=(lGd.categories||[]).length;
      // Categories: keep whichever has more
      const bestCats=lCats>=fCats?(lGd.categories||[]):(fGd.categories||[]);
      // Values: merge all, local wins on conflict
      const mergedVals=Object.assign({},fGd.gradeValues||{},lGd.gradeValues||{});
      merged[k]={categories:bestCats,gradeValues:mergedVals};
    });
    return merged;
  })();

  db=Object.assign({},fresh,{
    courses:fresh.courses||db.courses,
    subjects:fresh.subjects||db.subjects,
    schoolInfo:fresh.schoolInfo||db.schoolInfo,
    teachers:[...mergedTeachers,...extraLocal],
    grades:mergedGrades,
    attendance:Object.assign({},fresh.attendance||{},db.attendance||{}),
    logros:(()=>{
      // Fusion inteligente: si una version tiene contenido real y la otra
      // esta vacia ([] o sin texto), gana la que tiene contenido.
      // Esto evita que un periodo vacio sobreescriba logros ya escritos.
      const _merged={};
      const _fl=fresh.logros||{}, _ll=db.logros||{};
      const _allK=new Set([...Object.keys(_fl),...Object.keys(_ll)]);
      const _hasContent=(arr)=>Array.isArray(arr)&&arr.some(x=>x&&((x.text&&x.text.trim())||(x.alto&&x.alto.trim())||(x.bajo&&x.bajo.trim())||(x.basico&&x.basico.trim())||(x.superior&&x.superior.trim())));
      _allK.forEach(k=>{
        const fv=_fl[k], lv=_ll[k];
        const fHas=_hasContent(fv), lHas=_hasContent(lv);
        if(lHas&&!fHas)_merged[k]=lv;
        else if(fHas&&!lHas)_merged[k]=fv;
        else if(lHas&&fHas){
          // Ambos tienen contenido: gana el que tiene mas items (mas completo)
          _merged[k]=(Array.isArray(lv)&&Array.isArray(fv))?(lv.length>=fv.length?lv:fv):(lv||fv);
        }else{
          // Ninguno tiene contenido: usar lo que exista, local primero
          _merged[k]=lv!==undefined?lv:fv;
        }
      });
      return _merged;
    })(),
    observations:Object.assign({},fresh.observations||{},db.observations||{}),
    absences:[...new Map([...(fresh.absences||[]),...(db.absences||[])].map(a=>[a.id,a])).values()],
  });
  const me=(db.teachers||[]).find(t=>t.id===sess.tId);
  if(me)sess.t=me;
  localStorage.setItem("docente_data",JSON.stringify(db));
  localStorage.setItem("isc_v2",JSON.stringify(db));
}

// Sincronización en segundo plano — no bloquea la UI

async function bgSync(){
  if(!fbOk)return;
  try{
    const sn=await getDoc(doc(fDb,"system","data"));
    if(sn.exists()){
      const fresh=sn.data();
      const serverTime=fresh._lastModified||0;
      const localTime=db._lastModified||0;
      // Solo fusionar si el servidor tiene cambios más recientes
      if(serverTime>localTime){
        // Backup diario antes de fusionar
        const _bkDay=new Date().toISOString().split("T")[0];
        if(!localStorage.getItem("docente_backup_"+_bkDay)&&Object.keys(db.grades||{}).length>0){
          localStorage.setItem("docente_backup_"+_bkDay,JSON.stringify(db));
        }
        mergeWithFresh(fresh);
        // Recargar grades propias desde grades/{teacherId} para proteger contra sobreescritura
        if(sess.tId){
          // También recargar logros propios desde logros/{teacherId}
          getDoc(doc(fDb,"logros",sess.tId)).then(ls=>{
            if(!ls.exists())return;
            const _ld=ls.data().logros||{};
            if(!db.logros)db.logros={};
            Object.keys(_ld).forEach(k=>{
              const fbHas=(_ld[k]||[]).some(x=>x&&x.text&&x.text.trim());
              const lHas=(db.logros[k]||[]).some(x=>x&&x.text&&x.text.trim());
              if(fbHas&&!lHas)db.logros[k]=_ld[k];
            });
            localStorage.setItem("isc_v2",JSON.stringify(db));
          }).catch(()=>{});
          getDoc(doc(fDb,"grades",sess.tId)).then(gs=>{
            if(!gs.exists())return;
            const _gd=gs.data().grades||{};
            if(!db.grades)db.grades={};
            Object.keys(_gd).forEach(k=>{
              const fc=(_gd[k]?.categories||[]).length;
              const lc=(db.grades[k]?.categories||[]).length;
              db.grades[k]={
                categories:lc>=fc?(db.grades[k]?.categories||[]):(_gd[k]?.categories||[]),
                gradeValues:Object.assign({},_gd[k]?.gradeValues||{},db.grades[k]?.gradeValues||{})
              };
            });
            localStorage.setItem("isc_v2",JSON.stringify(db));
            localStorage.setItem("docente_data",JSON.stringify(db));
          }).catch(()=>{});
        }
        $("hdrPeriod").textContent="P"+(db.schoolInfo?.activePeriod||"–");
        console.log("bgSync: merged fresh data");
        checkAnnouncements();
      }
    }
  }catch(e){console.warn("bgSync failed:",e);}
}

// SISTEMA DE ANUNCIOS
// ═══════════════════════════════════════════════
const ANNOUNCE_ICONS = {urgent:"🚨", reminder:"⏰", normal:"📢"};
const ANNOUNCE_LABELS = {urgent:"URGENTE", reminder:"RECORDATORIO", normal:"COMUNICADO"};

function getActiveAnnouncements(){
  return ((db.announcements||[])
    .filter(a => a.active !== false))
    .sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
}

function timeAgo(ts){
  if(!ts) return "";
  const diff = Date.now() - ts;
  const m = Math.floor(diff/60000);
  const h = Math.floor(diff/3600000);
  const d = Math.floor(diff/86400000);
  if(m < 1) return "justo ahora";
  if(m < 60) return `hace ${m} min`;
  if(h < 24) return `hace ${h}h`;
  return `hace ${d} día${d>1?"s":""}`;
}

function checkAnnouncements(){
  const active = getActiveAnnouncements();
  if(!active.length) return;

  // Show popup for urgent/new messages (once per session per message)
  const shownKey = "lms_shown_" + sess.tId;
  const shown = JSON.parse(sessionStorage.getItem(shownKey)||"[]");

  // Find urgent or unread messages
  const toShow = active.find(a =>
    (a.type === "urgent" || a.type === "reminder") && !shown.includes(a.id)
  ) || active.find(a => !shown.includes(a.id));

  if(toShow){
    showAnnouncePopup(toShow);
    // Mark as shown this session
    shown.push(toShow.id);
    sessionStorage.setItem(shownKey, JSON.stringify(shown));
  }
}

function showAnnouncePopup(ann){
  const type = ann.type || "normal";
  const icon = ANNOUNCE_ICONS[type] || "📢";
  const label = ANNOUNCE_LABELS[type] || "COMUNICADO";
  const author = ann.author || "Coordinación";
  const time = timeAgo(ann.createdAt);

  const hdr = document.getElementById("announceHdr");
  if(hdr) hdr.className = `announce-box-hdr ${type}`;
  const iconEl = document.getElementById("announceIcon");
  if(iconEl) iconEl.textContent = icon;
  const titleEl = document.getElementById("announceTitle");
  if(titleEl) titleEl.textContent = label;
  const textEl = document.getElementById("announceText");
  if(textEl) textEl.textContent = ann.text || "";
  const metaEl = document.getElementById("announceMeta");
  if(metaEl) metaEl.textContent = `${author} · ${time}`;

  const popup = document.getElementById("announcePopup");
  if(popup) popup.style.display = "flex";
}

function renderAnnounceBanners(){

  return active.map(ann => {
    const type = ann.type || "normal";

    const label = ANNOUNCE_LABELS[type] || "COMUNICADO";
    const author = ann.author || "Coordinación";
    const time = timeAgo(ann.createdAt);
    return `<div class="announce-banner ${type}">
      <span class="announce-banner-icon">${icon}</span>
      <div class="announce-banner-content">
        <div class="announce-banner-title">${label}</div>

}

      try{
        db._lastModified=Date.now();db._lastModifiedBy="teacher_"+sess.tId;db._pendingSync=false;
        const _mg2=Object.fromEntries(Object.entries(db.grades||{}).filter(([k])=>k.startsWith(sess.tId)));
        await setDoc(doc(fDb,"grades",sess.tId),{teacherId:sess.tId,teacherName:sess.t&&sess.t.name||"",updatedAt:Date.now(),grades:_mg2,totalNotes:Object.values(_mg2).reduce((s,g)=>s+Object.keys(g&&g.gradeValues||{}).length,0),lastSavedAt:new Date().toISOString()});
        const _mdb=Object.assign({},db);delete _mdb.grades;
        await setDoc(doc(fDb,"system","data"),JSON.parse(JSON.stringify(_mdb)));
        fbSaved=true;
        break;
      }catch(e){
        console.warn("Save attempt "+i+" failed:",e.message);
        if(i<3)await new Promise(r=>setTimeout(r,1500*i));
      }
    }
  }
  if(fbSaved){
    hasUnsaved=false;
    localStorage.removeItem("pendingSync");
    if(bar)bar.style.display="none";
    toast("✅ Guardado en Firebase","success");
    if(btn){btn.style.background="var(--green)";btn.textContent="✅ Guardado";}
    setTimeout(()=>{if(btn){btn.disabled=false;btn.style.background="";btn.textContent="💾 Guardar";}},3000);
  }else{
    hasUnsaved=true;
    localStorage.setItem("pendingSync","1");
    // Always update local with freshest data
    const _fs2=JSON.stringify(db);
    localStorage.setItem("isc_v2",_fs2);
    localStorage.setItem("docente_data",_fs2);
    if(bar){bar.style.background="linear-gradient(135deg,#c62828,#b71c1c)";}
    toast("⚠️ Sin internet — guardado localmente. Se sincronizará al reconectarse.","");
    if(btn){btn.disabled=false;btn.style.background="var(--orange)";btn.textContent="⚠️ Pendiente — reintentar";}
  }
};
window.addEventListener("beforeunload",e=>{
  // SIEMPRE guardar local al cerrar — sin importar nada
  try{
    if(db&&(db.grades||db.logros||db.attendance)){
      const dbStr=JSON.stringify(db);
      localStorage.setItem("docente_data",dbStr);
      localStorage.setItem("isc_v2",dbStr);
      const today=new Date().toISOString().split("T")[0];
      localStorage.setItem("docente_backup_"+today,dbStr);
      if(hasUnsaved){localStorage.setItem("pendingSync","1");}
    }
  }catch(le){console.warn("Emergency local save failed:",le);}
  if(hasUnsaved){e.preventDefault();e.returnValue="Hay cambios sin guardar. ¿Salir de todas formas?";}
});      // También actualizar system/data.logros para retrocompatibilidad
      // SOLO las claves de este docente — sin tocar logros de otros
      const sn=await getDoc(doc(fDb,"system","data"));
      if(sn.exists()){

        const _snSave=Object.assign({},_snData,{logros:_snLogros});
