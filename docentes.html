<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Docentes · Liceo Moderno Suesca</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #c0392b;
  --red-dark: #96281b;
  --red-light: #e74c3c;
  --navy: #1a237e;
  --navy-light: #283593;
  --orange: #ff5a00;
  --orange-light: #ff7d33;
  --green: #27ae60;
  --green-light: #2ecc71;
  --yellow: #f39c12;
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f8f9fb;
  --border: #e2e5ea;
  --text: #1a1d23;
  --text2: #5a6072;
  --text3: #9099a8;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 14px;
  --radius-sm: 8px;
  --header-h: 60px;
  --nav-h: 68px;
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;align-items:center;}

/* ── WRAPPER ─────────────────────────────── */
#app{width:100%;max-width:600px;min-height:100vh;background:var(--surface);position:relative;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,0.1);}

/* ── TOAST ───────────────────────────────── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1d23;color:#fff;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.success{background:var(--green);}
#toast.error{background:var(--red);}

/* ── OVERLAY/MODAL ───────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:800;display:none;align-items:flex-end;justify-content:center;}
.overlay.active{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:24px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px;}

/* ── LOGIN ───────────────────────────────── */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:linear-gradient(160deg,var(--navy) 0%,var(--navy-light) 40%,var(--red) 100%);}
.login-logo{width:90px;height:90px;background:#fff;border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,0.25);overflow:hidden;}
.login-logo img{width:100%;height:100%;object-fit:contain;}
.login-logo-placeholder{font-size:36px;}
#loginScreen h1{color:#fff;font-size:22px;font-weight:800;text-align:center;line-height:1.3;}
#loginScreen p{color:rgba(255,255,255,0.7);font-size:13px;margin-top:4px;text-align:center;}
.login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;margin-top:32px;box-shadow:var(--shadow-lg);}
.login-card label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.login-card input{width:100%;height:52px;border:2px solid var(--border);border-radius:var(--radius-sm);padding:0 16px;font-size:16px;font-family:var(--font);outline:none;transition:border .2s;background:var(--surface2);}
.login-card input:focus{border-color:var(--navy);}
.field-wrap{margin-bottom:16px;}
.btn-login{width:100%;height:52px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;transition:background .2s;margin-top:4px;}
.btn-login:hover{background:var(--navy-light);}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}
.login-error{color:var(--red);font-size:13px;font-weight:600;text-align:center;margin-top:12px;min-height:20px;}

/* ── HEADER ──────────────────────────────── */
#header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;display:none;}
.hdr-logo{width:34px;height:34px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.hdr-logo img{width:100%;height:100%;object-fit:contain;}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-sub{font-size:11px;color:var(--text2);}
.hdr-period{background:var(--navy);color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;font-family:var(--mono);flex-shrink:0;}

/* ── CONTENT ─────────────────────────────── */
#content{flex:1;overflow-y:auto;padding-bottom:calc(var(--nav-h) + 12px);}
.tab-pane{display:none;padding:16px;}
.tab-pane.active{display:block;}

/* ── NAV ─────────────────────────────────── */
#nav{height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:none;align-items:stretch;position:sticky;bottom:0;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;font-family:var(--font);color:var(--text3);transition:color .2s;padding:0;position:relative;}
.nav-item.active{color:var(--navy);}
.nav-item.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--navy);border-radius:0 0 3px 3px;}
.nav-icon{font-size:22px;line-height:1;}
.nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}

/* ── CARDS ───────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* ── ALERT BANNER ────────────────────────── */
.alert-banner{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:1px solid #ffb74d;border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.alert-banner .icon{font-size:20px;}
.alert-banner .msg{font-size:13px;font-weight:600;color:#e65100;}
.success-banner{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-color:#81c784;}.success-banner .msg{color:#2e7d32;}

/* ── PROGRESS BAR ────────────────────────── */
.prog-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px;}
.prog-bar{height:100%;border-radius:3px;transition:width .4s;}
.prog-red{background:var(--red);}
.prog-orange{background:var(--orange);}
.prog-green{background:var(--green);}

/* ── GRADE BADGE ─────────────────────────── */
.grade-badge{font-family:var(--mono);font-size:15px;font-weight:700;padding:3px 10px;border-radius:100px;}
.grade-sup{background:#e8f5e9;color:#2e7d32;}
.grade-alt{background:#e3f2fd;color:#1565c0;}
.grade-bas{background:#fff8e1;color:#f57f17;}
.grade-low{background:#ffebee;color:#c62828;}
.grade-na{background:var(--border);color:var(--text3);}

/* ── SUBJECT CARDS (inicio) ─────────────── */
.course-section{margin-bottom:16px;}
.course-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--navy);color:#fff;border-radius:var(--radius) var(--radius) 0 0;font-size:13px;font-weight:700;}
.course-header .cnt{margin-left:auto;background:rgba(255,255,255,0.2);border-radius:100px;padding:2px 8px;font-size:11px;}
.course-subjects{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}
.subj-btn{background:var(--surface);border:none;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px 12px;cursor:pointer;font-family:var(--font);text-align:left;transition:background .15s;}
.subj-btn:nth-child(even){border-right:none;}
.subj-btn:nth-last-child(-n+2){border-bottom:none;}
.subj-btn:hover{background:var(--surface2);}
.subj-btn-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;}
.subj-btn-prog{font-size:11px;color:var(--text2);margin-bottom:4px;}

/* ── SELECT WRAPPER ──────────────────────── */
.sel-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.sel-group.three{grid-template-columns:1fr 1fr 1fr;}
.sel-wrap{display:flex;flex-direction:column;gap:4px;}
.sel-wrap label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.sel-wrap select{height:44px;border:2px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;font-size:14px;font-weight:600;font-family:var(--font);background:var(--surface);outline:none;cursor:pointer;}
.sel-wrap select:focus{border-color:var(--navy);}

/* ── INPUT ───────────────────────────────── */
.inp{width:100%;height:44px;border:2px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;font-size:15px;font-family:var(--font);outline:none;transition:border .2s;background:var(--surface);}
.inp:focus{border-color:var(--navy);}
.inp-sm{width:72px;height:44px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 6px;font-size:14px;font-family:var(--mono);font-weight:700;text-align:center;outline:none;transition:border .2s;background:var(--surface);}
.inp-sm:focus{border-color:var(--navy);background:#f0f4ff;}
.inp-sm.changed{background:#fff9c4;border-color:var(--yellow);}
.textarea{width:100%;border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:var(--font);outline:none;resize:vertical;min-height:70px;transition:border .2s;}
.textarea:focus{border-color:var(--navy);}

/* ── BTN ─────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:44px;padding:0 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;transition:all .2s;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy-light);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{background:var(--red-dark);}
.btn-green{background:var(--green);color:#fff;}
.btn-sm{height:34px;padding:0 12px;font-size:12px;border-radius:6px;}
.btn-full{width:100%;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:6px;font-size:16px;}

/* ── CATEGORY BLOCK ──────────────────────── */
.cat-block{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.cat-header{background:var(--surface2);padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.cat-name{font-size:13px;font-weight:700;flex:1;}
.cat-pct{font-family:var(--mono);font-size:12px;color:var(--text2);}
.cat-acts{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.act-tag{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:4px;}
.act-tag-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0;}
.add-act-inp{height:32px;border:1.5px dashed var(--border);border-radius:6px;padding:0 10px;font-size:12px;font-family:var(--font);outline:none;width:100px;}
.add-act-inp:focus{border-color:var(--navy);}

/* ── STUDENT CARD (notas) ────────────────── */
.student-card{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.student-card-hdr{display:flex;align-items:center;padding:12px 14px;background:var(--surface2);gap:10px;border-bottom:1px solid var(--border);}
.student-num{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:24px;}
.student-name{flex:1;font-size:14px;font-weight:700;}
.student-body{padding:12px 14px;}
.cat-grade-group{margin-bottom:12px;}
.cat-grade-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.grade-inputs{display:flex;flex-wrap:wrap;gap:8px;}
.grade-inp-wrap{display:flex;flex-direction:column;gap:3px;align-items:center;}
.grade-inp-label{font-size:10px;color:var(--text3);text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── ATTENDANCE TOGGLE ───────────────────── */
.att-student{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;}
.att-student:last-child{border-bottom:none;}
.att-name{flex:1;font-size:13px;font-weight:600;}
.att-btns{display:flex;gap:4px;}
.att-btn{width:38px;height:38px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.att-btn.active-P{background:#e8f5e9;border-color:var(--green);box-shadow:0 0 0 2px rgba(39,174,96,.2);}
.att-btn.active-A{background:#ffebee;border-color:var(--red);box-shadow:0 0 0 2px rgba(192,57,43,.2);}
.att-btn.active-T{background:#fff3e0;border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,90,0,.2);}
.att-btn.active-E{background:#e3f2fd;border-color:#1565c0;box-shadow:0 0 0 2px rgba(21,101,192,.2);}

/* ── LOGRO BLOCK ─────────────────────────── */
.logro-block{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;}
.logro-hdr{background:var(--surface2);padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.logro-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text2);}
.logro-body{padding:14px;}
.ind-level{margin-bottom:10px;}
.ind-level label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.ind-sup{color:#2e7d32;}
.ind-alt{color:#1565c0;}
.ind-bas{color:#f57f17;}
.ind-low{color:#c62828;}

/* ── PERFIL ──────────────────────────────── */
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;color:#fff;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:13px;color:var(--text2);}
.stat-val{font-family:var(--mono);font-size:14px;font-weight:700;}

/* ── SECTION TITLE ───────────────────────── */
.section-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* ── EMPTY STATE ─────────────────────────── */
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:10px;}
.empty p{font-size:14px;}

/* ── COUNTDOWN ───────────────────────────── */
.countdown-bar{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.countdown-bar .cd-num{font-family:var(--mono);font-size:22px;font-weight:700;background:rgba(255,255,255,.15);border-radius:6px;padding:2px 10px;}
.countdown-bar .cd-text{font-size:12px;opacity:.9;}

/* ── PERM STATUS ─────────────────────────── */
.perm-status{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;}
.perm-pend{background:#fff3e0;color:#e65100;}
.perm-ok{background:#e8f5e9;color:#2e7d32;}
.perm-rej{background:#ffebee;color:#c62828;}

/* ── COLLAPSIBLE GUIDE ───────────────────── */
.guide-toggle{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:13px;font-weight:700;margin-bottom:8px;}
.guide-body{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;font-size:12px;line-height:1.7;color:var(--text2);display:none;}
.guide-body.open{display:block;}

/* ── FOOTER ──────────────────────────────── */
#footer{text-align:center;font-size:10px;color:var(--text3);padding:6px;border-top:1px solid var(--border);background:var(--surface);}

/* ── LOADING ─────────────────────────────── */
#loadingScreen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingScreen p{color:rgba(255,255,255,.7);margin-top:14px;font-size:13px;}

/* ── RESPONSIVE ──────────────────────────── */
@media(min-width:480px){
  .grade-inputs{gap:10px;}
  .inp-sm{width:80px;}
}
@media(min-width:600px){
  body{padding:20px 0;}
  #app{border-radius:20px;min-height:auto;height:90vh;}
  #content{height:calc(90vh - var(--header-h) - var(--nav-h));}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <p>Cargando datos...</p>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- APP -->
<div id="app">

  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-logo">
      <span class="login-logo-placeholder">🏫</span>
    </div>
    <h1>I.E.T. Liceo Moderno<br>Suesca</h1>
    <p>Portal Docentes</p>
    <div class="login-card">
      <div class="field-wrap">
        <label>ID de Usuario</label>
        <input type="text" id="loginUser" placeholder="Ej: 20" autocomplete="username" style="text-transform:uppercase">
      </div>
      <div class="field-wrap">
        <label>Clave</label>
        <input type="password" id="loginPass" placeholder="••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="loginBtn" onclick="doLogin()">Ingresar</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- HEADER -->
  <div id="header">
    <div class="hdr-logo"><span style="font-size:18px">🏫</span></div>
    <div class="hdr-info">
      <div class="hdr-name" id="hdrName">Docente</div>
      <div class="hdr-sub" id="hdrSub">Liceo Moderno Suesca</div>
    </div>
    <div class="hdr-period" id="hdrPeriod">P–</div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <!-- INICIO -->
    <div class="tab-pane active" id="tab-inicio">
      <div id="inicioContent"></div>
    </div>
    <!-- NOTAS -->
    <div class="tab-pane" id="tab-notas">
      <div id="notasContent"></div>
    </div>
    <!-- ASISTENCIA -->
    <div class="tab-pane" id="tab-asistencia">
      <div id="asistenciaContent"></div>
    </div>
    <!-- LOGROS -->
    <div class="tab-pane" id="tab-logros">
      <div id="logrosContent"></div>
    </div>
    <!-- PERFIL -->
    <div class="tab-pane" id="tab-perfil">
      <div id="perfilContent"></div>
    </div>
  </div>

  <!-- NAV -->
  <nav id="nav">
    <button class="nav-item active" data-tab="inicio">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Inicio</span>
    </button>
    <button class="nav-item" data-tab="notas">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Notas</span>
    </button>
    <button class="nav-item" data-tab="asistencia">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Asistencia</span>
    </button>
    <button class="nav-item" data-tab="logros">
      <span class="nav-icon">🎯</span>
      <span class="nav-label">Logros</span>
    </button>
    <button class="nav-item" data-tab="perfil">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Perfil</span>
    </button>
  </nav>

  <!-- FOOTER -->
  <div id="footer" style="display:none">
    <span id="versionLabel"></span>
  </div>

// ─── STATE ───────────────────────────────────────────────
let db = { courses:[], teachers:[], subjects:[], grades:{}, attendance:{}, logros:{}, absences:[], observations:{}, schoolInfo:{} };
let session = { teacherId: null, teacher: null };
let saveTimer = null;

// Login lockout
let failCount = parseInt(localStorage.getItem("failCount")||"0");
let lockUntil = parseInt(localStorage.getItem("lockUntil")||"0");

let notasState = { subjectId: null, courseId: null, period: null };

let logrosState = { subjectId: null, courseId: null, period: null };
// Attendance state

let attData = {};

// ─── UTILS ──────────────────────────────────────────────
function toast(msg, type="", dur=2500){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show " + type;
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.className=""; }, dur);
}

function getSortedCourses(){
  return [...(db.courses||[])].sort((a,b)=>(a.order||0)-(b.order||0));
}

function getActiveStudents(course){
  return (course.students||[]).filter(s=>s.status!=="retirado");
}

function getTeacherAssignments(){
  return (session.teacher.assignments||[]);
}

function getSubjectName(id){
  const s = (db.subjects||[]).find(x=>x.id===id);
  return s ? s.name : id;
}

function getCourseName(id){
  const c = (db.courses||[]).find(x=>x.id===id);
  return c ? c.name : id;
}

function gradeBadge(g){
  if(g===null||g===undefined) return `<span class="grade-badge grade-na">–</span>`;
  const v = parseFloat(g);
  let cls="grade-low";
  if(v>=4.6) cls="grade-sup";
  else if(v>=4.0) cls="grade-alt";
  else if(v>=3.6) cls="grade-bas";
  return `<span class="grade-badge ${cls}">${v.toFixed(2)}</span>`;
}

function gradeColor(g){
  if(g===null||g===undefined) return "var(--text3)";
  const v=parseFloat(g);
  if(v>=3.6) return "var(--green)";
  if(v>=3.0) return "var(--yellow)";
  return "var(--red)";
}

function daysLeft(){
  const info = db.schoolInfo||{};
  if(!info.deadline) return null;
  const dl = new Date(info.deadline + (info.deadlineTime ? "T"+info.deadlineTime : ""));
  const now = new Date();
  const diff = Math.ceil((dl-now)/(1000*60*60*24));
  return diff;
}

function isPeriodLocked(period){
  const info = db.schoolInfo||{};
  const active = info.activePeriod||"1";
  if(String(period)!==String(active)) return true;
  if(info.deadline){
    const dl = new Date(info.deadline + (info.deadlineTime ? "T"+info.deadlineTime : ""));
    if(new Date()>dl) return true;
  }
  return false;
}

function gradeKey(tId, sId, cId, p){
  return `${tId}_${sId}__${cId}_${p}`;
}

// ─── GRADE CALC ──────────────────────────────────────────
function calcStudentGrade(categories, gradeValues, studentIdx, totalStudents){
  let fg=0, hasAny=false;
  (categories||[]).forEach(cat=>{
    if(!cat.activities||cat.activities.length===0) return;
    if(cat.type==="puntos"){
      const act = cat.activities[0];
      let maxPts=0;
      for(let si=0;si<totalStudents;si++){
        const v=gradeValues[`${si}_${cat.id}_${act.id}`];
        if(v!==undefined&&v!==null&&v!==""){
          const pv=parseFloat(v);
          if(pv>maxPts) maxPts=pv;
        }
      }
      const myPts=parseFloat(gradeValues[`${studentIdx}_${cat.id}_${act.id}`]||0);
      if(gradeValues[`${studentIdx}_${cat.id}_${act.id}`]!==undefined){
        hasAny=true;
        const nota=maxPts>0&&myPts>0?Math.min((myPts/maxPts)*4+1,5):1.0;
        fg+=nota*(parseFloat(cat.pct)/100);
      }
    } else {
      let cs=0,cc=0;
      (cat.activities||[]).forEach(act=>{
        const v=gradeValues[`${studentIdx}_${cat.id}_${act.id}`];
        if(v!==undefined&&v!==null&&v!==""){
          cs+=parseFloat(v); cc++; hasAny=true;
        }
      });
      if(cc>0) fg+=(cs/cc)*(parseFloat(cat.pct)/100);
    }
  });
  return hasAny?Math.round(fg*100)/100:null;
}

function calcAllGrades(gradeData, totalStudents){
  const { categories=[], gradeValues={} } = gradeData;
  return Array.from({length:totalStudents},(_,i)=>calcStudentGrade(categories,gradeValues,i,totalStudents));
}

// ─── SAVE ────────────────────────────────────────────────
async function saveDB(){
  localStorage.setItem("docente_data", JSON.stringify(db));
  if(!firebaseReady) return;
  if((db.courses||[]).length===0&&(db.teachers||[]).length===0){ console.warn("Empty DB, skip save"); return; }
  db._lastModified = Date.now();
  db._lastModifiedBy = "teacher_" + session.teacherId;
  try {
    await setDoc(doc(fireDb,"system","data"), JSON.parse(JSON.stringify(db)));
  } catch(e){ console.error("Save error",e); toast("Error al guardar","error"); }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>saveDB(), 800);
}

// ─── LOAD ────────────────────────────────────────────────
async function loadDB(){
  try {
    if(firebaseReady){
      const snap = await getDoc(doc(fireDb,"system","data"));
      if(snap.exists()){
        db = snap.data();
        localStorage.setItem("docente_data", JSON.stringify(db));
        return true;
      }
    }
  } catch(e){ console.error("Load error",e); }
  const local = localStorage.getItem("docente_data");
  if(local) try { db=JSON.parse(local); return true; } catch(e){}
  return false;
}

// ─── LOGIN ───────────────────────────────────────────────
window.doLogin = async function(){
  const now = Date.now();
  if(now < lockUntil){
    const sec = Math.ceil((lockUntil-now)/1000);
    document.getElementById("loginError").textContent = `Bloqueado. Espera ${sec}s`;
    return;
  }
  const userId = document.getElementById("loginUser").value.trim().replace(/\s+/g,"").toUpperCase();
  const password = document.getElementById("loginPass").value;
  if(!userId||!password){ document.getElementById("loginError").textContent="Completa todos los campos"; return; }
  const btn = document.getElementById("loginBtn");
  btn.disabled=true; btn.textContent="Verificando...";
  try {
    const snap = await getDoc(doc(fireDb,"system","data"));
    if(snap.exists()) db=snap.data();
    const teacher = (db.teachers||[]).find(t=>
      (t.userId||"").replace(/\s+/g,"").toUpperCase()===userId && t.key===password
    );
    if(teacher){
      failCount=0; localStorage.setItem("failCount","0");
      session.teacherId=teacher.id; session.teacher=teacher;
      localStorage.setItem("session", JSON.stringify({teacherId:teacher.id}));
      startApp();
    } else {
      failCount++;
      localStorage.setItem("failCount",String(failCount));
      if(failCount>=3){
        const until=Date.now()+5*60*1000;
        localStorage.setItem("lockUntil",String(until));
        lockUntil=until; failCount=0; localStorage.setItem("failCount","0");
        document.getElementById("loginError").textContent="3 intentos fallidos. Bloqueado 5 minutos.";
      } else {
        document.getElementById("loginError").textContent=`ID o clave incorrectos (${failCount}/3)`;
      }
    }
  } catch(e){
    document.getElementById("loginError").textContent="Error de conexión. Intenta de nuevo.";
  }
  btn.disabled=false; btn.textContent="Ingresar";
};

// ─── START APP ───────────────────────────────────────────
function startApp(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("header").style.display="flex";
  document.getElementById("nav").style.display="flex";
  document.getElementById("footer").style.display="block";
  document.getElementById("versionLabel").textContent = APP_VERSION;

  const t = session.teacher;
  const firstName = t.name ? t.name.split(" ")[0] : "Docente";

  document.querySelectorAll(".nav-item").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const tab = btn.dataset.tab;
      switchTab(tab);
    });

  renderInicio();
  switchTab("inicio");
}

function switchTab(tab){
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add("active");
  if(tab==="inicio") renderInicio();
  else if(tab==="notas") renderNotas();
  else if(tab==="asistencia") renderAsistencia();
  else if(tab==="logros") renderLogros();
  else if(tab==="perfil") renderPerfil();
}

// ─── TAB: INICIO ─────────────────────────────────────────
function renderInicio(){
  const cont = document.getElementById("inicioContent");
  const info = db.schoolInfo||{};
  const period = info.activePeriod||"1";
  const days = daysLeft();
  const assignments = getTeacherAssignments();

  // Group by course
  const byCourse = {};
  assignments.forEach(a=>{
    if(!byCourse[a.courseId]) byCourse[a.courseId]=[];
    byCourse[a.courseId].push(a.subjectId);
  });

  // Count pending
  let pending=0;
  assignments.forEach(a=>{
    const key = gradeKey(session.teacherId, a.subjectId, a.courseId, period);
    const gd = (db.grades||{})[key]||{};
    const course = (db.courses||[]).find(c=>c.id===a.courseId);
    if(!course) return;
    const students = getActiveStudents(course);
    if(!gd.categories||gd.categories.length===0){ pending++; return; }
    const vals = gd.gradeValues||{};
    const hasGrades = students.some((_,si)=>Object.keys(vals).some(k=>k.startsWith(si+"_")));
    if(!hasGrades) pending++;
  });

  let html = "";

  // Greeting card
  const tname = (session.teacher.name||"").split(" ")[0];
  html += `<div class="card" style="background:linear-gradient(135deg,var(--navy),var(--navy-light));color:#fff;border:none;">
    <div style="font-size:20px;font-weight:800;margin-bottom:4px;">👋 Hola, ${tname.charAt(0)+tname.slice(1).toLowerCase()}</div>
    <div style="font-size:13px;opacity:.85;">Periodo ${period}${days!==null ? ` · ${days>0?days+" días restantes":"Período cerrado"}`:""}</div>
  </div>`;

  if(days!==null&&days<=7&&days>0){
    html += `<div class="countdown-bar"><span class="cd-num">${days}</span><div><div style="font-size:13px;font-weight:700;">Días para cerrar notas</div><div class="cd-text">Fecha límite: ${info.deadline}</div></div></div>`;
  }

  if(pending>0){
    html += `<div class="alert-banner"><span class="icon">⚠️</span><span class="msg">${pending} materia${pending>1?"s":""} pendiente${pending>1?"s":""} de calificar</span></div>`;
  } else if(assignments.length>0){
    html += `<div class="alert-banner success-banner"><span class="icon">✅</span><span class="msg">Todas las materias están al día</span></div>`;
  }

  // Courses
  const sorted = getSortedCourses();
  sorted.forEach(course=>{
    const subs = byCourse[course.id];
    if(!subs||subs.length===0) return;
    const students = getActiveStudents(course);
    const total = students.length;
    html += `<div class="course-section">
      <div class="course-header">
        🏫 ${course.name}
        <span class="cnt">${subs.length} materia${subs.length>1?"s":""}</span>
      </div>
      <div class="course-subjects">`;
    subs.forEach(subId=>{
      const key = gradeKey(session.teacherId, subId, course.id, period);
      const gd = (db.grades||{})[key]||{};
      const grades = gd.categories&&gd.gradeValues ? calcAllGrades(gd, total) : [];
      const filled = grades.filter(g=>g!==null).length;
      const pct = total>0?Math.round(filled/total*100):0;
      const barCls = pct>=70?"prog-green":pct>=30?"prog-orange":"prog-red";
      html += `<button class="subj-btn" onclick="openSubject('${subId}','${course.id}')">
        <div class="subj-btn-name">${getSubjectName(subId)}</div>
        <div class="subj-btn-prog">${filled}/${total} calificados</div>
        <div class="prog-wrap"><div class="prog-bar ${barCls}" style="width:${pct}%"></div></div>
      </button>`;
    });
    html += `</div></div>`;
  });

  if(assignments.length===0){
    html += `<div class="empty"><div class="empty-icon">📚</div><p>No tienes materias asignadas</p></div>`;
  }

  cont.innerHTML = html;
}

  notasState.subjectId = subjectId;
  notasState.courseId = courseId;
  notasState.period = db.schoolInfo?.activePeriod||"1";
  switchTab("notas");
};

const DEFAULT_TEMPLATE = [
  {name:"Quiz",pct:10,activities:["Quiz 1","Quiz 2","Quiz 3","Quiz 4"]},
  {name:"Prueba Saber",pct:20,activities:["Prueba Saber"]},

function makeId(){ return Math.random().toString(36).slice(2,8); }

function renderNotas(){
  const cont = document.getElementById("notasContent");
  const assignments = getTeacherAssignments();
  const info = db.schoolInfo||{};
  const period = info.activePeriod||"1";

  // Init state
  if(!notasState.subjectId && assignments.length>0){
    notasState.subjectId = assignments[0].subjectId;
    notasState.courseId = assignments[0].courseId;
  }
  if(!notasState.period) notasState.period = period;

  // Build unique subjects and courses
  const uniqueSubs = [...new Set(assignments.map(a=>a.subjectId))];
  const uniqueCourses = assignments
    .filter(a=>a.subjectId===notasState.subjectId)
    .map(a=>a.courseId);

  const periods = ["1","2","3","4"];
  const locked = isPeriodLocked(notasState.period);

  let html = "";

  // Selectors
  html += `<div class="sel-group three">
    <div class="sel-wrap"><label>Materia</label>
      <select id="selSubject" onchange="onSelSubject(this.value)">
        ${uniqueSubs.map(s=>`<option value="${s}" ${s===notasState.subjectId?"selected":""}>${getSubjectName(s)}</option>`).join("")}
      </select>
    </div>
    <div class="sel-wrap"><label>Curso</label>
      <select id="selCourse" onchange="onSelCourse(this.value)">
        ${uniqueCourses.map(c=>`<option value="${c}" ${c===notasState.courseId?"selected":""}>${getCourseName(c)}</option>`).join("")}
      </select>
    </div>
    <div class="sel-wrap"><label>Periodo</label>
      <select id="selPeriod" onchange="onSelPeriod(this.value)">
        ${periods.map(p=>`<option value="${p}" ${p===notasState.period?"selected":""}>${p}</option>`).join("")}
      </select>
    </div>
  </div>`;

  if(locked&&String(notasState.period)!==String(period)){
    html += `<div class="alert-banner"><span class="icon">🔒</span><span class="msg">Periodo ${notasState.period} – Solo lectura</span></div>`;
  }

  if(!notasState.subjectId||!notasState.courseId){
    cont.innerHTML = html + `<div class="empty"><div class="empty-icon">📊</div><p>Selecciona una materia</p></div>`;
    return;
  }

  const key = gradeKey(session.teacherId, notasState.subjectId, notasState.courseId, notasState.period);
  if(!db.grades) db.grades={};
  if(!db.grades[key]) db.grades[key]={ categories:[], gradeValues:{} };
  const gd = db.grades[key];
  if(!gd.gradeValues) gd.gradeValues={};

  const course = (db.courses||[]).find(c=>c.id===notasState.courseId);
  const students = course ? getActiveStudents(course) : [];
  const totalCatPct = (gd.categories||[]).reduce((s,c)=>s+parseFloat(c.pct||0),0);

  // Categories section
  if(!locked){
    html += `<div class="card">
      <div class="card-title">📐 Categorías de evaluación
        <span style="margin-left:auto;font-family:var(--mono);font-size:12px;color:${totalCatPct===100?'var(--green)':'var(--red)'}">Total: ${totalCatPct}%</span>
      </div>`;

    (gd.categories||[]).forEach((cat,ci)=>{
      html += `<div class="cat-block">
        <div class="cat-header">
          <span class="cat-name">${cat.name}${cat.type==="puntos"?" 🏆":""}</span>
          <span class="cat-pct">${cat.pct}%</span>
          <button class="btn btn-sm btn-secondary btn-icon" onclick="editCategory('${key}',${ci})">✏️</button>
          <button class="btn btn-sm btn-red btn-icon" onclick="deleteCategory('${key}',${ci})">🗑</button>
        </div>
        <div class="cat-acts">
          ${(cat.activities||[]).map((act,ai)=>`
            <span class="act-tag">${act.name}
              ${!locked?`<button class="act-tag-del" onclick="deleteActivity('${key}',${ci},${ai})">✕</button>`:""}
            </span>`).join("")}
          ${!locked?`<input class="add-act-inp" id="actInp_${ci}" placeholder="+ actividad" onkeydown="if(event.key==='Enter')addActivity('${key}',${ci})">
            <button class="btn btn-sm btn-primary" onclick="addActivity('${key}',${ci})">+</button>`:""}
        </div>
      </div>`;
    });

    html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
      <button class="btn btn-primary btn-sm" onclick="showAddCategory('${key}')">+ Categoría</button>
      <button class="btn btn-secondary btn-sm" onclick="loadTemplate('${key}')">📋 Plantilla</button>
    </div></div>`;
  }

  // Students
  if(students.length===0){
    cont.innerHTML = html + `<div class="empty"><div class="empty-icon">👥</div><p>No hay estudiantes activos</p></div>`;
    return;
  }
  if(!gd.categories||gd.categories.length===0){
    cont.innerHTML = html + `<div class="alert-banner"><span class="icon">📐</span><span class="msg">Agrega categorías primero</span></div>`;
    return;
  }

  // Grades footer
  const allGrades = calcAllGrades(gd, students.length);
  const passing = allGrades.filter(g=>g!==null&&g>=3.6).length;
  const avg = allGrades.filter(g=>g!==null).reduce((s,g)=>s+g,0) / (allGrades.filter(g=>g!==null).length||1);

  html += `<div class="section-title">📝 Calificaciones — ${students.length} estudiantes</div>`;

  students.forEach((student,si)=>{
    const fg = allGrades[si];
    const fgColor = gradeColor(fg);
    html += `<div class="student-card" id="sc_${si}">
      <div class="student-card-hdr">
        <span class="student-num">${String(si+1).padStart(2,"0")}</span>
        <span class="student-name">${student.firstLastName||""} ${student.secondLastName||""} ${student.firstName||""} ${student.secondName||""}</span>
        <span style="font-family:var(--mono);font-size:15px;font-weight:700;color:${fgColor}">${fg!==null?fg.toFixed(2):"–"}</span>
      </div>
      <div class="student-body">`;

    (gd.categories||[]).forEach(cat=>{
      html += `<div class="cat-grade-group">
        <div class="cat-grade-label">── ${cat.name} (${cat.pct}%) ──</div>
        <div class="grade-inputs">`;
      (cat.activities||[]).forEach(act=>{
        const vkey = `${si}_${cat.id}_${act.id}`;
        const val = gd.gradeValues[vkey];
        const dispVal = (val!==undefined&&val!==null&&val!=="") ? val : "";
        const isPuntos = cat.type==="puntos";
        if(!locked){
          html += `<div class="grade-inp-wrap">
            <input class="inp-sm" type="number" 
              min="${isPuntos?0:1}" max="${isPuntos?9999:5}" step="${isPuntos?1:0.1}"
              value="${dispVal}" placeholder="–"
              data-key="${vkey}" data-gkey="${key}" data-puntos="${isPuntos?1:0}"
              oninput="onGradeInput(this)" onchange="onGradeChange(this)">
            <span class="grade-inp-label">${act.name}</span>
          </div>`;
        } else {
          html += `<div class="grade-inp-wrap">
            <div class="inp-sm" style="display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1.5px solid var(--border);">
              ${dispVal||"–"}
            </div>
            <span class="grade-inp-label">${act.name}</span>
          </div>`;
        }
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });

  // Footer stats
  html += `<div class="card" style="text-align:center;">
    <div style="display:flex;justify-content:center;gap:24px;">
      <div><div style="font-size:22px;font-weight:800;color:var(--green)">${passing}</div><div style="font-size:11px;color:var(--text2)">APRUEBAN</div></div>
      <div><div style="font-size:22px;font-weight:800;color:var(--red)">${students.length-passing}</div><div style="font-size:11px;color:var(--text2)">REPUEBAN</div></div>
      <div><div style="font-size:22px;font-weight:800;color:var(--navy)">${avg.toFixed(2)}</div><div style="font-size:11px;color:var(--text2)">PROMEDIO</div></div>
    </div>
  </div>`;

  cont.innerHTML = html;
}

window.onSelSubject = function(v){
  notasState.subjectId=v;
  // Update course options
  const assignments=getTeacherAssignments();
  const courses=assignments.filter(a=>a.subjectId===v).map(a=>a.courseId);
  if(courses.length>0) notasState.courseId=courses[0];

window.onGradeChange = function(el){
  const vkey = el.dataset.key;
  const gkey = el.dataset.gkey;
  const isPuntos = el.dataset.puntos==="1";
  let val = el.value;
  if(val==="") {
    delete db.grades[gkey].gradeValues[vkey];
  } else {
    let num = parseFloat(val);
    if(!isPuntos){ num=Math.max(1,Math.min(5,num)); el.value=num; }
    db.grades[gkey].gradeValues[vkey] = num;
  }
  el.classList.remove("changed");
  // Recalculate grades display
  const key=gkey;
  const gd=db.grades[key];
  const course=(db.courses||[]).find(c=>c.id===notasState.courseId);
  const students=course?getActiveStudents(course):[];
  const allGrades=calcAllGrades(gd,students.length);
  students.forEach((_,si)=>{
    const fg=allGrades[si];
    const card=document.getElementById(`sc_${si}`);
    if(card){
      const fgEl=card.querySelector(".student-card-hdr span:last-child");
      if(fgEl){ fgEl.textContent=fg!==null?fg.toFixed(2):"–"; fgEl.style.color=gradeColor(fg); }
    }
  });
  // If puntos, recalc all
  if(isPuntos) renderNotasGrades(key);
  scheduleSave();
};

function renderNotasGrades(key){
  const gd=db.grades[key];
  if(!gd) return;
  const course=(db.courses||[]).find(c=>c.id===notasState.courseId);
  const students=course?getActiveStudents(course):[];
  const allGrades=calcAllGrades(gd,students.length);
  students.forEach((_,si)=>{
    const fg=allGrades[si];
    const card=document.getElementById(`sc_${si}`);
    if(card){
      const fgEl=card.querySelector(".student-card-hdr span:last-child");
      if(fgEl){ fgEl.textContent=fg!==null?fg.toFixed(2):"–"; fgEl.style.color=gradeColor(fg); }
    }
  });
}

function renderAsistencia(){
  const cont = document.getElementById("asistenciaContent");
  const courses = (db.courses||[]).filter(c=>c.directorId===session.teacherId);

  if(courses.length===0){
    cont.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>No eres director de ningún curso</p></div>`;
    return;
  }

  const course = courses[0]; // Use first directed course
  const students = getActiveStudents(course);

  // Load existing attendance
  const attKey = `${course.id}_${attDate}`;
  if(!db.attendance) db.attendance={};
  attData = db.attendance[attKey] || {};

  let html = `<div class="section-title">📋 Asistencia — ${course.name}</div>`;

  // Date picker
  html += `<div class="card">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="sel-wrap" style="flex:1">
        <label>Fecha</label>
        <input class="inp" type="date" id="attDateInp" value="${attDate}" onchange="onAttDateChange(this.value)">
      </div>
      <button class="btn btn-secondary" onclick="markAllPresent('${course.id}')">✅ Todos presentes</button>
    </div>
  </div>`;

  html += `<div class="card" style="padding:0;overflow:hidden;">`;
  students.forEach((student,si)=>{
    const status = (attData[String(si)]||{}).status||"presente";
    html += `<div class="att-student">
      <div class="att-name">${String(si+1).padStart(2,"0")}. ${student.firstLastName||""} ${student.firstName||""}</div>
      <div class="att-btns">
        <button class="att-btn ${status==="presente"?"active-P":""}" onclick="setAtt('${course.id}',${si},'presente')" title="Presente">✅</button>
        <button class="att-btn ${status==="ausente"?"active-A":""}" onclick="setAtt('${course.id}',${si},'ausente')" title="Ausente">❌</button>
        <button class="att-btn ${status==="tardanza"?"active-T":""}" onclick="setAtt('${course.id}',${si},'tardanza')" title="Tardanza">⏰</button>
        <button class="att-btn ${status==="excusa"?"active-E":""}" onclick="setAtt('${course.id}',${si},'excusa')" title="Excusa">📄</button>
      </div>
    </div>`;
  });
  html += `</div>`;

  html += `<button class="btn btn-primary btn-full" style="margin-top:8px" onclick="saveAttendance('${course.id}')">💾 Guardar Asistencia</button>`;

  // Consolidado toggle
  html += `<button class="guide-toggle" style="margin-top:16px" onclick="toggleConsolidado(this)">📊 Ver Consolidado <span>▼</span></button>
  <div class="guide-body" id="consolidadoBody"></div>`;

  cont.innerHTML = html;
}

window.onAttDateChange = function(v){
  attDate=v;
  renderAsistencia();
};

window.setAtt = function(courseId, si, status){
  const attKey=`${courseId}_${attDate}`;
  if(!db.attendance) db.attendance={};
  if(!db.attendance[attKey]) db.attendance[attKey]={};
  db.attendance[attKey][String(si)]={ status };
  attData = db.attendance[attKey];
  // Update buttons
  const attStudents = document.querySelectorAll(".att-student");
  const row = attStudents[si];
  if(row){
    row.querySelectorAll(".att-btn").forEach(b=>b.className="att-btn");
    const map={presente:"active-P",ausente:"active-A",tardanza:"active-T",excusa:"active-E"};
    row.querySelectorAll(".att-btn")[["presente","ausente","tardanza","excusa"].indexOf(status)].classList.add(map[status]);
  }
};

window.markAllPresent = function(courseId){
  const course=(db.courses||[]).find(c=>c.id===courseId);
  if(!course) return;
  const students=getActiveStudents(course);
  const attKey=`${courseId}_${attDate}`;
  if(!db.attendance) db.attendance={};
  db.attendance[attKey]={};
  students.forEach((_,si)=>{ db.attendance[attKey][String(si)]={status:"presente"}; });
  attData=db.attendance[attKey];
  renderAsistencia();
};

window.saveAttendance = function(courseId){
  const attKey=`${courseId}_${attDate}`;
  if(!db.attendance) db.attendance={};
  db.attendance[attKey]=attData;
  saveDB().then(()=>toast("Asistencia guardada ✅","success"));
};

window.toggleConsolidado = function(btn){
  const body=document.getElementById("consolidadoBody");
  if(body.classList.toggle("open")){
    btn.querySelector("span").textContent="▲";
    renderConsolidado(body);
  } else {
    btn.querySelector("span").textContent="▼";
  }
};

function renderConsolidado(el){
  const courses=(db.courses||[]).filter(c=>c.directorId===session.teacherId);
  if(!courses.length){ el.innerHTML="<p>Sin datos</p>"; return; }
  const course=courses[0];
  const students=getActiveStudents(course);
  const allKeys=Object.keys(db.attendance||{}).filter(k=>k.startsWith(course.id+"_")).sort().slice(-20);

  if(!allKeys.length){ el.innerHTML="<p>No hay registros de asistencia</p>"; return; }

  let html=`<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:11px;">
    <tr><th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">Estudiante</th>`;
  allKeys.forEach(k=>{ html+=`<th style="padding:4px 4px;border-bottom:1px solid var(--border)">${k.split("_")[1]?.slice(5)||""}</th>`; });
  html+=`<th>P</th><th>A</th><th>T</th><th>E</th></tr>`;

  students.forEach((s,si)=>{
    let p=0,a=0,t=0,e=0;
    const icons={presente:"✅",ausente:"❌",tardanza:"⏰",excusa:"📄"};
    html+=`<tr><td style="padding:4px 6px;border-bottom:1px solid var(--border);white-space:nowrap">${s.firstLastName||""} ${s.firstName||""}</td>`;
    allKeys.forEach(k=>{
      const st=((db.attendance[k]||{})[String(si)]||{}).status||"–";
      if(st==="presente")p++;else if(st==="ausente")a++;else if(st==="tardanza")t++;else if(st==="excusa")e++;
      html+=`<td style="text-align:center;border-bottom:1px solid var(--border)">${icons[st]||"–"}</td>`;
    });
    html+=`<td style="text-align:center;color:var(--green);font-weight:700">${p}</td>
      <td style="text-align:center;color:var(--red);font-weight:700">${a}</td>
      <td style="text-align:center;color:var(--orange);font-weight:700">${t}</td>
      <td style="text-align:center;color:#1565c0;font-weight:700">${e}</td></tr>`;
  });
  html+=`</table></div>`;
  el.innerHTML=html;
}

  escribe:{sup:"Escribe con coherencia, riqueza y estilo",alt:"Escribe correctamente",bas:"Escribe de forma básica",low:"Presenta dificultad para escribir"},

};

function generateIndicators(text){
  const lower=text.toLowerCase();
  for(const [verb,levels] of Object.entries(VERB_MAP)){
    if(lower.includes(verb)){
      const rest=text.replace(new RegExp(verb,"i"),"").trim();
      return {
        superior: `${levels.sup} ${rest}`,
        alto: `${levels.alt} ${rest}`,
        basico: `${levels.bas} ${rest}`,
        bajo: `${levels.low} ${rest}`
      };
    }
  }
  return { superior:"", alto:"", basico:"", bajo:"" };
}

  cont.innerHTML=html;
}

window.onLogrosSubj=function(v){ logrosState.subjectId=v; const a=getTeacherAssignments().filter(x=>x.subjectId===v); if(a.length) logrosState.courseId=a[0].courseId; renderLogros(); };
window.onLogrosCourse=function(v){ logrosState.courseId=v; renderLogros(); };

window.toggleGuide=function(btn){
  const b=document.getElementById("guideBody");
  b.classList.toggle("open");
  btn.querySelector("span").textContent=b.classList.contains("open")?"▲":"▼";
};

window.updateLogro=function(key,li,field,val){
  db.logros[key][li][field]=val;
  scheduleSave();
};

window.deleteLogro=function(key,li){
  if(!confirm("¿Eliminar este logro?")) return;
  db.logros[key].splice(li,1);
  scheduleSave(); renderLogros();
};

window.addLogro=function(key){
  db.logros[key].push({id:makeId(),text:"",superior:"",alto:"",basico:"",bajo:""});
  scheduleSave(); renderLogros();
};

window.saveLogros=function(){
  saveDB().then(()=>toast("Logros guardados ✅","success"));
};

window.genIndicators=function(key,li){
  const log=db.logros[key][li];
  const text=log.text||"";
  if(!text.trim()){ toast("Escribe el logro primero","error"); return; }
  const ind=generateIndicators(text);
  log.superior=ind.superior||log.superior;
  log.alto=ind.alto||log.alto;
  log.basico=ind.basico||log.basico;
  log.bajo=ind.bajo||log.bajo;
  // Update UI
  const fields={superior:`ind_sup_${li}`,alto:`ind_alt_${li}`,basico:`ind_bas_${li}`,bajo:`ind_low_${li}`};
  Object.entries(fields).forEach(([k,id])=>{ const el=document.getElementById(id); if(el) el.value=log[k]; });
  toast("Indicadores generados 🧠","success");
  scheduleSave();
};

// ─── TAB: PERFIL ─────────────────────────────────────────
function renderPerfil(){
  const cont=document.getElementById("perfilContent");
  const t=session.teacher;
  const info=db.schoolInfo||{};
  const period=info.activePeriod||"1";
  const assignments=getTeacherAssignments();

  // Stats
  let totalGrades=[],gradesBySub={};
  assignments.forEach(a=>{
    const key=gradeKey(session.teacherId,a.subjectId,a.courseId,period);
    const gd=(db.grades||{})[key]||{};
    const course=(db.courses||[]).find(c=>c.id===a.courseId);
    if(!course) return;
    const students=getActiveStudents(course);
    if(gd.categories&&gd.gradeValues){
      const gs=calcAllGrades(gd,students.length).filter(g=>g!==null);
      totalGrades=[...totalGrades,...gs];
      const sname=getSubjectName(a.subjectId)+" – "+getCourseName(a.courseId);
      if(!gradesBySub[sname]) gradesBySub[sname]=[];
      gradesBySub[sname]=[...gradesBySub[sname],...gs];
    }
  });
  const overallAvg=totalGrades.length>0?(totalGrades.reduce((s,g)=>s+g,0)/totalGrades.length).toFixed(2):null;

  const isDirector=(db.courses||[]).some(c=>c.directorId===t.id);
  const myPerms=(db.absences||[]).filter(a=>a.teacherId===t.id);

  let html=`<div class="card" style="text-align:center;">
    <div class="profile-avatar">${t.emoji||"👤"}</div>
    <div style="font-size:16px;font-weight:800;margin-bottom:4px">${t.name||""}</div>
    <div style="font-size:13px;color:var(--text2)">ID: ${t.userId||"–"}</div>
    <div style="font-size:12px;color:var(--text3);margin-top:4px">${assignments.length} materia${assignments.length!==1?"s":""} asignada${assignments.length!==1?"s":""}</div>
  </div>`;

  // Rendimiento
  html+=`<div class="card">
    <div class="card-title">📊 Mi Rendimiento</div>`;
  if(overallAvg){
    html+=`<div class="stat-row"><span class="stat-label">Promedio general</span><span class="stat-val" style="color:${gradeColor(overallAvg)}">${overallAvg}</span></div>`;
    Object.entries(gradesBySub).forEach(([name,gs])=>{
      const avg=(gs.reduce((s,g)=>s+g,0)/gs.length).toFixed(2);
      const pct=parseFloat(avg)/5*100;
      html+=`<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px">${name}</span><span class="stat-val" style="font-size:12px;color:${gradeColor(avg)}">${avg}</span></div>
        <div class="prog-wrap"><div class="prog-bar ${parseFloat(avg)>=3.6?"prog-green":"prog-red"}" style="width:${pct}%"></div></div>
      </div>`;
    });
  } else {
    html+=`<p style="font-size:13px;color:var(--text3);text-align:center">Aún no hay notas registradas</p>`;
  }
  html+=`</div>`;

  // Cambiar clave
  html+=`<div class="card">
    <div class="card-title">🔑 Cambiar mi Clave</div>
    <div class="field-wrap" style="margin-bottom:10px">
      <label style="display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px">CLAVE ACTUAL</label>
      <input class="inp" type="password" id="oldKey" placeholder="••••">
    </div>
    <div class="field-wrap" style="margin-bottom:10px">
      <label style="display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px">NUEVA CLAVE</label>
      <input class="inp" type="password" id="newKey" placeholder="••••">
    </div>
    <div class="field-wrap" style="margin-bottom:12px">
      <label style="display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px">CONFIRMAR CLAVE</label>
      <input class="inp" type="password" id="confirmKey" placeholder="••••">
    </div>
    <button class="btn btn-primary btn-full" onclick="changeKey()">Cambiar Clave</button>
  </div>`;

  // Solicitar permiso
  html+=`<div class="card">
    <div class="card-title">📝 Solicitar Permiso</div>
    <div class="field-wrap" style="margin-bottom:10px">
      <label style="display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px">FECHA</label>
      <input class="inp" type="date" id="permDate" value="${new Date().toISOString().slice(0,10)}">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <div class="sel-wrap" style="flex:1"><label>DESDE</label><input class="inp" type="time" id="permFrom" value="08:00"></div>
      <div class="sel-wrap" style="flex:1"><label>HASTA</label><input class="inp" type="time" id="permTo" value="12:00"></div>
    </div>
    <div class="field-wrap" style="margin-bottom:12px">
      <label style="display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px">MOTIVO</label>
      <textarea class="textarea" id="permReason" placeholder="Describe el motivo del permiso"></textarea>
    </div>
    <button class="btn btn-primary btn-full" onclick="submitPerm()">Enviar Solicitud</button>
  </div>`;

  // Mis permisos
  if(myPerms.length>0){
    html+=`<div class="card"><div class="card-title">📋 Mis Permisos</div>`;
    myPerms.forEach(p=>{
      const stCls={pendiente:"perm-pend",aprobado:"perm-ok",rechazado:"perm-rej"}[p.status]||"perm-pend";
      html+=`<div class="stat-row">
        <div><div style="font-size:13px;font-weight:600">${p.date}</div><div style="font-size:11px;color:var(--text2)">${p.timeFrom}–${p.timeTo} · ${p.reason}</div></div>
        <span class="perm-status ${stCls}">${p.status||"pendiente"}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  // Director: Observaciones
  if(isDirector){
    const dirCourse=(db.courses||[]).find(c=>c.directorId===t.id);
    if(dirCourse){
      const obsKey=`${dirCourse.id}_${period}`;
      if(!db.observations) db.observations={};
      const obs=db.observations[obsKey]||{};
      const students=getActiveStudents(dirCourse);
      html+=`<div class="card"><div class="card-title">📝 Observaciones del Curso — ${dirCourse.name}</div>`;
      students.forEach((s,si)=>{
        html+=`<div style="margin-bottom:10px">
          <label style="display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px">${s.firstLastName||""} ${s.firstName||""}</label>
          <textarea class="textarea" rows="2" placeholder="Observación para el boletín..."
            oninput="updateObs('${obsKey}',${si},this.value)"
          >${obs[String(si)]||""}</textarea>
        </div>`;
      });
      html+=`<button class="btn btn-primary btn-full" onclick="saveObs('${obsKey}')">💾 Guardar Observaciones</button></div>`;
    }
  }

  // Cerrar sesión
  html+=`<button class="btn btn-red btn-full" style="margin-top:4px" onclick="logout()">🚪 Cerrar Sesión</button>`;

  cont.innerHTML=html;
}

window.changeKey=function(){
  const oldKey=document.getElementById("oldKey").value;
  const newKey=document.getElementById("newKey").value;
  const confirmKey=document.getElementById("confirmKey").value;
  if(!oldKey||!newKey||!confirmKey){ toast("Completa todos los campos","error"); return; }
  if(oldKey!==session.teacher.key){ toast("Clave actual incorrecta","error"); return; }
  if(newKey!==confirmKey){ toast("Las claves no coinciden","error"); return; }
  if(newKey.length<4){ toast("La clave debe tener al menos 4 caracteres","error"); return; }
  const ti=(db.teachers||[]).findIndex(t=>t.id===session.teacherId);
  if(ti<0) return;
  db.teachers[ti].key=newKey;
  session.teacher.key=newKey;
  saveDB().then(()=>{ toast("Clave actualizada ✅","success"); renderPerfil(); });
};

window.submitPerm=function(){
  const date=document.getElementById("permDate").value;
  const from=document.getElementById("permFrom").value;
  const to=document.getElementById("permTo").value;
  const reason=document.getElementById("permReason").value.trim();
  if(!date||!from||!to||!reason){ toast("Completa todos los campos","error"); return; }
  if(!db.absences) db.absences=[];
  db.absences.push({ id:makeId(), teacherId:session.teacherId, date, timeFrom:from, timeTo:to, reason, status:"pendiente" });
  saveDB().then(()=>{ toast("Solicitud enviada ✅","success"); renderPerfil(); });
};

window.updateObs=function(key,si,val){
  if(!db.observations) db.observations={};
  if(!db.observations[key]) db.observations[key]={};
  db.observations[key][String(si)]=val;
  scheduleSave();
};

window.saveObs=function(key){
  saveDB().then(()=>toast("Observaciones guardadas ✅","success"));
};

window.logout=function(){
  if(!confirm("¿Cerrar sesión?")) return;
  localStorage.removeItem("session");
  location.reload();
};

// ─── MODAL ───────────────────────────────────────────────
window.openModal=function(){
  document.getElementById("modalOverlay").classList.add("active");
};
window.closeModal=function(){
  document.getElementById("modalOverlay").classList.remove("active");
};
document.getElementById("modalOverlay").addEventListener("click",e=>{
  if(e.target===document.getElementById("modalOverlay")) closeModal();
});

// ─── INIT ────────────────────────────────────────────────
async function init(){
  document.getElementById("versionLabel").textContent=APP_VERSION;
  // Check session
  const sess=localStorage.getItem("session");
  if(sess){
    try {
      const parsed=JSON.parse(sess);
      await loadDB();
      const teacher=(db.teachers||[]).find(t=>t.id===parsed.teacherId);
      if(teacher){
        session.teacherId=teacher.id; session.teacher=teacher;
        document.getElementById("loginScreen").style.display="none";
        document.getElementById("loadingScreen").style.display="none";
        startApp();
        return;
      }
    } catch(e){}
  }
  document.getElementById("loadingScreen").style.display="none";
  document.getElementById("loginScreen").style.display="flex";

  // Enter key login
  ["loginUser","loginPass"].forEach(id=>{
    document.getElementById(id).addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
  });
}

init();
</script>
