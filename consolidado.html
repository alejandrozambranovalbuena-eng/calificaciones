<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consolidado — I.E.T. Liceo Moderno Suesca</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --rojo:#c0392b;--rojo-dark:#922b21;--rojo-light:#f5b7b1;
  --azul:#1a237e;--azul-mid:#283593;--azul-light:#c5cae9;--azul-soft:#e8eaf6;
  --gris-bg:#f4f5f7;--gris-borde:#dde1ea;--gris-txt:#6b7280;
  --txt:#1c1f2e;--blanco:#ffffff;
  --verde:#27ae60;--verde-bg:#d5f5e3;
  --amarillo:#f39c12;--amarillo-bg:#fef9e7;
  --rojo-bg:#fce4e4;--azul-num-bg:#e3f2fd;
  --superior:#1565c0;--alto:#2e7d32;--basico:#7b5800;--bajo:#c62828;
  --sidebar-w:240px;--topbar-h:60px;--r:8px;
  --shadow:0 2px 8px rgba(0,0,0,.10);--shadow-md:0 4px 20px rgba(0,0,0,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--gris-bg);color:var(--txt);font-size:14px;line-height:1.5;}
.mono{font-family:'JetBrains Mono',monospace;}

/* APP SHELL */
#app{display:block;min-height:100vh;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--topbar-h);background:linear-gradient(90deg,var(--azul) 0%,var(--rojo) 100%);display:flex;align-items:center;padding:0 20px;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.topbar-logo{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;color:white;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:white;flex:1;line-height:1.2;}
.topbar-title span{font-size:11px;font-weight:400;opacity:.8;display:block;}
.topbar-period{background:rgba(255,255,255,.18);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:white;}
.btn-menu{display:none;background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:4px;}

.sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--blanco);border-right:1px solid var(--gris-borde);overflow-y:auto;z-index:90;padding:16px 0;transition:transform .3s;}
.sidebar-section-label{font-size:10px;font-weight:700;color:var(--gris-txt);letter-spacing:.08em;text-transform:uppercase;padding:12px 20px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:background .15s;font-size:13px;font-weight:500;color:var(--txt);border-left:3px solid transparent;user-select:none;}
.nav-item:hover{background:var(--gris-bg);}
.nav-item.active{background:var(--azul-soft);border-left-color:var(--azul);color:var(--azul);font-weight:700;}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sidebar-divider{height:1px;background:var(--gris-borde);margin:8px 16px;}
.content{margin-left:var(--sidebar-w);margin-top:var(--topbar-h);padding:28px;min-height:calc(100vh - var(--topbar-h));}

/* CARDS */
.section-title{font-size:20px;font-weight:800;color:var(--txt);margin-bottom:4px;}
.section-sub{font-size:13px;color:var(--gris-txt);margin-bottom:24px;}
.card{background:var(--blanco);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--blanco);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);border-top:3px solid var(--azul);}
.stat-card.verde{border-top-color:var(--verde);}
.stat-card.amarillo{border-top-color:var(--amarillo);}
.stat-card.rojo{border-top-color:var(--rojo);}
.stat-label{font-size:11px;font-weight:600;color:var(--gris-txt);text-transform:uppercase;letter-spacing:.06em;}
.stat-value{font-size:32px;font-weight:800;color:var(--txt);margin:4px 0 2px;font-family:'JetBrains Mono',monospace;}
.stat-detail{font-size:12px;color:var(--gris-txt);}

/* TABLES */
.table-wrap{overflow-x:auto;border-radius:var(--r);}
table{border-collapse:collapse;width:100%;font-size:13px;background:var(--blanco);}
th{background:var(--azul);color:white;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.04em;white-space:nowrap;}
th.center{text-align:center;}
td{padding:9px 12px;border-bottom:1px solid var(--gris-borde);vertical-align:middle;}
tr:hover td{background:var(--azul-soft);}
tr:last-child td{border-bottom:none;}
.nota-cell{text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:4px 7px;border-radius:5px;white-space:nowrap;display:inline-block;}
.nota-superior{background:var(--azul-num-bg);color:var(--superior);}
.nota-alto{background:var(--verde-bg);color:var(--alto);}
.nota-basico{background:var(--amarillo-bg);color:var(--basico);}
.nota-bajo{background:var(--rojo-bg);color:var(--bajo);}
.nota-empty{color:var(--gris-txt);font-weight:400;}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.badge-verde{background:var(--verde-bg);color:var(--verde);}
.badge-amarillo{background:var(--amarillo-bg);color:var(--basico);}
.badge-rojo{background:var(--rojo-bg);color:var(--bajo);}
.badge-azul{background:var(--azul-soft);color:var(--azul);}
.badge-gris{background:var(--gris-bg);color:var(--gris-txt);}
.badge-naranja{background:#fff3e0;color:#e65100;}

/* FILTERS */
.filters-bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:20px;}
.filters-bar select{padding:8px 12px;border:2px solid var(--gris-borde);border-radius:var(--r);font-family:inherit;font-size:13px;background:var(--blanco);outline:none;cursor:pointer;transition:border .2s;min-width:140px;}
.filters-bar select:focus{border-color:var(--azul);}
.btn{padding:8px 18px;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:opacity .2s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--azul);color:white;}
.btn-outline{background:transparent;border:2px solid var(--azul);color:var(--azul);}

/* PROGRESS */
.progress-bar-wrap{background:var(--gris-borde);border-radius:20px;height:8px;overflow:hidden;flex:1;}
.progress-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--azul),var(--verde));transition:width .5s ease;}

/* ALERTS */
.alert-group{margin-bottom:20px;}
.alert-group-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:10px;}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:var(--r);margin-bottom:8px;font-size:13px;border:1px solid;}
.alert-critico{background:var(--rojo-bg);border-color:var(--rojo-light);color:#7b1212;}
.alert-advertencia{background:var(--amarillo-bg);border-color:#f9d68a;color:var(--basico);}
.alert-info{background:var(--azul-soft);border-color:var(--azul-light);color:var(--azul);}

/* RANKING */
.ranking-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:var(--r);background:var(--blanco);margin-bottom:8px;box-shadow:var(--shadow);transition:transform .15s;}
.ranking-row:hover{transform:translateX(3px);}
.rank-pos{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;width:36px;text-align:center;flex-shrink:0;}
.rank-pos.gold{color:#d4a017;}.rank-pos.silver{color:#9e9e9e;}.rank-pos.bronze{color:#8b5e3c;}.rank-pos.normal{color:var(--gris-txt);font-size:14px;}

/* CHART */
.chart-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.chart-bar-label{font-size:12px;font-weight:600;width:120px;flex-shrink:0;text-align:right;}
.chart-bar-track{flex:1;background:var(--gris-borde);border-radius:20px;height:24px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:20px;display:flex;align-items:center;padding-left:10px;}
.chart-bar-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:white;}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

/* FUENTE BADGE */
.fuente-badge{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;vertical-align:middle;margin-left:4px;}
.fuente-grades{background:#e8f5e9;color:#1b5e20;}
.fuente-backup{background:#fff3e0;color:#e65100;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.spinner{width:40px;height:40px;border:4px solid var(--gris-borde);border-top-color:var(--azul);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--gris-txt);}
.empty-state .icon{font-size:40px;margin-bottom:10px;}

/* CONFIG */
.config-item{padding:16px 0;border-bottom:1px solid var(--gris-borde);display:flex;align-items:center;gap:16px;}
.config-item label{flex:1;font-size:14px;font-weight:600;}

/* RESPONSIVE */
@media(max-width:768px){
  .btn-menu{display:block;}
  .sidebar{transform:translateX(-100%);width:260px;z-index:150;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.2);}
  .content{margin-left:0;padding:16px;}
  .two-col{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .topbar-period{display:none;}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <button class="btn-menu" onclick="toggleSidebar()">☰</button>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, collection, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const APP_VERSION = "v3.0";

const FC = {
  apiKey:"AIzaSyBoQmO-jPv9b5VnKpoBA9g_GhIdHC9q7I0",
  authDomain:"liceo-suesca-notas.firebaseapp.com",
  projectId:"liceo-suesca-notas",
  storageBucket:"liceo-suesca-notas.firebasestorage.app",
  messagingSenderId:"1000406739498",
  appId:"1:1000406739498:web:0a4f75c4e7e8c03f9a4e2a"
};

const fbApp = getApps().length>0 ? getApp() : initializeApp(FC);
const fireDb = getFirestore(fbApp);

// ═══════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════
window._DB  = null;
window._CFG = { mostrarFallas:true, mostrarPuesto:true, mostrarLogros:true, piePagina:"" };

// Estadísticas de fuentes de datos
let _fuenteStats = { grades:0, backups:0, totalKeys:0 };

// ═══════════════════════════════════════════════════
// KEY BUILDER — igual que docentes.html línea 370
// periodo es "2" no "P2"
// ═══════════════════════════════════════════════════
function gk(tId,sId,cId,p){ return `${tId}_${sId}__${cId}_${p}`; }
// Para LOGROS (linea 1357 docentes.html): guion simple entre todos
// Para LOGROS — docentes.html línea 1357: GUIÓN SIMPLE entre todos
// `${sess.tId}_${lState.sId}_${lState.cId}_${lState.per}`
function lk(tId,sId,cId,p){ return `${tId}_${sId}_${cId}_${p}`; }

// ═══════════════════════════════════════════════════
// CARGA DE DATOS — 3 FUENTES para no perder ninguna nota
//
// FUENTE 1: grades/{teacherId}          → notas guardadas normalmente
// FUENTE 2: teacher_backups/{tId_fecha} → backups automáticos por docente
// FUENTE 3: backups/consolidado-{fecha} → backup del propio consolidado
//
// Para cada key, gana la versión con MÁS gradeValues (más notas)
// ═══════════════════════════════════════════════════
async function loadData(){
  setLoading(true,'Cargando estructura institucional...');
  try {
    // ── PASO 1: system/data ──────────────────────
    const snap = await getDoc(doc(fireDb,"system","data"));
    if(!snap.exists()) throw new Error("No existe system/data en Firebase");
    const data = snap.data();

    // ── PASO 2: grades/ (fuente principal) ───────
    setLoading(true,'Leyendo notas de docentes (grades/)...');
    const gradesSnap = await getDocs(collection(fireDb,"grades"));
    const allGrades  = {}; // key → {categories, gradeValues, _fuente}
    const docentesConNotas = [];
    _fuenteStats = { grades:0, backups:0, totalKeys:0 };

    gradesSnap.forEach(docSnap => {
      const tData  = docSnap.data();
      const tGrades = tData.grades || {};
      const n = Object.keys(tGrades).length;
      if(n > 0){
        docentesConNotas.push({
          id: docSnap.id,
          name: tData.teacherName || docSnap.id,
          numKeys: n,
          updatedAt: tData.updatedAt || null,
          fuente: 'grades'
        });
        Object.entries(tGrades).forEach(([k,v]) => {
          allGrades[k] = { ...v, _fuente:'grades' };
          _fuenteStats.grades++;
        });
      }
      console.log(`[grades/${docSnap.id}] keys: ${n}`);
    });

    // ── PASO 3: teacher_backups/ (fuente secundaria) ──
    setLoading(true,'Revisando backups de docentes...');
    try {
      const backupSnap = await getDocs(collection(fireDb,"teacher_backups"));
      console.log(`[teacher_backups] documentos: ${backupSnap.size}`);

      // Agrupar por teacherId para quedarnos solo con el más reciente
      const backupPorDocente = {};
      backupSnap.forEach(docSnap => {
        const bData = docSnap.data();
        const tId   = bData.teacherId || docSnap.id.split('_')[0];
        const savedAt = bData.savedAt || 0;
        if(!backupPorDocente[tId] || savedAt > backupPorDocente[tId].savedAt){
          backupPorDocente[tId] = { ...bData, _docId: docSnap.id, savedAt };
        }
      });

      // Fusionar: para cada key, gana quien tiene MÁS gradeValues
      Object.entries(backupPorDocente).forEach(([tId, bData]) => {
        const bGrades = bData.grades || {};
        Object.entries(bGrades).forEach(([k,v]) => {
          const vExisting = allGrades[k];
          const existingCount = vExisting ? Object.keys(vExisting.gradeValues||{}).length : -1;
          const backupCount   = Object.keys(v.gradeValues||{}).length;

          if(backupCount > existingCount){
            // El backup tiene MÁS notas → usar el backup
            allGrades[k] = { ...v, _fuente:'backup' };
            _fuenteStats.backups++;
            console.log(`[BACKUP ganó] key="${k}" backup:${backupCount} > grades:${existingCount}`);
          } else if(!vExisting && backupCount > 0){
            // La key no existía en grades/ → tomarla del backup
            allGrades[k] = { ...v, _fuente:'backup' };
            _fuenteStats.backups++;
            console.log(`[BACKUP nuevo] key="${k}" no estaba en grades, backup:${backupCount}`);
          }
          // Si grades tiene igual o más notas → mantener grades (ya está)
        });
      });
    } catch(e){
      console.warn('[teacher_backups] No se pudo leer o no existe:',e.message);
    }

    _fuenteStats.totalKeys = Object.keys(allGrades).length;
    console.log(`TOTAL keys consolidadas: ${_fuenteStats.totalKeys} (grades:${_fuenteStats.grades}, backups:${_fuenteStats.backups})`);

    // ── PASO 3B: Logros desde system/data.logros ────
    // docentes.html guarda logros en system/data (saveDB línea 418)
    // key format: teacherId_subjectId_courseId_periodo (guión simple — línea 1357)
    const allLogros = data.logros || {};
    console.log(`[logros system/data] keys: ${Object.keys(allLogros).length}`);
    Object.keys(allLogros).forEach(k => {
      const items = allLogros[k] || [];
      const conTexto = items.filter(x=>x&&x.text&&x.text.trim()).length;
      console.log(`[logros] key="${k}" | items: ${items.length} | con texto: ${conTexto}`);
    });

    // ── PASO 4: Consolidar ────────────────────────
    window._DB = { ...data, grades: allGrades, logros: allLogros, _docentesConNotas: docentesConNotas };

    if(data.schoolInfo?.boletinConfig){
      Object.assign(window._CFG, data.schoolInfo.boletinConfig);
    }

    // Topbar
    const si = data.schoolInfo || {};
    const period = String(si.activePeriod || '2');
    document.getElementById('topbar-period').textContent =
      `Periodo ${period} · ${si.year || new Date().getFullYear()}`;

    const fuenteTxt = _fuenteStats.backups > 0
      ? `📦 ${_fuenteStats.totalKeys} keys (${_fuenteStats.backups} de backups)`
      : `✅ ${_fuenteStats.totalKeys} keys cargadas`;
    document.getElementById('topbar-fuente').textContent = fuenteTxt;

    setLoading(false);
    renderView('resumen');

  } catch(e){
    setLoading(false);
    document.getElementById('view-resumen').innerHTML = `
      <div class="card" style="border-top:4px solid var(--rojo);">
        <div style="font-size:16px;font-weight:800;color:var(--rojo);margin-bottom:8px;">❌ Error al cargar datos</div>
        <div style="font-size:13px;color:#555;margin-bottom:16px;">${e.message}</div>
        <button class="btn btn-primary" onclick="location.reload()">🔄 Reintentar</button>
      </div>`;
  }
}

// ═══════════════════════════════════════════════════
// CÁLCULO DE NOTA — igual que docentes.html calcAll()
// ═══════════════════════════════════════════════════
function calcSG(cats, vals, si, total){
  let fg=0, any=false;
  (cats||[]).forEach(cat => {
    if(!cat.activities?.length) return;
    if(cat.type === "puntos"){
      const act = cat.activities[0];
      let mx=0;
      for(let i=0;i<total;i++){
        const v=vals[`${i}_${cat.id}_${act.id}`];
        if(v!==undefined&&v!==null&&v!==""){const pv=parseFloat(v);if(pv>mx)mx=pv;}
      }
      const vRaw=vals[`${si}_${cat.id}_${act.id}`];
      if(vRaw!==undefined&&vRaw!==null&&vRaw!==""){
        any=true;
        const mp=parseFloat(vRaw)||0;
        fg+=(mx>0&&mp>0?Math.min((mp/mx)*4+1,5):1)*(parseFloat(cat.pct)/100);
      }
    } else {
      let cs=0,cc=0;
      (cat.activities||[]).forEach(act=>{
        const v=vals[`${si}_${cat.id}_${act.id}`];
        if(v!==undefined&&v!==null&&v!==""){cs+=parseFloat(v);cc++;any=true;}
      });
      if(cc>0) fg+=(cs/cc)*(parseFloat(cat.pct)/100);
    }
  });
  return any ? Math.round(fg*100)/100 : null;
}

function calcStudentGrade(courseId, subjectId, studentIdx, period){
  if(!window._DB) return null;
  const { grades={}, teachers=[], courses=[] } = window._DB;

  const teacher = teachers.find(t =>
    (t.assignments||[]).some(a => a.subjectId===subjectId && a.courseId===courseId)
  );
  if(!teacher) return null;

  const key = gk(teacher.id, subjectId, courseId, String(period));
  const gd  = grades[key];
  if(!gd) return null;

  const cats    = gd.categories || [];
  const vals    = gd.gradeValues || {};
  const totalPct = cats.reduce((s,c)=>s+(parseFloat(c.pct)||0),0);
  if(cats.length>0 && Math.abs(totalPct-100)>0.5) return null;

  const course = courses.find(c=>c.id===courseId);
  const total  = (course?.students||[]).length;

  return calcSG(cats, vals, studentIdx, total);
}

function getGradeFuente(courseId, subjectId, period){
  if(!window._DB) return null;
  const { grades={}, teachers=[] } = window._DB;
  const teacher = teachers.find(t =>
    (t.assignments||[]).some(a => a.subjectId===subjectId && a.courseId===courseId)
  );
  if(!teacher) return null;
  const key = gk(teacher.id, subjectId, courseId, String(period));
  return grades[key]?._fuente || null;
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function nivelNota(n){
  if(n===null||n===undefined) return {text:'—',clase:'nota-empty',nivel:'none'};
  if(n>=4.6) return {text:n.toFixed(2),clase:'nota-superior',nivel:'Superior'};
  if(n>=4.0) return {text:n.toFixed(2),clase:'nota-alto',nivel:'Alto'};
  if(n>=3.6) return {text:n.toFixed(2),clase:'nota-basico',nivel:'Básico'};
  return         {text:n.toFixed(2),clase:'nota-bajo',nivel:'Bajo'};
}

function getActivePeriod(){
  return String(window._DB?.schoolInfo?.activePeriod || '2');
}

function getPeriodOptions(sel){
  const s = sel || getActivePeriod();
  return ['1','2','3','4'].map(p=>
    `<option value="${p}" ${p===s?'selected':''}>${p}</option>`
  ).join('');
}

function getOrderedCourses(){
  return [...(window._DB?.courses||[])].sort((a,b)=>(a.order||0)-(b.order||0));
}

function getActiveStudents(course){
  return (course.students||[]).filter(s=>(s.status||'').toLowerCase()!=='retirado');
}

function studentName(s){
  return [s.firstLastName,s.secondLastName,s.firstName,s.secondName].filter(Boolean).join(' ');
}

function getCourseOptions(sel){
  return getOrderedCourses().map(c=>
    `<option value="${c.id}" ${c.id===sel?'selected':''}>${c.name}</option>`
  ).join('');
}

function getCourseSubjects(courseId){
  const { teachers=[], subjects=[] } = window._DB||{};
  return subjects.filter(sub=>
    teachers.some(t=>(t.assignments||[]).some(a=>a.subjectId===sub.id&&a.courseId===courseId))
  );
}

function colorBar(avg){
  if(avg===null) return '#bdc3c7';
  if(avg>=4.6) return '#1565c0';
  if(avg>=4.0) return '#2e7d32';
  if(avg>=3.6) return '#f57f17';
  return '#c62828';
}

function semaforo(avg){
  if(avg===null) return '⚫';
  if(avg>=3.6) return '🟢';
  if(avg>=3.0) return '🟡';
  return '🔴';
}

function setLoading(show, msg='Cargando...'){
  document.getElementById('loading').style.display = show?'flex':'none';
  if(msg) document.getElementById('loading-msg').textContent = msg;
}

}

function renderResumen(){
  if(!window._DB) return;
  const { courses=[], teachers=[], schoolInfo={}, _docentesConNotas=[] } = window._DB;
  const period = getActivePeriod();

  let totalEst=0, allNotas=[], completedMats=0, totalMats=0;
  const courseAvgs=[];

  getOrderedCourses().forEach(course=>{
    const students = getActiveStudents(course);
    totalEst += students.length;
    const subs = getCourseSubjects(course.id);
    let cSum=0, cCount=0;

    subs.forEach(sub=>{
      const teacher = teachers.find(t=>(t.assignments||[]).some(a=>a.subjectId===sub.id&&a.courseId===course.id));
      if(!teacher) return;
      totalMats++;
      const gd  = window._DB.grades[gk(teacher.id,sub.id,course.id,period)];
      const cats = gd?.categories||[];
      const pctOk = cats.length>0 && Math.abs(cats.reduce((s,c)=>s+(parseFloat(c.pct)||0),0)-100)<=0.5;
      let allFilled = pctOk;

      students.forEach((st,idx)=>{
        const n = calcStudentGrade(course.id,sub.id,idx,period);
        if(n!==null){allNotas.push(n);cSum+=n;cCount++;}
        else allFilled=false;
      });
      if(allFilled&&students.length>0) completedMats++;
    });

    const avg = cCount>0 ? Math.round(cSum/cCount*100)/100 : null;
    courseAvgs.push({name:course.name,avg});
  });

  const promG = allNotas.length>0
    ? (allNotas.reduce((s,v)=>s+v,0)/allNotas.length).toFixed(2) : '—';

  // Info de fuentes
  const keysDesdeBackup = Object.values(window._DB.grades||{}).filter(g=>g._fuente==='backup').length;

  document.getElementById('view-resumen').innerHTML=`
    <div class="section-title">📊 Resumen General</div>
    <div class="section-sub">Periodo ${period} · ${schoolInfo.year||new Date().getFullYear()} · ${APP_VERSION}</div>

    ${keysDesdeBackup>0?`
    <div class="card" style="margin-bottom:20px;border-left:4px solid #e65100;background:#fff3e0;">
      <div style="font-weight:800;color:#e65100;margin-bottom:4px;">⚠️ ${keysDesdeBackup} materia(s) cargadas desde backup de docente</div>
      <div style="font-size:12px;color:#7b5800;">Estas notas provienen de <code>teacher_backups/</code> porque en <code>grades/</code> tenían menos datos. Pídele al docente que abra <strong>docentes.html</strong> y presione Guardar para sincronizar.</div>
    </div>`:
    `<div class="card" style="margin-bottom:20px;border-left:4px solid var(--verde);background:var(--verde-bg);">
      <div style="font-weight:800;color:var(--verde);">✅ Todas las notas provienen de grades/ (fuente principal)</div>
    </div>`}

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Estudiantes Activos</div>
        <div class="stat-value mono">${totalEst}</div>
        <div class="stat-detail">${getOrderedCourses().length} cursos</div>
      </div>
      <div class="stat-card verde">
        <div class="stat-label">Promedio General</div>
        <div class="stat-value mono">${promG}</div>
        <div class="stat-detail">${promG!=='—'?nivelNota(parseFloat(promG)).nivel:'Sin notas aún'}</div>
      </div>
      <div class="stat-card amarillo">
        <div class="stat-label">Materias Completas</div>
        <div class="stat-value mono">${completedMats}<span style="font-size:18px;color:#999">/${totalMats}</span></div>
        <div class="stat-detail">${totalMats>0?Math.round(completedMats/totalMats*100):0}% completadas</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Docentes con Notas</div>
        <div class="stat-value mono">${_docentesConNotas.length}<span style="font-size:18px;color:#999">/${(window._DB.teachers||[]).length}</span></div>
        <div class="stat-detail">han subido calificaciones</div>
      </div>
    </div>

    ${_docentesConNotas.length>0?`
    <div class="card" style="margin-bottom:20px;">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px;">✅ Docentes con notas en grades/ — Periodo ${period}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${_docentesConNotas.map(d=>`
          <span class="badge badge-verde">👩‍🏫 ${d.name}
            <span style="font-size:9px;opacity:.8;">${d.numKeys} mat.</span>
            ${d.updatedAt?`<span style="font-size:9px;opacity:.7;">${new Date(d.updatedAt).toLocaleDateString('es-CO')}</span>`:''}
          </span>`).join('')}
      </div>
    </div>`:''}

    <div class="two-col">
      <div class="card">
        <div style="font-weight:700;margin-bottom:16px;font-size:14px;">📈 Rendimiento por Curso</div>
        ${courseAvgs.map(ca=>{
          const pct=ca.avg!==null?Math.round((ca.avg-1)/4*100):0;
          return `<div class="chart-bar-row">
            <div class="chart-bar-label">${ca.name}</div>
            <div class="chart-bar-track">
              <div class="chart-bar-fill" style="width:${pct}%;background:${colorBar(ca.avg)};">
                <span class="chart-bar-val">${ca.avg!==null?ca.avg.toFixed(2):'—'}</span>
              </div>
            </div>
            <span style="font-size:13px;width:20px;">${semaforo(ca.avg)}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div style="font-weight:700;margin-bottom:14px;font-size:14px;">🚦 Semáforo de Cursos</div>
        ${courseAvgs.map(ca=>`
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gris-borde);">
            <span style="font-size:18px;">${semaforo(ca.avg)}</span>
            <span style="flex:1;font-weight:600;font-size:13px;">${ca.name}</span>
            <span class="mono" style="font-size:14px;font-weight:800;color:${colorBar(ca.avg)};">${ca.avg!==null?ca.avg.toFixed(2):'—'}</span>
          </div>`).join('')}
        <div style="margin-top:10px;font-size:11px;color:var(--gris-txt);">🟢 ≥3.6 &nbsp; 🟡 3.0–3.5 &nbsp; 🔴 &lt;3.0</div>
      </div>
    </div>`;
}

window.buildConsolidadoTable = function(){
  if(!window._DB) return;
  const courseId = document.getElementById('cons-course')?.value;
  const period   = document.getElementById('cons-period')?.value||getActivePeriod();
  const wrap     = document.getElementById('consolidado-table-wrap');
  if(!wrap||!courseId) return;

  const course = window._DB.courses?.find(c=>c.id===courseId);
  if(!course){wrap.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Curso no encontrado</p></div>';return;}

  const students   = getActiveStudents(course);
  const courseSubs = getCourseSubjects(courseId);

  if(courseSubs.length===0){
    wrap.innerHTML='<div class="empty-state"><div class="icon">📚</div><p>Sin materias asignadas a este curso</p></div>';
    return;
  }

  // Calcular notas
  const rows = students.map((st,idx)=>{
    const notas  = courseSubs.map(sub=>calcStudentGrade(courseId,sub.id,idx,period));
    const validas = notas.filter(n=>n!==null);
    const prom   = validas.length>0 ? Math.round(validas.reduce((s,v)=>s+v,0)/validas.length*100)/100 : null;
    return {st,idx,notas,prom};
  });

  const aprueban  = rows.filter(r=>r.prom!==null&&r.prom>=3.6).length;
  const reprueban = rows.filter(r=>r.prom!==null&&r.prom<3.6).length;
  const conProm   = rows.filter(r=>r.prom!==null);
  const promCurso = conProm.length>0?(conProm.reduce((s,r)=>s+r.prom,0)/conProm.length).toFixed(2):'—';

  // Cabecera con indicador de fuente por materia
  const headerSubs = courseSubs.map(sub=>{
    const fuente = getGradeFuente(courseId, sub.id, period);
    const fBadge = fuente==='backup'
      ? `<span class="fuente-badge fuente-backup" title="Notas desde backup">BCK</span>`
      : fuente==='grades'
      ? `<span class="fuente-badge fuente-grades" title="Notas desde grades/">OK</span>`
      : '';
    const label = sub.name.length>12 ? sub.name.substring(0,11)+'…' : sub.name;
    return `<th class="center" title="${sub.name}">${label}${fBadge}</th>`;
  }).join('');

  let html=`<div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Estudiante</th>${headerSubs}<th class="center">PROM.</th></tr></thead>
    <tbody>`;

  rows.forEach((row,i)=>{
    html+=`<tr>
      <td class="mono" style="color:var(--gris-txt);font-size:12px;">${String(i+1).padStart(2,'0')}</td>
      <td style="font-weight:600;">${studentName(row.st)}</td>
      ${row.notas.map(n=>{
        const nv=nivelNota(n);
        return `<td style="text-align:center;"><span class="nota-cell ${nv.clase}">${nv.text}</span></td>`;
      }).join('')}
      <td style="text-align:center;">
        ${row.prom!==null
          ?`<span class="nota-cell ${nivelNota(row.prom).clase}" style="font-size:15px;font-weight:800;">${row.prom.toFixed(2)}</span>`
          :`<span class="nota-cell nota-empty">—</span>`}
      </td>
    </tr>`;
  });

  html+=`</tbody></table></div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;font-size:13px;font-weight:600;">
      <span>✅ Aprueban: <strong>${aprueban}/${students.length}</strong> (${students.length?Math.round(aprueban/students.length*100):0}%)</span>
      <span>❌ Reprueban: <strong>${reprueban}</strong></span>
      <span>📊 Promedio: <strong class="mono">${promCurso}</strong></span>
    </div>
    <div style="margin-top:10px;display:flex;gap:12px;flex-wrap:wrap;font-size:11px;align-items:center;">
      <span><span class="nota-cell nota-superior">4.8</span> Superior</span>
      <span><span class="nota-cell nota-alto">4.2</span> Alto</span>
      <span><span class="nota-cell nota-basico">3.7</span> Básico</span>
      <span><span class="nota-cell nota-bajo">2.5</span> Bajo</span>
      <span><span class="nota-cell nota-empty">—</span> Sin nota</span>
      <span><span class="fuente-badge fuente-grades">OK</span> grades/</span>
      <span><span class="fuente-badge fuente-backup">BCK</span> desde backup</span>
    </div>`;

  wrap.innerHTML=html;
};

window.buildRanking = function(){
  if(!window._DB) return;
  const filterCourse = document.getElementById('rank-course')?.value||'';
  const period       = document.getElementById('rank-period')?.value||getActivePeriod();
  const wrap         = document.getElementById('ranking-wrap');
  if(!wrap) return;

  const allRows=[];
  const targetCourses = filterCourse
    ? getOrderedCourses().filter(c=>c.id===filterCourse)
    : getOrderedCourses();

  targetCourses.forEach(course=>{
    const students   = getActiveStudents(course);
    const courseSubs = getCourseSubjects(course.id);
    students.forEach((st,idx)=>{
      const notas=courseSubs.map(sub=>calcStudentGrade(course.id,sub.id,idx,period)).filter(n=>n!==null);
      if(!notas.length) return;
      const prom=Math.round(notas.reduce((s,v)=>s+v,0)/notas.length*100)/100;
      allRows.push({name:studentName(st),courseName:course.name,prom});
    });
  });

  allRows.sort((a,b)=>b.prom-a.prom);

  const dist={Superior:0,Alto:0,'Básico':0,Bajo:0};
  allRows.forEach(r=>{const nv=nivelNota(r.prom);if(nv.nivel!=='none')dist[nv.nivel]=(dist[nv.nivel]||0)+1;});

  if(!allRows.length){
    wrap.innerHTML='<div class="empty-state"><div class="icon">🏅</div><p>No hay notas registradas para el periodo '+period+'</p></div>';
    return;
  }

  const rankHtml=allRows.slice(0,60).map((row,i)=>{
    const nv=nivelNota(row.prom);
    let posClass='normal',posLabel=`${i+1}°`;
    if(i===0){posClass='gold';posLabel='🥇';}
    else if(i===1){posClass='silver';posLabel='🥈';}
    else if(i===2){posClass='bronze';posLabel='🥉';}
    return `<div class="ranking-row">
      <div class="rank-pos ${posClass}">${posLabel}</div>
      <div style="flex:1;">
        <div style="font-weight:700;font-size:14px;">${row.name}</div>
        <div style="font-size:11px;color:var(--gris-txt);">${row.courseName}</div>
      </div>
      <span class="nota-cell ${nv.clase}" style="font-size:16px;font-weight:800;">${row.prom.toFixed(2)}</span>
      <span class="badge badge-azul" style="font-size:10px;width:64px;text-align:center;">${nv.nivel}</span>
    </div>`;
  }).join('');

  wrap.innerHTML=`
    <div class="two-col" style="margin-bottom:20px;">
      <div class="card">
        <div style="font-weight:700;margin-bottom:12px;">📊 Distribución por Nivel</div>
        ${Object.entries(dist).map(([nivel,count])=>{
          const total=allRows.length,pct=total>0?Math.round(count/total*100):0;
          const cols={Superior:'#1565c0',Alto:'#2e7d32','Básico':'#f57f17',Bajo:'#c62828'};
          return `<div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:4px;">
              <span>${nivel}</span><span class="mono">${count} (${pct}%)</span>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" style="width:${pct}%;background:${cols[nivel]||'#999'};"></div>
            </div>
          </div>`;
        }).join('')}
        <div style="margin-top:8px;font-size:12px;color:var(--gris-txt);">Total: <strong>${allRows.length}</strong> estudiantes</div>
      </div>
      <div class="card">
        <div style="font-weight:700;margin-bottom:12px;">🏆 Top 5 — Periodo ${period}</div>
        ${allRows.slice(0,5).map((r,i)=>{
          const nv=nivelNota(r.prom);
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gris-borde);">
            <span style="font-size:18px;">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</span>
            <span style="flex:1;font-size:13px;font-weight:700;">${r.name}<br><span style="font-size:11px;color:var(--gris-txt);font-weight:400;">${r.courseName}</span></span>
            <span class="nota-cell ${nv.clase}">${r.prom.toFixed(2)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    ${rankHtml}
    ${allRows.length>60?`<div style="text-align:center;padding:12px;color:var(--gris-txt);font-size:13px;">... y ${allRows.length-60} más</div>`:''}`;
};

// ═══════════════════════════════════════════════════
// VIEW: ESTADO DE DOCENTES
// ═══════════════════════════════════════════════════
function renderDocentes(){
  if(!window._DB) return;
  const { teachers=[], subjects=[], courses=[], grades={} } = window._DB;
  const period = getActivePeriod();
  let completadas=0,totalItems=0;
  const rows=[];

  teachers.forEach(teacher=>{
    const asigs=teacher.assignments||[];
    if(!asigs.length){
      rows.push({teacher,sub:null,course:null,estado:'sin-asig',pctCats:0,pctNotas:0,notasR:0,notasT:0,fuente:null});
      return;
    }
    asigs.forEach(asig=>{
      const sub   =subjects.find(s=>s.id===asig.subjectId);
      const course=courses.find(c=>c.id===asig.courseId);
      if(!sub||!course)return;
      const key=gk(teacher.id,asig.subjectId,asig.courseId,period);
      const gd =grades[key];
      const students=getActiveStudents(course);
      totalItems++;
      if(!gd||!gd.categories||!gd.categories.length){
        rows.push({teacher,sub,course,estado:'vacio',pctCats:0,pctNotas:0,notasR:0,notasT:0,fuente:null});
        return;
      }
      const cats=gd.categories||[];
      const vals=gd.gradeValues||{};
      const totalPct=cats.reduce((s,c)=>s+(parseFloat(c.pct)||0),0);
      const pctOk=Math.abs(totalPct-100)<=0.5;
      let notasR=0,notasT=0;
      cats.forEach(cat=>(cat.activities||[]).forEach(act=>{
        students.forEach((_,si)=>{
          notasT++;
          const v=vals[`${si}_${cat.id}_${act.id}`];
          if(v!==undefined&&v!==null&&v!=='')notasR++;
        });
      }));
      const pctNotas=notasT>0?Math.round(notasR/notasT*100):0;
      let estado;
      if(!pctOk)estado='pct-mal';
      else if(pctNotas===100){estado='listo';completadas++;}
      else estado='parcial';
      rows.push({teacher,sub,course,estado,pctCats:Math.round(totalPct),pctNotas,notasR,notasT,fuente:gd._fuente||null});
    });
  });

  const pctAvance=totalItems>0?Math.round(completadas/totalItems*100):0;
  const badge=(r)=>{
    if(r.estado==='listo')    return '<span class="badge badge-verde">✅ LISTO</span>';
    if(r.estado==='parcial')  return `<span class="badge badge-amarillo">⏳ ${r.pctNotas}%</span>`;
    if(r.estado==='pct-mal')  return `<span class="badge badge-rojo">⚠️ ${r.pctCats}%≠100</span>`;
    if(r.estado==='vacio')    return '<span class="badge badge-rojo">❌ VACÍO</span>';
    return '<span class="badge badge-gris">🔴 SIN ASIGNAR</span>';
  };
  const fuenteBadge=(f)=> f==='backup'
    ? '<span class="badge badge-naranja" title="Notas desde teacher_backups/">📦 BACKUP</span>'
    : f==='grades'
    ? '<span class="badge badge-verde" style="font-size:9px;">grades/</span>'
    : '';

  document.getElementById('view-docentes').innerHTML=`
    <div class="section-title">👨‍🏫 Estado de Docentes</div>
    <div class="section-sub">Avance en carga de calificaciones — Periodo ${period}</div>
    <div class="card" style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;">Avance institucional: ${completadas}/${totalItems} materias completas</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pctAvance}%"></div></div>
        <span class="mono" style="font-weight:800;font-size:18px;">${pctAvance}%</span>
      </div>
    </div>
    <div class="table-wrap card" style="padding:0;">
    <table>
      <thead><tr><th>Docente</th><th>Materia</th><th>Curso</th><th class="center">%Cat</th><th class="center">Notas</th><th class="center">Fuente</th><th class="center">Estado</th></tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td style="font-weight:600;">${r.teacher.name||r.teacher.id}</td>
          <td>${r.sub?.name||'—'}</td>
          <td>${r.course?.name||'—'}</td>
          <td style="text-align:center;">
            ${r.estado!=='sin-asig'&&r.estado!=='vacio'
              ?`<span class="mono" style="font-weight:700;color:${Math.abs(r.pctCats-100)<=0.5?'var(--verde)':'var(--rojo)'};">${r.pctCats}%</span>`:'—'}
          </td>
          <td style="text-align:center;">
            ${r.notasT>0?`<span class="mono" style="font-size:12px;">${r.notasR}/${r.notasT} (${r.pctNotas}%)</span>`:'—'}
          </td>
          <td style="text-align:center;">${fuenteBadge(r.fuente)}</td>
          <td style="text-align:center;">${badge(r)}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
}

// VIEW: ALERTAS
// ═══════════════════════════════════════════════════
function renderAlertas(){
  if(!window._DB) return;
  const { teachers=[], subjects=[], courses=[], grades={}, schoolInfo={} } = window._DB;
  const period=getActivePeriod();
  const criticos=[],advertencias=[],infos=[];

  // Alerta de backups usados
  const keysBackup=Object.entries(grades).filter(([,v])=>v._fuente==='backup');
  if(keysBackup.length>0){
    keysBackup.forEach(([k])=>{
      const parts=k.split('__');
      const tid=parts[0]?.split('_')[0];
      const t=teachers.find(t2=>t2.id===tid);
      criticos.push(`<strong>${t?.name||tid}</strong> — key <code>${k}</code>: notas tomadas de <strong>teacher_backups/</strong> (el docente debe abrir docentes.html y presionar 💾 Guardar)`);
    });
  }

  teachers.forEach(teacher=>{
    const asigs=teacher.assignments||[];
    if(!asigs.length){advertencias.push(`<strong>${teacher.name||teacher.id}</strong> — sin asignaciones`);return;}
    asigs.forEach(asig=>{
      const sub   =subjects.find(s=>s.id===asig.subjectId);
      const course=courses.find(c=>c.id===asig.courseId);
      if(!sub||!course)return;
      const key=gk(teacher.id,asig.subjectId,asig.courseId,period);
      const gd =grades[key];
      if(!gd||!gd.categories||!gd.categories.length){
        advertencias.push(`<strong>${teacher.name||teacher.id}</strong> — ${sub.name} ${course.name}: sin notas cargadas`);
        return;
      }
      const cats=gd.categories||[];
      const totalPct=cats.reduce((s,c)=>s+(parseFloat(c.pct)||0),0);
      if(Math.abs(totalPct-100)>0.5){
        criticos.push(`<strong>${teacher.name||teacher.id}</strong> — ${sub.name} ${course.name}: categorías suman <strong>${Math.round(totalPct)}%</strong>`);
      } else {
        const students=getActiveStudents(course);
        const vals=gd.gradeValues||{};
        let r=0,t=0;
        cats.forEach(cat=>(cat.activities||[]).forEach(act=>{
          students.forEach((_,si)=>{t++;const v=vals[`${si}_${cat.id}_${act.id}`];if(v!==undefined&&v!==null&&v!=='')r++;});
        }));
        const pct=t>0?Math.round(r/t*100):0;
        if(pct===0)advertencias.push(`<strong>${teacher.name||teacher.id}</strong> — ${sub.name} ${course.name}: 0 notas`);
        else if(pct<100)advertencias.push(`<strong>${teacher.name||teacher.id}</strong> — ${sub.name} ${course.name}: ${r}/${t} notas (${pct}%)`);
        else infos.push(`✅ ${sub.name} — ${course.name}: completo`);
      }
    });
  });

  if(schoolInfo.deadline)infos.push(`📅 Periodo ${period} cierra: <strong>${schoolInfo.deadline}</strong>`);

  document.getElementById('view-alertas').innerHTML=`
    <div class="section-title">⚠️ Alertas y Problemas</div>
    <div class="section-sub">Detectados automáticamente — Periodo ${period}</div>
    ${criticos.length?`<div class="alert-group">
      <div class="alert-group-title" style="color:var(--bajo);">🔴 CRÍTICO (${criticos.length})</div>
      ${criticos.map(m=>`<div class="alert-item alert-critico">⛔ ${m}</div>`).join('')}
    </div>`:''}
    ${advertencias.length?`<div class="alert-group">
      <div class="alert-group-title" style="color:var(--basico);">🟡 ADVERTENCIA (${advertencias.length})</div>
      ${advertencias.map(m=>`<div class="alert-item alert-advertencia">⚠️ ${m}</div>`).join('')}
    </div>`:''}
    <div class="alert-group">
      <div class="alert-group-title" style="color:var(--verde);">🟢 INFORMACIÓN</div>
      ${infos.length?infos.map(m=>`<div class="alert-item alert-info">ℹ️ ${m}</div>`).join('')
        :'<div class="alert-item alert-info">ℹ️ Sin información adicional</div>'}
    </div>
    ${!criticos.length&&!advertencias.length
      ?'<div class="card" style="text-align:center;padding:30px;color:var(--verde);font-weight:700;font-size:16px;">🎉 ¡Sin problemas!</div>':''}`;
}

// Recarga logros frescos desde system/data en Firebase
window.recargarLogros = async function(){
  if(!window._DB) return;
  const wrap = document.getElementById('logros-wrap');
  if(wrap) wrap.innerHTML='<div style="text-align:center;padding:20px;color:var(--gris-txt);">⏳ Actualizando logros desde Firebase...</div>';

  try {
    // Logros están en system/data.logros (docentes.html saveDB línea 418)
    const snap = await getDoc(doc(fireDb,"system","data"));
    if(snap.exists()){
      const freshLogros = snap.data().logros || {};
      window._DB.logros = freshLogros;
      console.log('[recargarLogros] keys encontradas:', Object.keys(freshLogros).length);
      Object.keys(freshLogros).forEach(k => {
        const items = freshLogros[k]||[];
        console.log(`  key="${k}" | items:${items.length} | con texto:${items.filter(x=>x&&x.text).length}`);
      });
    }
  } catch(e) {
    console.warn('[recargarLogros] Error:', e.message);
  }

  buildLogros();
};

window.buildLogros = function(){
  if(!window._DB) return;
  const { teachers=[], subjects=[], courses=[], logros={} } = window._DB;
  const courseId =document.getElementById('log-course')?.value;
  const subjectId=document.getElementById('log-subject')?.value;
  const period   =document.getElementById('log-period')?.value||getActivePeriod();
  const wrap     =document.getElementById('logros-wrap');
  if(!wrap) return;

  // Debug: mostrar todas las keys de logros disponibles en Firebase
  const todasLasLogrosKeys = Object.keys(logros);
  console.log('[Logros] Total keys en system/data.logros:', todasLasLogrosKeys.length);
  todasLasLogrosKeys.forEach(k => console.log('[Logros] key:', k, '| items:', (logros[k]||[]).length));

  const items=[];
  teachers.forEach(teacher=>{
    (teacher.assignments||[]).forEach(asig=>{
      if(courseId&&asig.courseId!==courseId)return;
      if(subjectId&&asig.subjectId!==subjectId)return;
      const sub   =subjects.find(s=>s.id===asig.subjectId);
      const course=courses.find(c=>c.id===asig.courseId);
      if(!sub||!course)return;
      // KEY LOGROS: teacherId_subjectId_courseId_periodo (GUION SIMPLE — igual que docentes.html linea 1357)
      const key=lk(teacher.id,asig.subjectId,asig.courseId,period);
      const arr = logros[key]||[];
      console.log('[Logros] buscando key:', key, '| encontrados:', arr.length);
      items.push({teacher,sub,course,arr,key});
    });
  });

  if(!items.length){
    wrap.innerHTML=`<div class="empty-state"><div class="icon">🎯</div><p>Sin materias asignadas para la selección</p>
      <div style="font-size:12px;margin-top:8px;color:var(--gris-txt);">Keys de logros en Firebase: ${todasLasLogrosKeys.length}</div>
    </div>`;
    return;
  }

  wrap.innerHTML=items.map(item=>{
    const tieneLogros = item.arr.length > 0;
    return `<div class="card" style="margin-bottom:16px;border-left:4px solid ${tieneLogros?'var(--azul)':'var(--gris-borde)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-weight:800;font-size:15px;">${item.sub.name} — ${item.course.name}</div>
          <div style="font-size:12px;color:var(--gris-txt);">👩‍🏫 ${item.teacher.name||item.teacher.id}</div>
          <div style="font-size:10px;color:var(--gris-txt);margin-top:2px;font-family:monospace;">key: ${item.key}</div>
        </div>
        <span class="badge ${tieneLogros?'badge-azul':'badge-gris'}">${item.arr.length} logro(s)</span>
      </div>
      ${!tieneLogros
        ?'<div style="color:var(--gris-txt);font-size:13px;padding:8px 0;">⚠️ Sin logros registrados para este periodo. El docente debe agregarlos desde el portal docente.</div>'
        :item.arr.map((logro,i)=>`
          <div style="border-left:3px solid var(--azul);padding:8px 12px;margin-bottom:10px;background:var(--gris-bg);border-radius:0 var(--r) var(--r) 0;">
            <div style="font-weight:800;font-size:13px;margin-bottom:8px;">📌 Logro ${i+1}: ${logro.text||'—'}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
              <div style="background:var(--azul-num-bg);color:var(--superior);border-radius:4px;padding:6px 8px;font-size:11px;"><strong>⭐ Superior (4.6-5.0)</strong><br>${logro.superior||'—'}</div>
              <div style="background:var(--verde-bg);color:var(--alto);border-radius:4px;padding:6px 8px;font-size:11px;"><strong>🟢 Alto (4.0-4.5)</strong><br>${logro.alto||'—'}</div>
              <div style="background:var(--amarillo-bg);color:var(--basico);border-radius:4px;padding:6px 8px;font-size:11px;"><strong>🟡 Básico (3.6-3.9)</strong><br>${logro.basico||'—'}</div>
              <div style="background:var(--rojo-bg);color:var(--bajo);border-radius:4px;padding:6px 8px;font-size:11px;"><strong>🔴 Bajo (1.0-3.5)</strong><br>${logro.bajo||'—'}</div>
            </div>
          </div>`).join('')}
    </div>`;
  }).join('');
};
