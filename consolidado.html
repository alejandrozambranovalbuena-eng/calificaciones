window.buildRadiografia = function(){
  if(!window._DB) return;
  const courseId = document.getElementById('rad-course')?.value;
  const period   = document.getElementById('rad-period')?.value || getActivePeriod();
  const wrap     = document.getElementById('radiografia-wrap');
  if(!wrap||!courseId) return;

  const {grades={}, teachers=[], subjects=[], courses=[]} = window._DB;
  const course   = courses.find(c=>c.id===courseId);
  if(!course) return;
  const students = getActiveStudents(course);
  const courseSubs = getCourseSubjects(courseId);

  if(!courseSubs.length){
    wrap.innerHTML='<div class="empty-state"><div class="icon">🔬</div><p>Sin materias para este curso</p></div>';
    return;
  }

  // Calcular nota final de cada estudiante por materia
  const matrix = students.map((st,si)=>{
    return {
      st, si,
      notas: courseSubs.map(sub=>{
        const nota = calcStudentGrade(courseId, sub.id, si, period);
        return {sub, nota, nivel: nivelNota(nota)};
      })
    };
  });

  // Promedio por materia (para header semáforo)
  const promPorSub = courseSubs.map(sub=>{
    const ns = students.map((_,si)=>calcStudentGrade(courseId,sub.id,si,period)).filter(n=>n!==null);
    return ns.length>0 ? ns.reduce((s,v)=>s+v,0)/ns.length : null;
  });

  let html = `
  <div style="margin-bottom:8px;font-size:12px;color:var(--gris-txt);">
    💡 Haz clic en cualquier celda de nota para ver el desglose interno por categorías y actividades
  </div>
  <div class="table-wrap" style="overflow-x:auto;">
  <table style="min-width:100%;">
    <thead>
      <tr style="background:var(--azul);">
        <th style="min-width:160px;text-align:left;padding:10px 12px;color:white;position:sticky;left:0;background:var(--azul);z-index:2;">#  Estudiante</th>
        ${courseSubs.map((sub,i)=>{
          const prom = promPorSub[i];
          const nv   = nivelNota(prom);
          const semColor = prom===null?'#9e9e9e':prom>=4.6?'#16a34a':prom>=4.0?'#2563eb':prom>=3.6?'#d97706':'#dc2626';
          const label = sub.name.length>12?sub.name.substring(0,11)+'…':sub.name;
          return `<th class="center" title="${sub.name}" style="min-width:90px;color:white;font-size:10px;padding:6px 4px;">
            <div>${label}</div>
            <div style="font-size:9px;color:${semColor};font-weight:800;margin-top:2px;background:rgba(255,255,255,.15);border-radius:10px;padding:1px 4px;">
              ${prom!==null?prom.toFixed(1):'—'}
            </div>
          </th>`;
        }).join('')}
        <th class="center" style="min-width:70px;background:#c0392b;color:white;font-size:11px;position:sticky;right:0;">PROM.</th>
      </tr>
    </thead>
    <tbody>
    ${matrix.map((row,i)=>{
      const validas = row.notas.filter(n=>n.nota!==null).map(n=>n.nota);
      const prom    = validas.length>0?Math.round(validas.reduce((s,v)=>s+v,0)/validas.length*100)/100:null;
      const promNv  = nivelNota(prom);
      const rowBg   = i%2===0?'#fff':'#f8f9fc';
      return `<tr style="background:${rowBg};">
        <td style="padding:8px 12px;font-weight:600;font-size:12px;position:sticky;left:0;background:${rowBg};z-index:1;border-right:2px solid var(--gris-borde);">
          <span style="color:var(--gris-txt);font-size:10px;margin-right:6px;">${String(i+1).padStart(2,'0')}</span>
          ${studentName(row.st)}
        </td>
        ${row.notas.map(n=>{
          const bg = n.nota===null?''
            :n.nota>=4.6?'rgba(21,101,192,.12)'
            :n.nota>=4.0?'rgba(46,125,50,.12)'
            :n.nota>=3.6?'rgba(123,88,0,.10)'
            :'rgba(198,40,40,.12)';
          return `<td style="text-align:center;background:${bg};cursor:pointer;" 
            onclick="toggleDesglose('${courseId}','${n.sub.id}','${row.si}','${period}')"
            title="Clic para ver desglose interno">
            <span class="nota-cell ${n.nivel.clase}" style="cursor:pointer;">
              ${n.nivel.text}
            </span>
          </td>`;
        }).join('')}
        <td style="text-align:center;position:sticky;right:0;background:${rowBg};border-left:2px solid var(--gris-borde);">
          ${prom!==null?`<span class="nota-cell ${promNv.clase}" style="font-weight:800;">${prom.toFixed(2)}</span>`:'<span style="color:var(--gris-txt);">—</span>'}
        </td>
      </tr>
      <tr id="desglose_${courseId}_${row.si}" style="display:none;">
        <td colspan="${courseSubs.length+2}" style="padding:0;background:#f0f4ff;">
          <div id="desglose_content_${courseId}_${row.si}" style="padding:12px 20px;"></div>
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>
  </div>`;

  wrap.innerHTML = html;
};

window.toggleDesglose = function(courseId, subjectId, studentIdx, period){
  const rowId  = `desglose_${courseId}_${studentIdx}`;
  const contId = `desglose_content_${courseId}_${studentIdx}`;
  const row    = document.getElementById(rowId);
  const cont   = document.getElementById(contId);
  if(!row||!cont) return;

  // Si ya está visible y es la misma materia, cerrar
  if(row.style.display!=='none' && cont.dataset.subjectId===subjectId){
    row.style.display='none';
    return;
  }

  // Mostrar desglose
  row.style.display='';
  cont.dataset.subjectId = subjectId;

  const {grades={}, teachers=[], subjects=[], courses=[]} = window._DB;
  const course  = courses.find(c=>c.id===courseId);
  const sub     = subjects.find(s=>s.id===subjectId);
  const si      = parseInt(studentIdx);
  const p       = String(period);

  // Buscar grade
  let gd = null;
  const teacher = teachers.find(t=>(t.assignments||[]).some(a=>a.subjectId===subjectId&&a.courseId===courseId))
               || teachers.find(t=>{
                    const kD=`_${subjectId}__${courseId}_${p}`;
                    const kS=`_${subjectId}_${courseId}_${p}`;
                    return Object.keys(grades).find(k=>k.startsWith(t.id)&&(k.endsWith(kD)||k.endsWith(kS)));
                  });
  if(teacher){
    gd = grades[gk(teacher.id,subjectId,courseId,p)]
      || grades[`${teacher.id}_${subjectId}_${courseId}_${p}`];
  }
  if(!gd){
    const kD=`_${subjectId}__${courseId}_${p}`;
    const kS=`_${subjectId}_${courseId}_${p}`;
    const fk=Object.keys(grades).find(k=>k.endsWith(kD)||k.endsWith(kS));
    if(fk) gd=grades[fk];
  }

  if(!gd||!gd.categories?.length){
    cont.innerHTML=`<div style="color:var(--gris-txt);font-size:12px;padding:8px;">Sin categorías configuradas para esta materia</div>`;
    return;
  }

  const cats  = gd.categories||[];
  const vals  = gd.gradeValues||{};
  const students = getActiveStudents(course);
  const total = students.length;
  const pctTotal = cats.reduce((s,c)=>s+(parseFloat(c.pct)||0),0);

  // Calcular aportes por categoría
  let aportes=[], pctConNota=0;
  cats.forEach(cat=>{
    const catPct = parseFloat(cat.pct)||0;
    let catNota=null, acts=[];

    if(cat.type==='puntos'){
      const act=cat.activities?.[0];
      if(act){
        let mx=0;
        for(let i=0;i<total;i++){
          const v=vals[`${i}_${cat.id}_${act.id}`];
          if(v!==undefined&&v!==null&&v!==''){const pv=parseFloat(v);if(pv>mx)mx=pv;}
        }
        const vRaw=vals[`${si}_${cat.id}_${act.id}`];
        if(vRaw!==undefined&&vRaw!==null&&vRaw!==''){
          const mp=parseFloat(vRaw)||0;
          catNota = mx>0&&mp>0?Math.min((mp/mx)*4+1,5):1;
          acts=[{name:act.name,valor:mp,max:mx}];
        }
      }
    } else {
      let cs=0,cc=0;
      (cat.activities||[]).forEach(act=>{
        const v=vals[`${si}_${cat.id}_${act.id}`];
        if(v!==undefined&&v!==null&&v!==''){
          cs+=parseFloat(v);cc++;
          acts.push({name:act.name,valor:parseFloat(v)});
        }
      });
      if(cc>0) catNota=cs/cc;
    }

    if(catNota!==null) pctConNota+=catPct;
    aportes.push({cat,catPct,catNota,acts});
  });

  // Nota final redistribuida
  const notaFinal = pctConNota>0
    ? aportes.filter(a=>a.catNota!==null).reduce((s,a)=>s+(a.catNota*a.catPct/pctConNota),0)
    : null;
  const nv = nivelNota(notaFinal!==null?Math.round(notaFinal*100)/100:null);

  cont.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
      <div style="font-weight:800;font-size:13px;color:var(--azul);">
        🔬 ${sub?.name||subjectId} — ${studentName(students[si])}
      </div>
      <div style="font-size:11px;color:var(--gris-txt);">Docente: ${teacher?.name||'—'}</div>
      ${notaFinal!==null?`<span class="nota-cell ${nv.clase}" style="font-size:15px;font-weight:800;">${Math.round(notaFinal*100)/100}</span>`:''}
      ${Math.abs(pctTotal-100)>0.5?`<span style="background:var(--rojo-bg);color:var(--rojo);border-radius:10px;padding:3px 8px;font-size:10px;font-weight:700;">⚠️ Pct suma ${pctTotal}%</span>`:''}
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:11px;">
      <thead>
        <tr style="background:#e8eaf6;">
          <th style="padding:6px 10px;text-align:left;">Categoría</th>
          <th style="padding:6px 10px;text-align:center;">Peso</th>
          <th style="padding:6px 10px;text-align:left;">Actividades</th>
          <th style="padding:6px 10px;text-align:center;">Nota Cat.</th>
          <th style="padding:6px 10px;text-align:center;">Aporte</th>
        </tr>
      </thead>
      <tbody>
        ${aportes.map(a=>{
          const aporte = a.catNota!==null&&pctConNota>0 ? a.catNota*a.catPct/pctConNota : null;
          const catNv  = nivelNota(a.catNota);
          return `<tr style="border-bottom:1px solid #e0e0e0;${a.catNota===null?'opacity:.5':''}">
            <td style="padding:6px 10px;font-weight:700;">${a.cat.name}</td>
            <td style="padding:6px 10px;text-align:center;font-family:'JetBrains Mono',monospace;">${a.catPct}%</td>
            <td style="padding:6px 10px;">
              ${a.acts.length>0
                ? a.acts.map(act=>`<span style="background:#f0f4ff;border-radius:6px;padding:2px 6px;margin:1px;display:inline-block;font-size:10px;">
                    ${act.name}: <strong>${act.valor}${act.max?'/'+act.max:''}</strong>
                  </span>`).join('')
                : '<span style="color:var(--gris-txt);">Sin notas</span>'}
            </td>
            <td style="padding:6px 10px;text-align:center;">
              ${a.catNota!==null?`<span class="nota-cell ${catNv.clase}" style="font-size:12px;">${a.catNota.toFixed(2)}</span>`:'<span style="color:var(--gris-txt);">—</span>'}
            </td>
            <td style="padding:6px 10px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--azul);">
              ${aporte!==null?aporte.toFixed(3):'—'}
            </td>
          </tr>`;
        }).join('')}
        <tr style="background:#e8eaf6;font-weight:800;">
          <td colspan="3" style="padding:8px 10px;text-align:right;">NOTA DEFINITIVA:</td>
          <td colspan="2" style="padding:8px 10px;text-align:center;">
            ${notaFinal!==null
              ?`<span class="nota-cell ${nv.clase}" style="font-size:16px;font-weight:800;">${Math.round(notaFinal*100)/100}</span>`
              :'<span style="color:var(--gris-txt);">Sin notas</span>'}
          </td>
        </tr>
      </tbody>
    </table>
    <div style="font-size:10px;color:var(--gris-txt);margin-top:6px;">
      ⚡ Pct con nota: ${pctConNota}% de ${pctTotal}% total
      ${pctConNota<pctTotal?` · Redistribuido sobre ${pctConNota}%`:''}
    </div>`;
};

window.buildMenciones = function(){
  const courseId = document.getElementById('men-course')?.value||'';
  const period   = document.getElementById('men-period')?.value||getActivePeriod();
  const top      = parseInt(document.getElementById('men-top')?.value||3);
  const wrap     = document.getElementById('mencion-wrap');
  if(!wrap) return;

  const {courses=[], teachers=[]} = window._DB;
  const targetCourses = courseId
    ? courses.filter(c=>c.id===courseId)
    : getOrderedCourses().filter(c=>getActiveStudents(c).length>0);

  let html='';
  targetCourses.forEach(course=>{
    const students = getActiveStudents(course);
    const courseSubs = getCourseSubjects(course.id);
    const director = teachers.find(t=>t.id===course.directorId);

    // Calcular promedio de TODOS los estudiantes con nota (sin cortar aún)
    const todasNotas = students.map((st,idx)=>{
      const notas = courseSubs.map(sub=>calcStudentGrade(course.id,sub.id,idx,period)).filter(n=>n!==null);
      const prom  = notas.length>0?Math.round(notas.reduce((s,v)=>s+v,0)/notas.length*100)/100:null;
      return {st,idx,prom};
    }).filter(f=>f.prom!==null).sort((a,b)=>b.prom-a.prom);

    // Asignar PUESTO REAL con empates: ranking estándar de competencia (1,2,2,4)
    // Si dos o más comparten la misma nota, comparten el mismo puesto
    // y el siguiente puesto salta el número de empatados (estándar olímpico)
    // Usamos Math.abs(...)<0.005 en vez de === para evitar fallos por coma flotante
    todasNotas.forEach((f,idx)=>{
      if(idx>0 && Math.abs(f.prom - todasNotas[idx-1].prom) < 0.005){
        f.puesto = todasNotas[idx-1].puesto; // mismo puesto que el anterior si hay empate
      } else {
        f.puesto = idx+1; // puesto real según posición (considerando empates previos)
      }
    });

    // Filtrar SOLO los que tienen puesto dentro del rango "top" elegido
    // (si hay empate justo en el límite del top, TODOS los empatados se incluyen)
    const filas = todasNotas.filter(f=>f.puesto<=top);

    filas.forEach(f=>{
      html += buildDiplomaHTML(f.st, f.prom, f.puesto, course, period, director);
    });
  });

  wrap.innerHTML = html||'<div class="empty-state"><div class="icon">🏅</div><p>Sin datos para mostrar</p></div>';
};

window.imprimirMenciones = function(){
  const wrap = document.getElementById('mencion-wrap');
  if(!wrap||!wrap.innerHTML.trim()){buildMenciones();setTimeout(imprimirMenciones,500);return;}
  abrirVentanaImpresion(wrap.innerHTML);
};

function buildDiplomaHTML(student, promedio, puesto, course, period, director){
  const {schoolInfo={}} = window._DB||{};
  const si = schoolInfo;
  const fecha = new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});
  const medallas = ['🥇','🥈','🥉'];
  const medalla  = medallas[puesto-1]||`${puesto}°`;
  const puestoTexto = puesto===1?'PRIMER PUESTO':puesto===2?'SEGUNDO PUESTO':puesto===3?'TERCER PUESTO':`PUESTO ${puesto}`;
  const nv = nivelNota(promedio);

  // Colores por puesto
  const coloresPuesto = {
    1: {bg:'linear-gradient(135deg,#d4a017,#f0c040,#d4a017)', border:'#b8860b', text:'#5a3e00'},
    2: {bg:'linear-gradient(135deg,#9e9e9e,#e0e0e0,#9e9e9e)', border:'#757575', text:'#424242'},
    3: {bg:'linear-gradient(135deg,#8b5e3c,#c4956a,#8b5e3c)', border:'#6d4c2a', text:'#3e2000'},
  };
  const col = coloresPuesto[puesto]||{bg:'#f5f5f5',border:'#9e9e9e',text:'#333'};

  return `<div class="boletin-page" style="max-width:820px;min-height:580px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.15);margin:0 auto 40px;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;position:relative;border:3px solid ${col.border};">

    <!-- Fondo decorativo -->
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(212,160,23,.06) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>
    <div style="position:absolute;top:-60px;right:-60px;width:300px;height:300px;border-radius:50%;background:${col.bg};opacity:.08;pointer-events:none;z-index:0;"></div>
    <div style="position:absolute;bottom:-60px;left:-60px;width:250px;height:250px;border-radius:50%;background:${col.bg};opacity:.08;pointer-events:none;z-index:0;"></div>

    <!-- Marca de agua logo -->
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.04;z-index:0;pointer-events:none;">
      <img src="${LOGO_LICEO}" style="width:350px;height:350px;object-fit:contain;">
    </div>

    <!-- Cabecera institucional -->
    <div style="background:linear-gradient(135deg,#1a237e 0%,#c0392b 100%);padding:20px 40px;display:flex;align-items:center;gap:16px;position:relative;z-index:1;">
      <img src="${LOGO_LICEO}" style="width:56px;height:56px;object-fit:contain;background:#fff;padding:4px;border-radius:8px;flex-shrink:0;">
      <div style="flex:1;color:white;">
        <div style="font-size:9px;font-weight:600;letter-spacing:3px;opacity:.85;">REPÚBLICA DE COLOMBIA · MINISTERIO DE EDUCACIÓN NACIONAL</div>
        <div style="font-size:16px;font-weight:800;margin:2px 0;">INSTITUCIÓN EDUCATIVA TÉCNICA — Liceo Moderno · Suesca</div>
        <div style="font-size:10px;opacity:.75;">NIT: ${si.nit||'—'} · DANE: ${si.dane||'—'}</div>
      </div>
    </div>

    <!-- Cuerpo del diploma -->
    <div style="padding:30px 50px;position:relative;z-index:1;text-align:center;">

      <!-- Medalla y puesto -->
      <div style="font-size:72px;margin-bottom:8px;">${medalla}</div>
      <div style="display:inline-block;background:${col.bg};color:${col.text};padding:6px 24px;border-radius:30px;font-size:13px;font-weight:800;letter-spacing:2px;margin-bottom:20px;border:2px solid ${col.border};">
        ${puestoTexto}
      </div>

      <!-- Texto del diploma -->
      <div style="font-size:13px;color:#5a6282;margin-bottom:8px;letter-spacing:1px;">LA INSTITUCIÓN EDUCATIVA TÉCNICA LICEO MODERNO SUESCA</div>
      <div style="font-size:13px;color:#5a6282;margin-bottom:20px;">otorga la presente</div>
      <div style="font-size:22px;font-weight:800;letter-spacing:3px;color:#1a237e;margin-bottom:16px;text-transform:uppercase;">✨ MENCIÓN DE HONOR ✨</div>
      <div style="font-size:13px;color:#5a6282;margin-bottom:8px;">al estudiante</div>

      <!-- Nombre estudiante -->
      <div style="font-size:28px;font-weight:800;color:#1a237e;margin-bottom:6px;letter-spacing:-0.5px;border-bottom:3px double ${col.border};display:inline-block;padding-bottom:6px;">
        ${studentName(student)}
      </div>

      <!-- Datos académicos -->
      <div style="margin:16px 0;display:flex;justify-content:center;gap:20px;flex-wrap:wrap;">
        <div style="padding:10px 20px;background:#f8f9fc;border-radius:10px;border:1px solid #e0e0e0;">
          <div style="font-size:9px;font-weight:700;color:#5a6282;text-transform:uppercase;letter-spacing:1px;">Grado</div>
          <div style="font-size:16px;font-weight:800;color:#1a237e;">${course.name}</div>
        </div>
        <div style="padding:10px 20px;background:#f8f9fc;border-radius:10px;border:1px solid #e0e0e0;">
          <div style="font-size:9px;font-weight:700;color:#5a6282;text-transform:uppercase;letter-spacing:1px;">Periodo</div>
          <div style="font-size:16px;font-weight:800;color:#1a237e;">${period === 'anual'?'Anual':period}</div>
        </div>
        <div style="padding:10px 20px;background:${nv.clase==='nota-superior'?'#dcfce7':nv.clase==='nota-alto'?'#dbeafe':'#fef3c7'};border-radius:10px;border:1px solid ${col.border};">
          <div style="font-size:9px;font-weight:700;color:#5a6282;text-transform:uppercase;letter-spacing:1px;">Promedio</div>
          <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${col.text==='#5a3e00'?'#92400e':col.text};">${promedio.toFixed(2)}</div>
        </div>
        <div style="padding:10px 20px;background:#f8f9fc;border-radius:10px;border:1px solid #e0e0e0;">
          <div style="font-size:9px;font-weight:700;color:#5a6282;text-transform:uppercase;letter-spacing:1px;">Año</div>
          <div style="font-size:16px;font-weight:800;color:#1a237e;">${si.year||new Date().getFullYear()}</div>
        </div>
      </div>

      <div style="font-size:12px;color:#5a6282;margin:16px 0 24px;font-style:italic;line-height:1.6;">
        Por su destacado desempeño académico, disciplina y dedicación durante el periodo lectivo,
        siendo merecedor de este reconocimiento institucional.
      </div>

      <!-- Firmas -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:20px;">
        <div style="text-align:center;">
          <div style="border-top:1.5px solid #1a1d2e;padding-top:6px;">
            <div style="font-size:11px;font-weight:800;text-transform:uppercase;">${si.rectorName||'—'}</div>
            <div style="font-size:10px;font-weight:700;color:#1a237e;letter-spacing:1px;">RECTORA</div>
            <div style="font-size:9px;color:#5a6282;">I.E.T. Liceo Moderno Suesca</div>
          </div>
        </div>
        <div style="text-align:center;">
          <div style="border-top:1.5px solid #1a1d2e;padding-top:6px;">
            <div style="font-size:11px;font-weight:800;text-transform:uppercase;">${director?.name||'—'}</div>
            <div style="font-size:10px;font-weight:700;color:#1a237e;letter-spacing:1px;">DIRECTOR(A) DE CURSO</div>
            <div style="font-size:9px;color:#5a6282;">${course.name}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pie -->
    <div style="background:#1a237e;color:rgba(255,255,255,.7);padding:8px 40px;font-size:9px;display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;position:relative;z-index:1;">
      <span>Mención de Honor · I.E.T. Liceo Moderno Suesca · ${fecha}</span>
      <span>Suesca, Cundinamarca · Colombia</span>
    </div>
  </div>`;
}

window.guardarConducta = async function(courseId, period){
  const course   = window._DB.courses?.find(c=>c.id===courseId);
  if(!course) return;
  const students = getActiveStudents(course);
  const status   = document.getElementById('cond-status');

  // Recoger valores
  const conductaData = { _updatedAt: Date.now(), _updatedBy: 'admin', courseId, period };
  students.forEach((_,idx)=>{
    const input = document.getElementById(`cond_${idx}`);
    const val   = parseFloat(input?.value||'5');
    conductaData[String(idx)] = isNaN(val)?5.0:Math.min(5,Math.max(1,Math.round(val*10)/10));
  });

  if(status) status.textContent = '⏳ Guardando...';
  try {
    const docKey = `${courseId}_${period}`;
    await setDoc(doc(fireDb,'conducta',docKey), conductaData);
    if(!window._CONDUCTA) window._CONDUCTA={};
    window._CONDUCTA[docKey] = conductaData;
    if(status){
      status.textContent = '✅ Guardado correctamente';
      status.style.color = 'var(--verde)';
      setTimeout(()=>{ if(status) status.textContent=''; }, 3000);
    }
    console.log('[conducta] Guardado:', docKey, Object.keys(conductaData).length-3, 'estudiantes');
  } catch(e){
    if(status){ status.textContent='❌ Error: '+e.message; status.style.color='var(--rojo)'; }

// Colores y escala
const ESCALA = [
  {level:"superior",label:"Superior",min:4.6,max:5.0,color:"#16a34a",bg:"#dcfce7"},
  {level:"alto",    label:"Alto",    min:4.0,max:4.5,color:"#2563eb",bg:"#dbeafe"},
  {level:"basico",  label:"Básico",  min:3.6,max:3.9,color:"#d97706",bg:"#fef3c7"},
  {level:"bajo",    label:"Bajo",    min:1.0,max:3.5,color:"#dc2626",bg:"#fee2e2"},
];

function getNivel(nota){
  if(nota===null||nota===undefined) return null;
  const n=parseFloat(nota);
  // Misma tolerancia que nivelNota para mantener consistencia entre
  // el consolidado y el boletín ante errores de coma flotante
  const nn = Math.round(n*1000)/1000;
  if(nn>=4.6-0.005) return ESCALA[0];
  if(nn>=4.0-0.005) return ESCALA[1];
  if(nn>=3.6-0.005) return ESCALA[2];
  return ESCALA[3];
}

function isPreescolar(courseName){
  const n=(courseName||'').toUpperCase();
  return n.includes("PREKINDER")||n.includes("KINDER")||n.includes("TRANSICI");
}

function getEmoji(nivel){
  if(!nivel) return '–';
  const map={superior:'😄',alto:'🙂',basico:'😐',bajo:'😟'};
  return map[nivel.level]||'–';
}

// Contar fallas del estudiante en el periodo
function contarFallas(courseId, studentIdx, period){
  const att = window._DB?.attendance || {};
  let fallas=0, tardanzas=0, excusas=0;
  Object.keys(att).forEach(key=>{
    if(!key.startsWith(courseId+'_')) return;
    const rec = att[key] || {};
    const st  = rec[String(studentIdx)];
    const status = st?.status || st || '';
    if(status==='ausente')   fallas++;
    if(status==='tardanza')  tardanzas++;
    if(status==='excusa')    excusas++;
  });
  return {fallas, tardanzas, excusas, total:fallas+tardanzas};
}

// Obtener TODOS los logros e indicadores para una materia/nota
function getLogroIndicador(teacherId, subjectId, courseId, period, nivel){
  const logros = window._DB?.logros || {};
  const keyD = `${teacherId}_${subjectId}__${courseId}_${period}`;
  const keyS = `${teacherId}_${subjectId}_${courseId}_${period}`;
  const arr  = (logros[keyD]||[]).length>0 ? logros[keyD] : (logros[keyS]||[]);
  if(!arr.length) return {logro:'', indicador:'', todos:[]};
  // Devolver todos los logros con sus indicadores
  const todos = arr
    .filter(l=>l&&l.text&&l.text.trim())
    .map(l=>({
      texto:     l.text||'',
      indicador: nivel ? (l[nivel.level]||'') : ''
    }));
  // Compatibilidad: logro e indicador = primer elemento
  return {
    logro:     todos[0]?.texto    || '',
    indicador: todos[0]?.indicador|| '',
    todos
  };
}

function buildBoletinHTML(course, student, studentIdx, period, allStudents){
  const { teachers=[], subjects=[], schoolInfo={}, logros={}, observations={} } = window._DB||{};
  const si  = schoolInfo;
  const pre = isPreescolar(course.name);

  // Materias del curso
  const courseSubs = getCourseSubjects(course.id);

  // Director de curso
  const director = teachers.find(t=>t.id===course.directorId);

  // Calcular notas por materia
  let periods = period==='anual' ? ['1','2','3','4'] : [String(period)];

  // Separar materias normales de especiales (Disciplina va penúltima, Conducta última)
  const subsNormales = courseSubs.filter(sub=>!MATERIAS_ESPECIALES.includes(sub.id));
  // Disciplina: buscarla en subjects globalmente (puede tener grade sin assignment)
  const subDisciplina = (window._DB.subjects||[]).find(s=>s.id===DISCIPLINA_SID);

  const materias = subsNormales.map(sub=>{
    const teacher = teachers.find(t=>(t.assignments||[]).some(a=>a.subjectId===sub.id&&a.courseId===course.id))
                 || teachers.find(t=>{
                      const kD=`_${sub.id}__${course.id}_${periods[0]}`;
                      const kS=`_${sub.id}_${course.id}_${periods[0]}`;
                      return Object.keys(window._DB.grades||{}).find(k=>k.startsWith(t.id)&&(k.endsWith(kD)||k.endsWith(kS)));
                    });

    // Calcular nota por periodo(s)
    let nota = null;
    if(period==='anual'){
      const notas=['1','2','3','4'].map(p=>calcStudentGrade(course.id,sub.id,studentIdx,p)).filter(n=>n!==null);
      nota = notas.length>0 ? Math.round(notas.reduce((s,v)=>s+v,0)/notas.length*100)/100 : null;
    } else {
      nota = calcStudentGrade(course.id,sub.id,studentIdx,period);
    }

    const nivel = getNivel(nota);
    const logroData = teacher
      ? getLogroIndicador(teacher.id, sub.id, course.id, periods[0], nivel)
      : {logro:'',indicador:'',todos:[]};

    return {sub, teacher, nota, nivel, logro:logroData.logro, indicador:logroData.indicador, todos:logroData.todos||[], especial:false};
  });

  // Agregar Disciplina (penúltima) — buscar grade directo aunque no esté en assignments
  const discGradeKey = Object.keys(window._DB.grades||{}).find(k=>
    k.includes(DISCIPLINA_SID) && k.includes(course.id) && k.endsWith('_'+periods[0])
  );
  if(subDisciplina){
    const sub = subDisciplina;
    [(sub)].forEach(sub=>{
    const teacher2 = teachers.find(t=>(t.assignments||[]).some(a=>a.subjectId===sub.id&&a.courseId===course.id))
                  || teachers.find(t=>{
                       const kD=`_${sub.id}__${course.id}_${periods[0]}`;
                       const kS=`_${sub.id}_${course.id}_${periods[0]}`;
                       return Object.keys(window._DB.grades||{}).find(k=>k.startsWith(t.id)&&(k.endsWith(kD)||k.endsWith(kS)));
                     });
    let nota2=null;
    if(period==='anual'){
      const ns=['1','2','3','4'].map(p=>calcStudentGrade(course.id,sub.id,studentIdx,p)).filter(n=>n!==null);
      nota2=ns.length>0?Math.round(ns.reduce((s,v)=>s+v,0)/ns.length*100)/100:null;
    } else {
      nota2=calcStudentGrade(course.id,sub.id,studentIdx,period);
    }
    const nivel2=getNivel(nota2);
    const {logro:logro2,indicador:indicador2}=teacher2?getLogroIndicador(teacher2.id,sub.id,course.id,periods[0],nivel2):{logro:'',indicador:''};
    const logroDat2 = teacher2?getLogroIndicador(teacher2.id,sub.id,course.id,periods[0],nivel2):{logro:'',indicador:'',todos:[]};
    materias.push({sub,teacher:teacher2||{name:'—'},nota:nota2,nivel:nivel2,logro:logroDat2.logro,indicador:logroDat2.indicador,todos:logroDat2.todos||[],especial:true});
  });
  } // fin if(subDisciplina)

  // Agregar conducta al final de materias
  const condNota = getConductaNota(course.id, studentIdx, periods[0]);
  const condNivel= getNivel(condNota);
  materias.push({
    sub:     {id:CONDUCTA_SID, name:'CONDUCTA'},
    teacher: director || {name:'Administración'},
    nota:    condNota,
    nivel:   condNivel,
    logro:   '',
    indicador: '',
    todos:     [],
    especial: true
  });

  // Promedio general (sin conducta)

// Recarga logros frescos desde Firebase (3 fuentes)
window.recargarLogros = async function(){
  if(!window._DB) return;
  const wrap = document.getElementById('logros-wrap');
  if(wrap) wrap.innerHTML='<div style="text-align:center;padding:20px;color:var(--gris-txt);">⏳ Actualizando logros desde Firebase...</div>';

  try {
    const allLogros = {};

    function mergeL(dest, src){
      Object.keys(src).forEach(k=>{
        const si=src[k]||[], sh=si.some(x=>x&&x.text&&x.text.trim());
        const di=dest[k]||[], dh=di.some(x=>x&&x.text&&x.text.trim());
        if(sh&&(!dh||si.length>di.length)) dest[k]=si;
      });
    }

    // FUENTE 1: logros/{teacherId}
    const lSnap = await getDocs(collection(fireDb,"logros"));
    lSnap.forEach(d => mergeL(allLogros, d.data().logros||{}));
    console.log('[recargarLogros] logros/ docs:', lSnap.size);

    // FUENTE 2: teacher_logro_backups/ (más reciente por docente)
    try {
      const bSnap = await getDocs(collection(fireDb,"teacher_logro_backups"));
      const porDocente = {};
      bSnap.forEach(d=>{
        const bData=d.data(), tId=bData.teacherId||d.id.split('_')[0], at=bData.savedAt||0;
        if(!porDocente[tId]||at>porDocente[tId].at) porDocente[tId]={logros:bData.logros||{},at};
      });
      Object.values(porDocente).forEach(lb=>mergeL(allLogros,lb.logros));
    } catch(e){ console.warn('[logro_backups]',e.message); }

    // FUENTE 3: system/data.logros
    const sysSnap = await getDoc(doc(fireDb,"system","data"));
    if(sysSnap.exists()) mergeL(allLogros, sysSnap.data().logros||{});

    window._DB.logros = allLogros;
    console.log('[recargarLogros] total keys:', Object.keys(allLogros).length);
    Object.keys(allLogros).forEach(k=>{
      const it=allLogros[k]||[];
      console.log(`  "${k}" items:${it.length} texto:${it.filter(x=>x&&x.text).length}`);
    });
  } catch(e) {
    console.warn('[recargarLogros] Error:', e.message);
  }

  buildLogros();
};

window.buildLogros = function(){
  if(!window._DB) return;
  const { teachers=[], subjects=[], courses=[], logros={} } = window._DB;
  const filtroCourse  = document.getElementById('log-course')?.value  || '';
  const filtroSubject = document.getElementById('log-subject')?.value || '';
  const period        = document.getElementById('log-period')?.value  || getActivePeriod();
  const wrap          = document.getElementById('logros-wrap');
  if(!wrap) return;

  // Todas las keys de logros en Firebase
  const todasKeys = Object.keys(logros);
  console.log('[Logros] Total keys:', todasKeys.length, '| Filtrando por curso:', filtroCourse, 'period:', period);

  // ESTRATEGIA SIMPLE Y ROBUSTA:
  // Cada key tiene formato: tId_sId_cId_p  o  tId_sId__cId_p
  // El courseId y period son CONOCIDOS — los buscamos directamente en la key
  // sin parsear — simplemente verificamos si la key CONTIENE el courseId y termina en _period

  const items  = [];
  const usados = new Set(); // evitar duplicados tId+sId+cId

  todasKeys.forEach(key => {
    const arr = logros[key] || [];

    // Filtrar por periodo — la key siempre termina en _period
    if(!key.endsWith('_' + period)) return;

    // Filtrar por curso si hay selección
    if(filtroCourse && !key.includes(filtroCourse)) return;

    // Filtrar por materia si hay selección
    if(filtroSubject && !key.includes(filtroSubject)) return;

    // Solo mostrar si tiene al menos un logro con texto real
    const tieneTexto = arr.some(x => x && x.text && x.text.trim());
    if(!tieneTexto) return;

    // Resolver teacherId: el primer segmento "mo..." de la key
    const matchT = teachers.find(t => key.startsWith(t.id + '_'));
    if(!matchT) return;
    const tId = matchT.id;

    // Resolver courseId: buscar cuál course está en la key
    const matchC = filtroCourse
      ? courses.find(c => c.id === filtroCourse && key.includes(c.id))
      : courses.find(c => key.includes(c.id));
    if(!matchC) return;
    const cId = matchC.id;

    // Resolver subjectId: lo que queda entre tId y cId en la key
    // Buscar en subjects cuál está en la key
    const matchS = filtroSubject
      ? subjects.find(s => s.id === filtroSubject && key.includes(s.id))
      : subjects.find(s => key.includes(s.id) && key.startsWith(tId + '_' + s.id));
    if(!matchS) return;
    const sId = matchS.id;

    // Evitar duplicados (misma combinación con doble __ y simple _)
    const dedupKey = `${tId}|${sId}|${cId}`;
    if(usados.has(dedupKey)) return;
    usados.add(dedupKey);

    items.push({
      teacher: matchT,
      sub:     matchS,
      course:  matchC,
      arr,
      key
    });
  });

  // Ordenar por course.order luego por nombre de materia
  items.sort((a,b) => {
    const oa = a.course.order || 99;
    const ob = b.course.order || 99;
    if(oa !== ob) return oa - ob;
    return (a.sub.name||'').localeCompare(b.sub.name||'');
  });

  // Si hay filtro de curso, también mostrar las materias SIN logro
  // para saber qué profes no han subido
  if(filtroCourse){
    const course = courses.find(c => c.id === filtroCourse);
    if(course){
      teachers.forEach(teacher => {
        (teacher.assignments||[]).forEach(asig => {
          if(asig.courseId !== filtroCourse) return;
          if(filtroSubject && asig.subjectId !== filtroSubject) return;
          const sub = subjects.find(s => s.id === asig.subjectId);
          if(!sub) return;
          const dedup = `${teacher.id}|${asig.subjectId}|${filtroCourse}`;
          if(usados.has(dedup)) return; // ya tiene logros, no agregar como vacío
          items.push({
            teacher,
            sub,
            course,
            arr: [],
            key: null,
            sinLogro: true
          });
        });
      });
    }
  }

  if(!items.length){
    wrap.innerHTML=`<div class="empty-state"><div class="icon">🎯</div><p>Sin materias asignadas para la selección</p>
      <div style="font-size:12px;margin-top:8px;color:var(--gris-txt);">Keys de logros en Firebase: ${todasLasLogrosKeys.length}</div>
    </div>`;
    return;
  }

  wrap.innerHTML=items.map(item=>{
    const tieneLogros = item.arr.length > 0;
    return `<div class="card" style="margin-bottom:16px;border-left:4px solid ${tieneLogros?'var(--azul)':'var(--gris-borde)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-weight:800;font-size:15px;">${item.sub.name} — ${item.course.name}</div>
          <div style="font-size:12px;color:var(--gris-txt);">👩‍🏫 ${item.teacher.name||item.teacher.id}</div>
          ${item.key ? `<div style="font-size:10px;color:var(--gris-txt);margin-top:2px;font-family:monospace;">key: ${item.key}</div>` : '<div style="font-size:10px;color:var(--rojo);margin-top:2px;">⚠️ Sin logros subidos aún en Firebase</div>'}
        </div>
        <span class="badge ${tieneLogros?'badge-azul':'badge-gris'}">${item.arr.length} logro(s)</span>
      </div>
      ${!tieneLogros
        ?`<div style="background:var(--rojo-bg);color:var(--rojo-dark);border-radius:var(--r);padding:10px 12px;font-size:13px;">
              ⚠️ <strong>${item.teacher.name}</strong> no ha subido logros para <strong>${item.sub.name}</strong> en este periodo.
              Debe entrar a docentes.html → Logros → agregar y guardar.
            </div>`
        :item.arr.map((logro,i)=>`
          <div style="border-left:3px solid var(--azul);padding:8px 12px;margin-bottom:10px;background:var(--gris-bg);border-radius:0 var(--r) var(--r) 0;">
            <div style="font-weight:800;font-size:13px;margin-bottom:8px;">📌 Logro ${i+1}: ${logro.text||'—'}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
              <div style="background:var(--azul-num-bg);color:var(--superior);border-radius:4px;padding:6px 8px;font-size:11px;"><strong>⭐ Superior (4.6-5.0)</strong><br>${logro.superior||'—'}</div>
              <div style="background:var(--verde-bg);color:var(--alto);border-radius:4px;padding:6px 8px;font-size:11px;"><strong>🟢 Alto (4.0-4.5)</strong><br>${logro.alto||'—'}</div>
              <div style="background:var(--amarillo-bg);color:var(--basico);border-radius:4px;padding:6px 8px;font-size:11px;"><strong>🟡 Básico (3.6-3.9)</strong><br>${logro.basico||'—'}</div>
              <div style="background:var(--rojo-bg);color:var(--bajo);border-radius:4px;padding:6px 8px;font-size:11px;"><strong>🔴 Bajo (1.0-3.5)</strong><br>${logro.bajo||'—'}</div>
            </div>
          </div>`).join('')}
    </div>`;
  }).join('');
};

// ═══════════════════════════════════════════════════
// GUARDAR CONFIG — updateDoc parcial, no sobreescribe system/data
// ═══════════════════════════════════════════════════
window.saveCfg = async function(){
  try {
    // updateDoc solo toca el campo schoolInfo.boletinConfig
    await updateDoc(doc(fireDb,"system","data"), {
      "schoolInfo.boletinConfig": window._CFG
    });
    const el = document.getElementById('cfg-saved');
    if(el){ el.style.display='inline'; setTimeout(()=>{el.style.display='none';}, 2500); }
  } catch(e){ alert('Error guardando configuración: ' + e.message); }
};

// ═══════════════════════════════════════════════════
// INICIAR
// ═══════════════════════════════════════════════════
// ═══════════════════════════════════════════════════
// RECARGA GLOBAL — Lee Firebase de nuevo sin recargar página
// ═══════════════════════════════════════════════════
window.recargarTodo = async function(){
  const btn = document.getElementById('btn-reload');
  const upd = document.getElementById('last-update');
  if(btn){
    btn.disabled = true;
    btn.textContent = '⏳ Actualizando...';
    btn.style.opacity = '.7';
  }
  try {
    await loadData();
    // Refrescar la vista activa
    const activeNav = document.querySelector('.nav-item.active');
    if(activeNav) activeNav.click();
    // Mostrar hora de última actualización
    const hora = new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    if(upd) upd.textContent = `Actualizado ${hora}`;
  } catch(e){
    console.error('[recargarTodo]', e);
  } finally {
    if(btn){
      btn.disabled = false;
      btn.textContent = '🔄 Actualizar datos';
      btn.style.opacity = '1';
    }
  }
};

loadData();

</script>
