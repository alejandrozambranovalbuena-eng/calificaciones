<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Consolidado — I.E.T. Liceo Moderno Suesca</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --rojo:#c0392b;--rojo-dark:#922b21;--rojo-light:#f5b7b1;
  --azul:#1a237e;--azul-mid:#283593;--azul-light:#c5cae9;--azul-soft:#e8eaf6;
  --gris-bg:#f4f5f7;--gris-borde:#dde1ea;--gris-txt:#6b7280;
  --txt:#1c1f2e;--blanco:#ffffff;
  --verde:#27ae60;--verde-bg:#d5f5e3;
  --amarillo:#f39c12;--amarillo-bg:#fef9e7;
  --rojo-bg:#fce4e4;--azul-num-bg:#e3f2fd;
  --superior:#1565c0;--alto:#2e7d32;--basico:#7b5800;--bajo:#c62828;
  --sidebar-w:240px;--topbar-h:60px;--r:8px;
  --shadow:0 2px 8px rgba(0,0,0,.10);--shadow-md:0 4px 20px rgba(0,0,0,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--gris-bg);color:var(--txt);font-size:14px;line-height:1.5;}
.mono{font-family:'JetBrains Mono',monospace;}

/* APP SHELL */
#app{display:block;min-height:100vh;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--topbar-h);background:linear-gradient(90deg,var(--azul) 0%,var(--rojo) 100%);display:flex;align-items:center;padding:0 20px;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.topbar-logo{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;color:white;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:white;flex:1;line-height:1.2;}
.topbar-title span{font-size:11px;font-weight:400;opacity:.8;display:block;}
.topbar-period{background:rgba(255,255,255,.18);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;color:white;}
.btn-menu{display:none;background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:4px;}

.sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--blanco);border-right:1px solid var(--gris-borde);overflow-y:auto;z-index:90;padding:16px 0;transition:transform .3s;}
.sidebar-section-label{font-size:10px;font-weight:700;color:var(--gris-txt);letter-spacing:.08em;text-transform:uppercase;padding:12px 20px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:background .15s;font-size:13px;font-weight:500;color:var(--txt);border-left:3px solid transparent;user-select:none;}
.nav-item:hover{background:var(--gris-bg);}
.nav-item.active{background:var(--azul-soft);border-left-color:var(--azul);color:var(--azul);font-weight:700;}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sidebar-divider{height:1px;background:var(--gris-borde);margin:8px 16px;}
.content{margin-left:var(--sidebar-w);margin-top:var(--topbar-h);padding:28px;min-height:calc(100vh - var(--topbar-h));}

/* CARDS */
.section-title{font-size:20px;font-weight:800;color:var(--txt);margin-bottom:4px;}
.section-sub{font-size:13px;color:var(--gris-txt);margin-bottom:24px;}
.card{background:var(--blanco);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--blanco);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);border-top:3px solid var(--azul);}
.stat-card.verde{border-top-color:var(--verde);}
.stat-card.amarillo{border-top-color:var(--amarillo);}
.stat-card.rojo{border-top-color:var(--rojo);}
.stat-label{font-size:11px;font-weight:600;color:var(--gris-txt);text-transform:uppercase;letter-spacing:.06em;}
.stat-value{font-size:32px;font-weight:800;color:var(--txt);margin:4px 0 2px;font-family:'JetBrains Mono',monospace;}
.stat-detail{font-size:12px;color:var(--gris-txt);}

/* TABLES */
.table-wrap{overflow-x:auto;border-radius:var(--r);}
table{border-collapse:collapse;width:100%;font-size:13px;background:var(--blanco);}
th{background:var(--azul);color:white;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.04em;white-space:nowrap;}
th.center{text-align:center;}
td{padding:9px 12px;border-bottom:1px solid var(--gris-borde);vertical-align:middle;}
tr:hover td{background:var(--azul-soft);}
tr:last-child td{border-bottom:none;}
.nota-cell{text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:4px 7px;border-radius:5px;white-space:nowrap;display:inline-block;}
.nota-superior{background:var(--azul-num-bg);color:var(--superior);}
.nota-alto{background:var(--verde-bg);color:var(--alto);}
.nota-basico{background:var(--amarillo-bg);color:var(--basico);}
.nota-bajo{background:var(--rojo-bg);color:var(--bajo);}
.nota-empty{color:var(--gris-txt);font-weight:400;}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}
.badge-verde{background:var(--verde-bg);color:var(--verde);}
.badge-amarillo{background:var(--amarillo-bg);color:var(--basico);}
.badge-rojo{background:var(--rojo-bg);color:var(--bajo);}
.badge-azul{background:var(--azul-soft);color:var(--azul);}
.badge-gris{background:var(--gris-bg);color:var(--gris-txt);}
.badge-naranja{background:#fff3e0;color:#e65100;}

/* FILTERS */
.filters-bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:20px;}
.filters-bar select{padding:8px 12px;border:2px solid var(--gris-borde);border-radius:var(--r);font-family:inherit;font-size:13px;background:var(--blanco);outline:none;cursor:pointer;transition:border .2s;min-width:140px;}
.filters-bar select:focus{border-color:var(--azul);}
.btn{padding:8px 18px;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:opacity .2s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--azul);color:white;}
.btn-outline{background:transparent;border:2px solid var(--azul);color:var(--azul);}

/* PROGRESS */
.progress-bar-wrap{background:var(--gris-borde);border-radius:20px;height:8px;overflow:hidden;flex:1;}
.progress-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--azul),var(--verde));transition:width .5s ease;}

/* ALERTS */
.alert-group{margin-bottom:20px;}
.alert-group-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:10px;}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:var(--r);margin-bottom:8px;font-size:13px;border:1px solid;}
.alert-critico{background:var(--rojo-bg);border-color:var(--rojo-light);color:#7b1212;}
.alert-advertencia{background:var(--amarillo-bg);border-color:#f9d68a;color:var(--basico);}
.alert-info{background:var(--azul-soft);border-color:var(--azul-light);color:var(--azul);}

/* RANKING */
.ranking-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:var(--r);background:var(--blanco);margin-bottom:8px;box-shadow:var(--shadow);transition:transform .15s;}
.ranking-row:hover{transform:translateX(3px);}
.rank-pos{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;width:36px;text-align:center;flex-shrink:0;}
.rank-pos.gold{color:#d4a017;}.rank-pos.silver{color:#9e9e9e;}.rank-pos.bronze{color:#8b5e3c;}.rank-pos.normal{color:var(--gris-txt);font-size:14px;}

/* CHART */
.chart-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.chart-bar-label{font-size:12px;font-weight:600;width:120px;flex-shrink:0;text-align:right;}
.chart-bar-track{flex:1;background:var(--gris-borde);border-radius:20px;height:24px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:20px;display:flex;align-items:center;padding-left:10px;}
.chart-bar-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:white;}

/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

/* FUENTE BADGE */
.fuente-badge{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;vertical-align:middle;margin-left:4px;}
.fuente-grades{background:#e8f5e9;color:#1b5e20;}
.fuente-backup{background:#fff3e0;color:#e65100;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.spinner{width:40px;height:40px;border:4px solid var(--gris-borde);border-top-color:var(--azul);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--gris-txt);}
.empty-state .icon{font-size:40px;margin-bottom:10px;}

/* CONFIG */
.config-item{padding:16px 0;border-bottom:1px solid var(--gris-borde);display:flex;align-items:center;gap:16px;}
.config-item label{flex:1;font-size:14px;font-weight:600;}

/* RESPONSIVE */
@media(max-width:768px){
  .btn-menu{display:block;}
  .sidebar{transform:translateX(-100%);width:260px;z-index:150;}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.2);}
  .content{margin-left:0;padding:16px;}
  .two-col{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .topbar-period{display:none;}
}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <button class="btn-menu" onclick="toggleSidebar()">☰</button>
    <div class="topbar-logo">🏫</div>
    <div class="topbar-title">
      I.E.T. Liceo Moderno Suesca
      <span>Consolidado de Calificaciones</span>
    </div>
    <div class="topbar-period" id="topbar-period">Cargando...</div>
    <div id="topbar-fuente" style="font-size:11px;color:rgba(255,255,255,.75);"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <div id="last-update" style="font-size:10px;color:rgba(255,255,255,.6);white-space:nowrap;"></div>
      <button id="btn-reload" onclick="recargarTodo()" 
        style="background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);color:white;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s;"
        onmouseover="this.style.background='rgba(255,255,255,.28)'" 
        onmouseout="this.style.background='rgba(255,255,255,.15)'">
        🔄 Actualizar datos
      </button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section-label">Principal</div>
    <div class="nav-item active" onclick="switchView('resumen',this)"><span class="nav-icon">📊</span> Resumen General</div>
    <div class="nav-item" onclick="switchView('consolidado',this)"><span class="nav-icon">📋</span> Consolidado por Curso</div>
    <div class="nav-item" onclick="switchView('ranking',this)"><span class="nav-icon">🏅</span> Ranking de Estudiantes</div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Seguimiento</div>
    <div class="nav-item" onclick="switchView('docentes',this)"><span class="nav-icon">👨‍🏫</span> Estado de Docentes</div>
    <div class="nav-item" onclick="switchView('alertas',this)"><span class="nav-icon">⚠️</span> Alertas y Problemas</div>
    <div class="sidebar-divider"></div>
    <div class="nav-item" onclick="switchView('conducta',this)"><span class="nav-icon">⭐</span> Conducta</div>
    <div class="nav-item" onclick="switchView('boletines',this)"><span class="nav-icon">📄</span> Boletines</div>
    <div class="nav-item" onclick="switchView('logros',this)"><span class="nav-icon">🎯</span> Logros</div>
    <div class="sidebar-divider"></div>
    <div class="nav-item" onclick="switchView('config',this)"><span class="nav-icon">⚙️</span> Configuración</div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content-area">
    <div id="view-resumen"></div>
    <div id="view-consolidado" style="display:none"></div>
    <div id="view-ranking"    style="display:none"></div>
    <div id="view-docentes"   style="display:none"></div>
    <div id="view-alertas"    style="display:none"></div>
    <div id="view-conducta"   style="display:none"></div>
    <div id="view-boletines"  style="display:none"></div>
    <div id="view-logros"     style="display:none"></div>
    <div id="view-config"     style="display:none"></div>
  </div>

  <!-- LOADING -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div style="font-size:14px;color:#555;font-weight:600;" id="loading-msg">Iniciando...</div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, setDoc, collection, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const APP_VERSION = "v3.0";

const FC = {
  apiKey:"AIzaSyBoQmO-jPv9b5VnKpoBA9g_GhIdHC9q7I0",
  authDomain:"liceo-suesca-notas.firebaseapp.com",
  projectId:"liceo-suesca-notas",
  storageBucket:"liceo-suesca-notas.firebasestorage.app",
  messagingSenderId:"1000406739498",
  appId:"1:1000406739498:web:0a4f75c4e7e8c03f9a4e2a"
};

const fbApp = getApps().length>0 ? getApp() : initializeApp(FC);
const fireDb = getFirestore(fbApp);

// ═══════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════
window._DB  = null;
window._CFG = { mostrarFallas:true, mostrarPuesto:true, mostrarLogros:true, piePagina:"" };

// Estadísticas de fuentes de datos
let _fuenteStats = { grades:0, backups:0, totalKeys:0 };

// ═══════════════════════════════════════════════════
// KEY BUILDER — igual que docentes.html línea 370
// periodo es "2" no "P2"
// ═══════════════════════════════════════════════════
function gk(tId,sId,cId,p){ return `${tId}_${sId}__${cId}_${p}`; }
// Para LOGROS (linea 1357 docentes.html): guion simple entre todos
// Para LOGROS en colección logros/: doble __ igual que grades
// Clave: teacherId_subjectId__courseId_period
function lk(tId,sId,cId,p){ return `${tId}_${sId}__${cId}_${p}`; }

// ═══════════════════════════════════════════════════
// CARGA DE DATOS — 3 FUENTES para no perder ninguna nota
//
// FUENTE 1: grades/{teacherId}          → notas guardadas normalmente
// FUENTE 2: teacher_backups/{tId_fecha} → backups automáticos por docente
// FUENTE 3: backups/consolidado-{fecha} → backup del propio consolidado
//
// Para cada key, gana la versión con MÁS gradeValues (más notas)
// ═══════════════════════════════════════════════════
async function loadData(){
  setLoading(true,'Cargando estructura institucional...');
  try {
    // ── PASO 1: system/data ──────────────────────
    const snap = await getDoc(doc(fireDb,"system","data"));
    if(!snap.exists()) throw new Error("No existe system/data en Firebase");
    const data = snap.data();

    // ── PASO 2: grades/ (fuente principal) ───────
    setLoading(true,'Leyendo notas de docentes (grades/)...');
    const gradesSnap = await getDocs(collection(fireDb,"grades"));
    const allGrades  = {}; // key → {categories, gradeValues, _fuente}
    const docentesConNotas = [];
    _fuenteStats = { grades:0, backups:0, totalKeys:0 };

    gradesSnap.forEach(docSnap => {
      const tData  = docSnap.data();
      const tGrades = tData.grades || {};
      const n = Object.keys(tGrades).length;
      if(n > 0){
        docentesConNotas.push({
          id: docSnap.id,
          name: tData.teacherName || docSnap.id,
          numKeys: n,
          updatedAt: tData.updatedAt || null,
          fuente: 'grades'
        });
        Object.entries(tGrades).forEach(([k,v]) => {
          allGrades[k] = { ...v, _fuente:'grades' };
          _fuenteStats.grades++;
        });
      }
      console.log(`[grades/${docSnap.id}] keys: ${n}`);
    });

    // ── PASO 3: teacher_backups/ (fuente secundaria) ──
    setLoading(true,'Revisando backups de docentes...');
    try {
      const backupSnap = await getDocs(collection(fireDb,"teacher_backups"));
      console.log(`[teacher_backups] documentos: ${backupSnap.size}`);

      // Agrupar por teacherId para quedarnos solo con el más reciente
      const backupPorDocente = {};
      backupSnap.forEach(docSnap => {
        const bData = docSnap.data();
        const tId   = bData.teacherId || docSnap.id.split('_')[0];
        const savedAt = bData.savedAt || 0;
        if(!backupPorDocente[tId] || savedAt > backupPorDocente[tId].savedAt){
          backupPorDocente[tId] = { ...bData, _docId: docSnap.id, savedAt };
        }
      });

      // Fusionar: para cada key, gana quien tiene MÁS gradeValues
      Object.entries(backupPorDocente).forEach(([tId, bData]) => {
        const bGrades = bData.grades || {};
        Object.entries(bGrades).forEach(([k,v]) => {
          const vExisting = allGrades[k];
          const existingCount = vExisting ? Object.keys(vExisting.gradeValues||{}).length : -1;
          const backupCount   = Object.keys(v.gradeValues||{}).length;

          if(backupCount > existingCount){
            // El backup tiene MÁS notas → usar el backup
            allGrades[k] = { ...v, _fuente:'backup' };
            _fuenteStats.backups++;
            console.log(`[BACKUP ganó] key="${k}" backup:${backupCount} > grades:${existingCount}`);
          } else if(!vExisting && backupCount > 0){
            // La key no existía en grades/ → tomarla del backup
            allGrades[k] = { ...v, _fuente:'backup' };
            _fuenteStats.backups++;
            console.log(`[BACKUP nuevo] key="${k}" no estaba en grades, backup:${backupCount}`);
          }
          // Si grades tiene igual o más notas → mantener grades (ya está)
        });
      });
    } catch(e){
      console.warn('[teacher_backups] No se pudo leer o no existe:',e.message);
    }

    _fuenteStats.totalKeys = Object.keys(allGrades).length;
    console.log(`TOTAL keys consolidadas: ${_fuenteStats.totalKeys} (grades:${_fuenteStats.grades}, backups:${_fuenteStats.backups})`);

    // ── PASO 3B: Logros — 3 fuentes en orden de confianza
    // Clave: gk() = teacherId_subjectId__courseId_period (doble __)
    // FUENTE 1: logros/{teacherId}           → principal (nuevo docentes.html)
    // FUENTE 2: teacher_logro_backups/       → backup diario por docente
    // FUENTE 3: system/data.logros           → retrocompatibilidad
    setLoading(true,'Leyendo logros de docentes...');
    const allLogros = {};

    // Función para fusionar: gana quien tiene más items con texto real
    function mergeLogros(dest, src){
      Object.keys(src).forEach(k => {
        const srcItems = src[k] || [];
        const srcHas   = srcItems.some(x=>x&&x.text&&x.text.trim());
        const dstItems = dest[k] || [];
        const dstHas   = dstItems.some(x=>x&&x.text&&x.text.trim());
        if(srcHas && (!dstHas || srcItems.length > dstItems.length)){
          dest[k] = srcItems;
        }
      });
    }

    // FUENTE 1: colección logros/{teacherId}
    try {
      const logrosSnap = await getDocs(collection(fireDb,"logros"));
      console.log(`[logros/] documentos: ${logrosSnap.size}`);
      logrosSnap.forEach(docSnap => {
        const tLogros = docSnap.data().logros || {};
        console.log(`[logros/${docSnap.id}] keys: ${Object.keys(tLogros).length}`);
        mergeLogros(allLogros, tLogros);
      });
    } catch(e) {
      console.warn('[logros/] Error:', e.message);
    }

    // FUENTE 2: teacher_logro_backups/ (backup diario — más reciente por docente)
    try {
      const lbSnap = await getDocs(collection(fireDb,"teacher_logro_backups"));
      console.log(`[teacher_logro_backups/] documentos: ${lbSnap.size}`);
      // Agrupar por teacherId, quedarse con el más reciente
      const lbPorDocente = {};
      lbSnap.forEach(docSnap => {
        const bData   = docSnap.data();
        const tId     = bData.teacherId || docSnap.id.split('_')[0];
        const savedAt = bData.savedAt || 0;
        if(!lbPorDocente[tId] || savedAt > lbPorDocente[tId].savedAt){
          lbPorDocente[tId] = { logros: bData.logros||{}, savedAt };
        }
      });
      Object.values(lbPorDocente).forEach(lb => {
        mergeLogros(allLogros, lb.logros);
      });
    } catch(e) {
      console.warn('[teacher_logro_backups/] Error o no existe:', e.message);
    }

    // FUENTE 3: system/data.logros (retrocompatibilidad con versión anterior)
    mergeLogros(allLogros, data.logros||{});

    console.log(`[logros] Total keys: ${Object.keys(allLogros).length}`);

    // ── PASO 4: Consolidar ────────────────────────

// CÁLCULO DE NOTA — igual que docentes.html calcAll()
// ═══════════════════════════════════════════════════
function calcSG(cats, vals, si, total){
  let fg=0, any=false;
  (cats||[]).forEach(cat => {
    if(!cat.activities?.length) return;
    if(cat.type === "puntos"){
      const act = cat.activities[0];
      let mx=0;
      for(let i=0;i<total;i++){
        const v=vals[`${i}_${cat.id}_${act.id}`];
        if(v!==undefined&&v!==null&&v!==""){const pv=parseFloat(v);if(pv>mx)mx=pv;}
      }
      const vRaw=vals[`${si}_${cat.id}_${act.id}`];
      if(vRaw!==undefined&&vRaw!==null&&vRaw!==""){
        any=true;
        const mp=parseFloat(vRaw)||0;
        fg+=(mx>0&&mp>0?Math.min((mp/mx)*4+1,5):1)*(parseFloat(cat.pct)/100);
      }
    } else {
      let cs=0,cc=0;
      (cat.activities||[]).forEach(act=>{
        const v=vals[`${si}_${cat.id}_${act.id}`];
        if(v!==undefined&&v!==null&&v!==""){cs+=parseFloat(v);cc++;any=true;}
      });
      if(cc>0) fg+=(cs/cc)*(parseFloat(cat.pct)/100);
    }
  });
  return any ? Math.round(fg*100)/100 : null;
}

function calcStudentGrade(courseId, subjectId, studentIdx, period){
  if(!window._DB) return null;
  const { grades={}, teachers=[], courses=[] } = window._DB;
  const p = String(period);

  // MÉTODO 1: buscar por assignments (forma normal)
  let gd = null;
  const teacher = teachers.find(t =>
    (t.assignments||[]).some(a => a.subjectId===subjectId && a.courseId===courseId)
  );
  if(teacher){
    // Buscar con doble __ (formato nuevo) y simple _ (formato viejo)
    gd = grades[gk(teacher.id, subjectId, courseId, p)]
      || grades[`${teacher.id}_${subjectId}_${courseId}_${p}`];
  }

  // MÉTODO 2: si no encontró por assignments, buscar en TODAS las grades
  // buscando la key que coincida con subjectId + courseId + period
  if(!gd){
    const keyDoble  = `_${subjectId}__${courseId}_${p}`;
    const keySimple = `_${subjectId}_${courseId}_${p}`;
    const allKeys   = Object.keys(grades);
    const found = allKeys.find(k => k.endsWith(keyDoble) || k.endsWith(keySimple));
    if(found) gd = grades[found];
  }

  if(!gd) return null;

  const cats     = gd.categories || [];
  const vals     = gd.gradeValues || {};
  const totalPct = cats.reduce((s,c)=>s+(parseFloat(c.pct)||0),0);
  if(cats.length>0 && Math.abs(totalPct-100)>0.5) return null;

  const course = courses.find(c=>c.id===courseId);
  const total  = (course?.students||[]).length;

  return calcSG(cats, vals, studentIdx, total);
}

function getGradeFuente(courseId, subjectId, period){
  if(!window._DB) return null;
  const { grades={}, teachers=[] } = window._DB;
  const p = String(period);
  // Buscar por assignments primero
  const teacher = teachers.find(t =>
    (t.assignments||[]).some(a => a.subjectId===subjectId && a.courseId===courseId)
  );
  if(teacher){
    const gd = grades[gk(teacher.id,subjectId,courseId,p)]
             || grades[`${teacher.id}_${subjectId}_${courseId}_${p}`];
    if(gd) return gd._fuente || null;
  }
  // Buscar directo en todas las grades
  const keyD = `_${subjectId}__${courseId}_${p}`;
  const keyS = `_${subjectId}_${courseId}_${p}`;
  const found = Object.keys(grades).find(k=>k.endsWith(keyD)||k.endsWith(keyS));
  return found ? (grades[found]?._fuente || null) : null;
}

function nivelNota(n){
  if(n===null||n===undefined) return {text:'—',clase:'nota-empty',nivel:'none'};
  if(n>=4.6) return {text:n.toFixed(2),clase:'nota-superior',nivel:'Superior'};
  if(n>=4.0) return {text:n.toFixed(2),clase:'nota-alto',nivel:'Alto'};
  if(n>=3.6) return {text:n.toFixed(2),clase:'nota-basico',nivel:'Básico'};
  return         {text:n.toFixed(2),clase:'nota-bajo',nivel:'Bajo'};
}

function getActivePeriod(){
  return String(window._DB?.schoolInfo?.activePeriod || '2');
}

function getPeriodOptions(sel){
  const s = sel || getActivePeriod();
  return ['1','2','3','4'].map(p=>
    `<option value="${p}" ${p===s?'selected':''}>${p}</option>`
  ).join('');
}

function getOrderedCourses(){
  return [...(window._DB?.courses||[])].sort((a,b)=>(a.order||0)-(b.order||0));
}

function getActiveStudents(course){
  return (course.students||[]).filter(s=>(s.status||'').toLowerCase()!=='retirado');
}

function studentName(s){
  // docentes.html usa s.name directamente (campo simple)
  // Si tiene campos separados también los soportamos como fallback
  if(s.name && s.name.trim()) return s.name.trim();
  return [s.firstLastName,s.secondLastName,s.firstName,s.secondName].filter(Boolean).join(' ') || '(Sin nombre)';
}

function getCourseOptions(sel){
  return getOrderedCourses().map(c=>
    `<option value="${c.id}" ${c.id===sel?'selected':''}>${c.name}</option>`
  ).join('');
}

function getCourseSubjects(courseId){
  const { teachers=[], subjects=[], grades={} } = window._DB||{};
  const period = getActivePeriod();

  // FUENTE 1: assignments (forma normal)
  const sidsAsig = new Set();
  teachers.forEach(t=>(t.assignments||[]).forEach(a=>{
    if(a.courseId===courseId) sidsAsig.add(a.subjectId);
  }));

  // FUENTE 2: grades directamente — busca keys que contengan el courseId
  // Cubre materias con notas pero sin assignment registrado (ej: Angie en Prekinder)
  const sidsGrades = new Set();
  Object.keys(grades).forEach(key=>{
    if(!key.includes(courseId)) return;
    // Extraer subjectId de la key
    // Formato doble __: tId_sId__cId_p → sId está entre _ y __
    // Formato simple _: tId_sId_cId_p → necesita parser
    let sId = null;
    if(key.includes('__')){
      const dpos = key.indexOf('__');
      const izq  = key.substring(0, dpos); // tId_sId
      const tId  = izq.split('_')[0];
      sId = izq.substring(tId.length+1);
    } else {
      // simple _: buscar subjectId conocido
      const matchT = teachers.find(t=>key.startsWith(t.id+'_'));
      if(matchT){
        const rest  = key.substring(matchT.id.length+1);
        const lastU = rest.lastIndexOf('_');
        const rest2 = rest.substring(0, lastU); // sId_cId
        const matchS = subjects.find(s=>rest2.startsWith(s.id+'_')||rest2===s.id);
        if(matchS) sId = matchS.id;
      }
    }
    if(sId && subjects.find(s=>s.id===sId)) sidsGrades.add(sId);
  });

  // Unir ambas fuentes
  const allSids = new Set([...sidsAsig, ...sidsGrades]);

  // Devolver subjects en el orden original, solo los que corresponden a este curso
  return subjects.filter(sub=>allSids.has(sub.id));
}

function colorBar(avg){
  if(avg===null) return '#bdc3c7';
  if(avg>=4.6) return '#1565c0';
  if(avg>=4.0) return '#2e7d32';
  if(avg>=3.6) return '#f57f17';
  return '#c62828';
}

function semaforo(avg){
  if(avg===null) return '⚫';
  if(avg>=3.6) return '🟢';
  if(avg>=3.0) return '🟡';
  return '🔴';
}

function setLoading(show, msg='Cargando...'){
  document.getElementById('loading').style.display = show?'flex':'none';
  if(msg) document.getElementById('loading-msg').textContent = msg;
}

    const students = getActiveStudents(course);
    totalEst += students.length;
    const subs = getCourseSubjects(course.id);
    let cSum=0, cCount=0;

    subs.forEach(sub=>{
      const teacher = teachers.find(t=>(t.assignments||[]).some(a=>a.subjectId===sub.id&&a.courseId===course.id));

      });

window.buildConsolidadoTable = function(){
  if(!window._DB) return;
  const courseId = document.getElementById('cons-course')?.value;
  const period   = document.getElementById('cons-period')?.value||getActivePeriod();
  const wrap     = document.getElementById('consolidado-table-wrap');
  if(!wrap||!courseId) return;

  const course = window._DB.courses?.find(c=>c.id===courseId);
  if(!course){wrap.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Curso no encontrado</p></div>';return;}

  const students   = getActiveStudents(course);
  const courseSubs = getCourseSubjects(courseId);

  if(courseSubs.length===0){
    wrap.innerHTML='<div class="empty-state"><div class="icon">📚</div><p>Sin materias asignadas a este curso</p></div>';
    return;
  }

  // Calcular notas
  const rows = students.map((st,idx)=>{
    const notas   = courseSubs.map(sub=>calcStudentGrade(courseId,sub.id,idx,period));
    const validas = notas.filter(n=>n!==null);
    const prom    = validas.length>0 ? Math.round(validas.reduce((s,v)=>s+v,0)/validas.length*100)/100 : null;
    return {st, idx, notas, prom};
  });

  // Ranking para puesto
  const rowsOrdenadas = [...rows].filter(r=>r.prom!==null).sort((a,b)=>b.prom-a.prom);
  const getPuesto = (prom)=>{
    if(prom===null) return '—';
    return (rowsOrdenadas.findIndex(r=>Math.abs(r.prom-prom)<0.005)+1)||'—';
  };

  // Stats
  const aprueban  = rows.filter(r=>r.prom!==null&&r.prom>=3.6).length;
  const reprueban = rows.filter(r=>r.prom!==null&&r.prom<3.6).length;
  const conProm   = rows.filter(r=>r.prom!==null);
  const promCurso = conProm.length>0?(conProm.reduce((s,r)=>s+r.prom,0)/conProm.length):null;
  const dist={Superior:0,Alto:0,'Básico':0,Bajo:0};
  conProm.forEach(r=>{const nv=nivelNota(r.prom);if(nv.nivel!=='none')dist[nv.nivel]++;});

  // Alertas de esta tabla
  const alertasTabla=[];
  courseSubs.forEach(sub=>{
    const fuente=getGradeFuente(courseId,sub.id,period);
    const sinNotas=rows.filter(r=>calcStudentGrade(courseId,sub.id,r.idx,period)===null);
    if(!fuente) alertasTabla.push({tipo:'error',msg:`<strong>${sub.name}</strong>: sin notas cargadas en Firebase`});
    else if(sinNotas.length>0) alertasTabla.push({tipo:'warn',msg:`<strong>${sub.name}</strong>: faltan ${sinNotas.length} nota(s) — ${sinNotas.slice(0,2).map(r=>studentName(r.st)).join(', ')}${sinNotas.length>2?' y '+(sinNotas.length-2)+' más':''}`});
  });

  // Top 3 - Cuadro de Honor
  const top3=rowsOrdenadas.slice(0,3);
  const medallas=['🥇','🥈','🥉'];
  const medallaColors=['#d4a017','#9e9e9e','#8b5e3c'];

  // Header materias con semáforo de carga
  const headerSubs=courseSubs.map(sub=>{
    const fuente=getGradeFuente(courseId,sub.id,period);
    const sinNotas=rows.filter(r=>calcStudentGrade(courseId,sub.id,r.idx,period)===null).length;
    const total=students.length;
    const pct=total>0?Math.round((total-sinNotas)/total*100):0;
    const semColor=!fuente?'#dc2626':pct===100?'#16a34a':pct>50?'#d97706':'#dc2626';
    const label=sub.name.length>11?sub.name.substring(0,10)+'…':sub.name;
    return `<th class="center" title="${sub.name} — ${pct}% cargado">
      <div style="font-size:11px;">${label}</div>
      <div style="font-size:9px;color:${semColor};font-weight:800;margin-top:2px;">${!fuente?'❌':pct===100?'✅ 100%':'⚠️ '+pct+'%'}</div>
    </th>`;
  }).join('');

  let html='';

  // Panel alertas
  if(alertasTabla.length>0){
    html+=`<div style="margin-bottom:14px;">
      ${alertasTabla.map(a=>`<div class="alert-item ${a.tipo==='error'?'alert-critico':'alert-advertencia'}" style="margin-bottom:6px;">${a.tipo==='error'?'⛔':'⚠️'} ${a.msg}</div>`).join('')}
    </div>`;
  }

  // Cuadro de Honor
  if(top3.length>0){
    html+=`<div class="card" style="margin-bottom:14px;border-left:4px solid #d4a017;background:linear-gradient(135deg,#fffbeb,#fff);">
      <div style="font-weight:800;font-size:14px;margin-bottom:10px;color:#92400e;">🏆 Cuadro de Honor — ${course.name} · Periodo ${period}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${top3.map((r,i)=>{const nv=nivelNota(r.prom);return `<div style="flex:1;min-width:130px;padding:12px;background:#fff;border-radius:var(--r);border:2px solid ${medallaColors[i]};text-align:center;">
          <div style="font-size:26px;">${medallas[i]}</div>
          <div style="font-weight:800;font-size:12px;margin:4px 0;color:#1a1d2e;line-height:1.3;">${studentName(r.st)}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;color:${colorBar(r.prom)};">${r.prom.toFixed(2)}</div>
          <div style="font-size:10px;font-weight:700;color:${medallaColors[i]};">${nv.nivel}</div>
        </div>`;}).join('')}
      </div>
    </div>`;
  }

  // Stats cards
  const colores={Superior:'var(--superior)',Alto:'var(--alto)','Básico':'var(--basico)',Bajo:'var(--bajo)'};
  const fondos={Superior:'var(--azul-num-bg)',Alto:'var(--verde-bg)','Básico':'var(--amarillo-bg)',Bajo:'var(--rojo-bg)'};
  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:14px;">
    <div style="padding:10px;background:var(--azul-soft);border-radius:var(--r);text-align:center;">
      <div style="font-size:9px;font-weight:700;color:var(--azul);text-transform:uppercase;">Promedio</div>
      <div style="font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${colorBar(promCurso)};">${promCurso!==null?promCurso.toFixed(2):'—'}</div>
    </div>
    <div style="padding:10px;background:var(--verde-bg);border-radius:var(--r);text-align:center;">
      <div style="font-size:9px;font-weight:700;color:var(--verde);text-transform:uppercase;">Aprueban</div>
      <div style="font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--verde);">${aprueban}/${students.length}</div>
    </div>
    <div style="padding:10px;background:var(--rojo-bg);border-radius:var(--r);text-align:center;">
      <div style="font-size:9px;font-weight:700;color:var(--rojo);text-transform:uppercase;">Reprueban</div>
      <div style="font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--rojo);">${reprueban}</div>
    </div>
    ${Object.entries(dist).map(([nivel,count])=>`
    <div style="padding:10px;background:${fondos[nivel]};border-radius:var(--r);text-align:center;">
      <div style="font-size:9px;font-weight:700;color:${colores[nivel]};text-transform:uppercase;">${nivel}</div>
      <div style="font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${colores[nivel]};">${count}</div>
    </div>`).join('')}
  </div>`;

  // Tabla principal
  html+=`<div class="table-wrap"><table>
    <thead><tr style="background:var(--azul);">
      <th style="width:28px;text-align:center;">#</th>
      <th>Estudiante</th>
      ${headerSubs}
      <th class="center" style="background:#c0392b;color:white;">PROM.</th>
      <th class="center" style="width:52px;">Puesto</th>
    </tr></thead>
    <tbody>
    ${rows.map((row,i)=>{
      const puesto=getPuesto(row.prom);
      const promNv=nivelNota(row.prom);
      const rowBg=row.prom===null?'':row.prom>=4.6?'background:rgba(21,101,192,.05);':row.prom<3.6?'background:rgba(198,40,40,.05);':'';
      return `<tr style="${rowBg}">
        <td class="mono" style="color:var(--gris-txt);font-size:11px;text-align:center;">${String(i+1).padStart(2,'0')}</td>
        <td style="font-weight:600;font-size:13px;">${studentName(row.st)}</td>
        ${row.notas.map(n=>{
          const nv=nivelNota(n);
          const bg=n===null?'':n>=4.6?'rgba(21,101,192,.12)':n>=4.0?'rgba(46,125,50,.12)':n>=3.6?'rgba(123,88,0,.10)':'rgba(198,40,40,.12)';
          return `<td style="text-align:center;background:${bg};"><span class="nota-cell ${nv.clase}">${nv.text}</span></td>`;
        }).join('')}
        <td style="text-align:center;">
          ${row.prom!==null?`<span class="nota-cell ${promNv.clase}" style="font-size:14px;font-weight:800;">${row.prom.toFixed(2)}</span>`:`<span style="color:var(--gris-txt);">—</span>`}
        </td>
        <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:${puesto<=3?'14':'12'}px;color:${puesto<=3?'#d4a017':'var(--gris-txt)'};">
          ${puesto!=='—'?puesto+'°':'—'}
        </td>
      </tr>`;
    }).join('')}
    </tbody></table></div>
  <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;font-size:11px;align-items:center;">
    <span><span class="nota-cell nota-superior">4.8</span> Superior</span>
    <span><span class="nota-cell nota-alto">4.2</span> Alto</span>
    <span><span class="nota-cell nota-basico">3.7</span> Básico</span>
    <span><span class="nota-cell nota-bajo">2.5</span> Bajo</span>
    <span><span class="nota-cell nota-empty">—</span> Sin nota</span>

function renderRanking(){
  const period = getActivePeriod();
  document.getElementById('view-ranking').innerHTML=`
    <div class="section-title">🏅 Escala Valorativa por Curso</div>
    <div class="section-sub">Estudiantes ordenados del 1° al último por promedio — Periodo ${period}</div>
    <div class="filters-bar">
      <select id="rank-mode" onchange="buildRanking()">
        <option value="por-curso">Por curso (todos)</option>
        <option value="general">Ranking general</option>
      </select>
      <select id="rank-course" onchange="buildRanking()">
        <option value="">Todos los cursos</option>
        ${getOrderedCourses().map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
      </select>
      <select id="rank-period" onchange="buildRanking()">${getPeriodOptions(period)}</select>
      <button class="btn btn-primary" onclick="buildRanking()">🔄 Actualizar</button>
    </div>
    <div id="ranking-wrap"></div>`;
  buildRanking();
}

window.buildRanking = function(){
  if(!window._DB) return;
  const mode         = document.getElementById('rank-mode')?.value||'por-curso';
  const filterCourse = document.getElementById('rank-course')?.value||'';
  const period       = document.getElementById('rank-period')?.value||getActivePeriod();
  const wrap         = document.getElementById('ranking-wrap');
  if(!wrap) return;

  const targetCourses = filterCourse
    ? getOrderedCourses().filter(c=>c.id===filterCourse)
    : getOrderedCourses();

  // Colores y etiquetas por nivel
  const nivelColor = {
    Superior:'#1565c0', Alto:'#2e7d32', 'Básico':'#f57f17', Bajo:'#c62828', none:'#9e9e9e'
  };
  const nivelBg = {
    Superior:'var(--azul-num-bg)', Alto:'var(--verde-bg)',
    'Básico':'var(--amarillo-bg)', Bajo:'var(--rojo-bg)', none:'var(--gris-bg)'
  };

  if(mode === 'por-curso'){
    // ── MODO POR CURSO: un bloque por cada curso con tabla del 1° al último
    let html = '';

    targetCourses.forEach(course=>{
      const students   = getActiveStudents(course);
      const courseSubs = getCourseSubjects(course.id);

      // Calcular promedio de cada estudiante
      const filas = students.map((st,idx)=>{
        const notas = courseSubs.map(sub=>calcStudentGrade(course.id,sub.id,idx,period)).filter(n=>n!==null);
        const prom  = notas.length>0 ? Math.round(notas.reduce((s,v)=>s+v,0)/notas.length*100)/100 : null;
        return { name:studentName(st), prom };
      });

      // Ordenar del más alto al más bajo
      const filasOrdenadas = [...filas].sort((a,b)=>{
        if(a.prom===null && b.prom===null) return 0;
        if(a.prom===null) return 1;
        if(b.prom===null) return -1;
        return b.prom - a.prom;
      });

      // Estadísticas del curso
      const conNota   = filasOrdenadas.filter(f=>f.prom!==null);
      const promCurso = conNota.length>0 ? (conNota.reduce((s,f)=>s+f.prom,0)/conNota.length) : null;
      const dist      = {Superior:0,Alto:0,'Básico':0,Bajo:0};
      conNota.forEach(f=>{ const nv=nivelNota(f.prom); if(nv.nivel!=='none') dist[nv.nivel]++; });
      const aprueban  = conNota.filter(f=>f.prom>=3.6).length;
      const reprueban = conNota.filter(f=>f.prom<3.6).length;

      if(courseSubs.length===0){
        html+=`<div class="card" style="margin-bottom:20px;opacity:.6;">
          <div style="font-weight:800;font-size:16px;margin-bottom:4px;">${course.name}</div>
          <div style="font-size:13px;color:var(--gris-txt);">Sin materias asignadas</div>
        </div>`;
        return;
      }

      html+=`<div class="card" style="margin-bottom:24px;">

        <!-- Encabezado del curso -->
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid var(--azul);">
          <div>
            <div style="font-size:18px;font-weight:800;color:var(--azul);">${course.name}</div>
            <div style="font-size:12px;color:var(--gris-txt);margin-top:2px;">${students.length} estudiantes · ${courseSubs.length} materias · Periodo ${period}</div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            ${promCurso!==null?`<span style="background:${nivelBg[nivelNota(promCurso).nivel]};color:${nivelColor[nivelNota(promCurso).nivel]};border-radius:8px;padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;">${promCurso.toFixed(2)}</span>
            <span style="font-size:12px;color:var(--gris-txt);">Prom. curso</span>`:''}
          </div>
        </div>

        <!-- Distribución por nivel -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;">
          ${Object.entries(dist).map(([nivel,count])=>`
            <div style="text-align:center;padding:10px 6px;border-radius:8px;background:${nivelBg[nivel]};">
              <div style="font-size:20px;font-weight:800;color:${nivelColor[nivel]};">${count}</div>
              <div style="font-size:10px;font-weight:700;color:${nivelColor[nivel]};margin-top:2px;">${nivel.toUpperCase()}</div>
              <div style="font-size:10px;color:var(--gris-txt);">${conNota.length>0?Math.round(count/conNota.length*100):0}%</div>
            </div>`).join('')}
        </div>

        <!-- Tabla ranking del curso -->
        <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:40px;text-align:center;">Puesto</th>
              <th>Estudiante</th>
              <th style="text-align:center;">Promedio</th>
              <th style="text-align:center;">Nivel</th>
              <th style="min-width:120px;">Barra</th>
            </tr>
          </thead>
          <tbody>
            ${filasOrdenadas.map((fila,i)=>{
              const nv  = nivelNota(fila.prom);
              const pct = fila.prom!==null ? Math.round((fila.prom-1)/4*100) : 0;
              const medallas = ['🥇','🥈','🥉'];
              const posLabel = i<3 ? medallas[i] : `${i+1}°`;
              const posStyle = i===0?'color:#d4a017;font-size:18px;'
                             : i===1?'color:#9e9e9e;font-size:18px;'
                             : i===2?'color:#8b5e3c;font-size:18px;'
                             : 'color:var(--gris-txt);font-size:13px;';
              return `<tr>
                <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-weight:800;${posStyle}">${posLabel}</td>
                <td style="font-weight:600;">${fila.name}</td>
                <td style="text-align:center;">
                  ${fila.prom!==null
                    ?`<span class="nota-cell ${nv.clase}" style="font-size:15px;font-weight:800;">${fila.prom.toFixed(2)}</span>`
                    :`<span style="color:var(--gris-txt);font-size:12px;">Sin notas</span>`}
                </td>
                <td style="text-align:center;">
                  ${fila.prom!==null
                    ?`<span style="background:${nivelBg[nv.nivel]};color:${nivelColor[nv.nivel]};border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;">${nv.nivel}</span>`
                    :'—'}
                </td>
                <td>
                  ${fila.prom!==null?`
                  <div style="background:var(--gris-borde);border-radius:20px;height:10px;overflow:hidden;">
                    <div style="height:100%;width:${pct}%;background:${nivelColor[nv.nivel]};border-radius:20px;"></div>
                  </div>`:''}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        </div>

        <!-- Footer stats -->
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--gris-borde);font-size:12px;font-weight:600;">
          <span style="color:var(--verde);">✅ Aprueban: ${aprueban}</span>
          <span style="color:var(--rojo);">❌ Reprueban: ${reprueban}</span>
          <span style="color:var(--gris-txt);">📋 Sin nota: ${students.length-conNota.length}</span>
          <span style="color:var(--azul);">👥 Total: ${students.length}</span>
        </div>
      </div>`;
    });

    wrap.innerHTML = html || '<div class="empty-state"><div class="icon">🏅</div><p>No hay notas registradas para el periodo '+period+'</p></div>';

  } else {
    // ── MODO GENERAL: ranking de todos mezclados
    const allRows=[];
    targetCourses.forEach(course=>{
      const students   = getActiveStudents(course);
      const courseSubs = getCourseSubjects(course.id);
      students.forEach((st,idx)=>{
        const notas=courseSubs.map(sub=>calcStudentGrade(course.id,sub.id,idx,period)).filter(n=>n!==null);
        if(!notas.length) return;
        const prom=Math.round(notas.reduce((s,v)=>s+v,0)/notas.length*100)/100;
        allRows.push({name:studentName(st),courseName:course.name,prom});
      });
    });
    allRows.sort((a,b)=>b.prom-a.prom);

    if(!allRows.length){
      wrap.innerHTML='<div class="empty-state"><div class="icon">🏅</div><p>No hay notas para el periodo '+period+'</p></div>';
      return;
    }

    const dist={Superior:0,Alto:0,'Básico':0,Bajo:0};
    allRows.forEach(r=>{const nv=nivelNota(r.prom);if(nv.nivel!=='none')dist[nv.nivel]++;});

    wrap.innerHTML=`
      <div class="two-col" style="margin-bottom:20px;">
        <div class="card">
          <div style="font-weight:700;margin-bottom:12px;">📊 Distribución institucional</div>
          ${Object.entries(dist).map(([nivel,count])=>{
            const total=allRows.length,pct=total>0?Math.round(count/total*100):0;
            return `<div style="margin-bottom:10px;">
              <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:4px;">
                <span style="color:${nivelColor[nivel]};">${nivel}</span>
                <span class="mono">${count} (${pct}%)</span>
              </div>
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill" style="width:${pct}%;background:${nivelColor[nivel]};"></div>
              </div>
            </div>`;
          }).join('')}
          <div style="font-size:12px;color:var(--gris-txt);margin-top:8px;">Total: <strong>${allRows.length}</strong> estudiantes</div>
        </div>
        <div class="card">
          <div style="font-weight:700;margin-bottom:12px;">🏆 Top 5 institucional</div>
          ${allRows.slice(0,5).map((r,i)=>{
            const nv=nivelNota(r.prom);
            return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gris-borde);">
              <span style="font-size:18px;">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</span>
              <span style="flex:1;font-size:13px;font-weight:700;">${r.name}
                <br><span style="font-size:11px;color:var(--gris-txt);font-weight:400;">${r.courseName}</span>
              </span>
              <span class="nota-cell ${nv.clase}">${r.prom.toFixed(2)}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      ${allRows.map((row,i)=>{
        const nv=nivelNota(row.prom);
        const pct=Math.round((row.prom-1)/4*100);
        let posLabel=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}°`;
        return `<div class="ranking-row">
          <div class="rank-pos ${i<3?['gold','silver','bronze'][i]:'normal'}">${posLabel}</div>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:14px;">${row.name}</div>
            <div style="font-size:11px;color:var(--gris-txt);">${row.courseName}</div>
          </div>
          <div style="flex:1;padding:0 12px;">
            <div style="background:var(--gris-borde);border-radius:20px;height:8px;overflow:hidden;">
              <div style="height:100%;width:${pct}%;background:${nivelColor[nv.nivel]};border-radius:20px;"></div>
            </div>
          </div>
          <span class="nota-cell ${nv.clase}" style="font-size:15px;font-weight:800;">${row.prom.toFixed(2)}</span>
          <span style="background:${nivelBg[nv.nivel]};color:${nivelColor[nv.nivel]};border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;width:70px;text-align:center;">${nv.nivel}</span>
        </div>`;
      }).join('')}
      ${allRows.length>80?`<div style="text-align:center;padding:12px;color:var(--gris-txt);font-size:13px;">Mostrando todos (${allRows.length})</div>`:''}`;
  }
};

// VIEW: ESTADO DE DOCENTES
// ═══════════════════════════════════════════════════
function renderDocentes(){
  if(!window._DB) return;
  const { teachers=[], subjects=[], courses=[], grades={} } = window._DB;
  const period = getActivePeriod();
  let completadas=0,totalItems=0;
  const rows=[];

  teachers.forEach(teacher=>{
    const asigs=teacher.assignments||[];
    if(!asigs.length){
      rows.push({teacher,sub:null,course:null,estado:'sin-asig',pctCats:0,pctNotas:0,notasR:0,notasT:0,fuente:null});
      return;
    }
    asigs.forEach(asig=>{
      const sub   =subjects.find(s=>s.id===asig.subjectId);
      const course=courses.find(c=>c.id===asig.courseId);
      if(!sub||!course)return;
      const p2 = String(period);
      const key=gk(teacher.id,asig.subjectId,asig.courseId,p2);
      // Buscar con doble __ y simple _ para cubrir ambos formatos
      let gd = grades[key]
            || grades[`${teacher.id}_${asig.subjectId}_${asig.courseId}_${p2}`];
      if(!gd){
        const kD=`_${asig.subjectId}__${asig.courseId}_${p2}`;
        const kS=`_${asig.subjectId}_${asig.courseId}_${p2}`;
        const fk=Object.keys(grades).find(k=>k.endsWith(kD)||k.endsWith(kS));
        if(fk) gd=grades[fk];
      }
      const students=getActiveStudents(course);
      totalItems++;
      if(!gd||!gd.categories||!gd.categories.length){
        rows.push({teacher,sub,course,estado:'vacio',pctCats:0,pctNotas:0,notasR:0,notasT:0,fuente:null});
        return;
      }
      const cats=gd.categories||[];
      const vals=gd.gradeValues||{};
      const totalPct=cats.reduce((s,c)=>s+(parseFloat(c.pct)||0),0);
      const pctOk=Math.abs(totalPct-100)<=0.5;
      let notasR=0,notasT=0;
      cats.forEach(cat=>(cat.activities||[]).forEach(act=>{
        students.forEach((_,si)=>{
          notasT++;
          const v=vals[`${si}_${cat.id}_${act.id}`];
          if(v!==undefined&&v!==null&&v!=='')notasR++;
        });
      }));
      const pctNotas=notasT>0?Math.round(notasR/notasT*100):0;
      let estado;
      if(!pctOk)estado='pct-mal';
      else if(pctNotas===100){estado='listo';completadas++;}
      else estado='parcial';
      rows.push({teacher,sub,course,estado,pctCats:Math.round(totalPct),pctNotas,notasR,notasT,fuente:gd._fuente||null});
    });
  });

  const pctAvance=totalItems>0?Math.round(completadas/totalItems*100):0;
  const badge=(r)=>{
    if(r.estado==='listo')    return '<span class="badge badge-verde">✅ LISTO</span>';
    if(r.estado==='parcial')  return `<span class="badge badge-amarillo">⏳ ${r.pctNotas}%</span>`;
    if(r.estado==='pct-mal')  return `<span class="badge badge-rojo">⚠️ ${r.pctCats}%≠100</span>`;
    if(r.estado==='vacio')    return '<span class="badge badge-rojo">❌ VACÍO</span>';
    return '<span class="badge badge-gris">🔴 SIN ASIGNAR</span>';
  };
  const fuenteBadge=(f)=> f==='backup'
    ? '<span class="badge badge-naranja" title="Notas desde teacher_backups/">📦 BACKUP</span>'
    : f==='grades'
    ? '<span class="badge badge-verde" style="font-size:9px;">grades/</span>'
    : '';

  // Contar logros por docente/materia/curso
  const logros = window._DB.logros || {};
  function contarLogros(tId, sId, cId, p){
    const kD = `${tId}_${sId}__${cId}_${p}`;
    const kS = `${tId}_${sId}_${cId}_${p}`;
    const arr = (logros[kD]||[]).length>0 ? logros[kD] : (logros[kS]||[]);
    return arr.filter(x=>x&&x.text&&x.text.trim()).length;
  }

  // Contar observaciones del director
  const observations = window._DB.observations || {};
  function contarObs(cId, p){
    const key = `${cId}_${p}`;
    const obj = observations[key] || {};
    return Object.values(obj).filter(v=>(v||'').trim().length>0).length;
  }

  document.getElementById('view-docentes').innerHTML=`
    <div class="section-title">👨‍🏫 Estado de Docentes</div>
    <div class="section-sub">Avance en carga de calificaciones — Periodo ${period}
      <button class="btn btn-primary" style="margin-left:16px;padding:5px 12px;font-size:12px;" onclick="renderDocentes()">🔄 Actualizar</button>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;">Avance institucional: ${completadas}/${totalItems} materias completas</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pctAvance}%"></div></div>
        <span class="mono" style="font-weight:800;font-size:18px;">${pctAvance}%</span>
      </div>
    </div>

    <!-- Observaciones por curso -->
    <div class="card" style="margin-bottom:20px;">

function renderAlertas(){
  if(!window._DB) return;
  const { teachers=[], subjects=[], courses=[], grades={}, schoolInfo={} } = window._DB;
  const period=getActivePeriod();

  // Estructuras de alertas por categoría
  const criticos=[];      // 🔴 Bloquean el cálculo
  const advertencias=[];  // 🟡 Incompletos pero calculables
  const infos=[];         // 🟢 Todo bien

  // ── A: Alertas de backups usados
  const keysBackup=Object.entries(grades).filter(([,v])=>v._fuente==='backup');
  if(keysBackup.length>0){
    keysBackup.forEach(([k])=>{
      const tid=k.split('_')[0];
      const t=teachers.find(t2=>t2.id===tid);
      advertencias.push({
        tipo:'backup',
        msg:`<strong>${t?.name||tid}</strong> — notas leídas desde backup. Debe abrir docentes.html y presionar 💾 Guardar para sincronizar.`
      });
    });
  }

  // ── B: Recorrer cada docente y sus asignaciones
  teachers.forEach(teacher=>{
    const asigs=teacher.assignments||[];
    if(!asigs.length){
      advertencias.push({tipo:'sin-asig', msg:`<strong>${teacher.name||teacher.id}</strong> — sin materias asignadas`});
      return;
    }
    asigs.forEach(asig=>{
      const sub   =subjects.find(s=>s.id===asig.subjectId);
      const course=courses.find(c=>c.id===asig.courseId);
      if(!sub||!course)return;

      const pa = String(period);
      const key=gk(teacher.id,asig.subjectId,asig.courseId,pa);
      let gd = grades[key]
            || grades[`${teacher.id}_${asig.subjectId}_${asig.courseId}_${pa}`];
      if(!gd){
        const kD=`_${asig.subjectId}__${asig.courseId}_${pa}`;
        const kS=`_${asig.subjectId}_${asig.courseId}_${pa}`;
        const fk=Object.keys(grades).find(k=>k.endsWith(kD)||k.endsWith(kS));
        if(fk) gd=grades[fk];
      }
      const students=getActiveStudents(course);
      const label=`<strong>${teacher.name||teacher.id}</strong> — ${sub.name} <em>(${course.name})</em>`;

      // ALERTA 1: Sin categorías configuradas
      if(!gd||!gd.categories||!gd.categories.length){
        criticos.push({tipo:'sin-cats',
          msg:`${label}: ❌ Sin categorías configuradas — no se pueden calcular notas`});
        return;
      }

      const cats=gd.categories||[];
      const vals=gd.gradeValues||{};
      const totalPct=cats.reduce((s,c)=>s+(parseFloat(c.pct)||0),0);

      // ALERTA 2: Porcentajes no suman 100%
      if(Math.abs(totalPct-100)>0.5){
        criticos.push({tipo:'pct-mal',
          msg:`${label}: ⚠️ Categorías suman <strong>${Math.round(totalPct)}%</strong> en lugar de 100% — notas NO calculables hasta corregir`});
        return;
      }

      // ALERTA 3: Notas faltantes por estudiante
      let notasOk=0, notasFaltantes=0;
      const estudiantesSinNota=[];
      students.forEach((st,si)=>{
        const nota=calcStudentGrade(course.id,sub.id,si,period);
        if(nota!==null) notasOk++;
        else{
          notasFaltantes++;
          estudiantesSinNota.push(studentName(st));
        }
      });

      if(notasFaltantes===students.length){
        advertencias.push({tipo:'sin-notas',
          msg:`${label}: 0 de ${students.length} estudiantes con nota`});
      } else if(notasFaltantes>0){
        const nombres=estudiantesSinNota.slice(0,3).join(', ')+(estudiantesSinNota.length>3?` y ${estudiantesSinNota.length-3} más`:'');
        advertencias.push({tipo:'notas-parciales',
          msg:`${label}: faltan notas de <strong>${notasFaltantes} estudiante(s)</strong>: ${nombres}`});
      } else {
        infos.push(`✅ ${sub.name} — ${course.name} (${teacher.name||teacher.id}): ${students.length}/${students.length} completo`);
      }
    });
  });

  if(schoolInfo.deadline) infos.push(`📅 Periodo ${period} cierra: <strong>${schoolInfo.deadline}</strong>`);

  // ── Agrupar críticos por tipo para mejor lectura
  const criticosSinCats  = criticos.filter(a=>a.tipo==='sin-cats');
  const criticosPctMal   = criticos.filter(a=>a.tipo==='pct-mal');
  const advertBackup     = advertencias.filter(a=>a.tipo==='backup');
  const advertSinNotas   = advertencias.filter(a=>a.tipo==='sin-notas');
  const advertParciales  = advertencias.filter(a=>a.tipo==='notas-parciales');
  const advertSinAsig    = advertencias.filter(a=>a.tipo==='sin-asig');

  const renderGroup=(titulo,color,items,icon)=> items.length?`
    <div class="alert-group">
      <div class="alert-group-title" style="color:${color};">${icon} ${titulo} (${items.length})</div>
      ${items.map(a=>`<div class="alert-item ${color===_c.rojo?'alert-critico':'alert-advertencia'}">${a.msg}</div>`).join('')}
    </div>`:'';

  const _c={rojo:'var(--bajo)',amarillo:'var(--basico)',verde:'var(--verde)'};

  document.getElementById('view-alertas').innerHTML=`
    <div class="section-title">⚠️ Alertas y Problemas</div>
    <div class="section-sub">Detectados automáticamente — Periodo ${period}
      <button class="btn btn-primary" style="margin-left:16px;padding:5px 12px;font-size:12px;" onclick="renderAlertas()">🔄 Actualizar</button>
    </div>

    ${criticosPctMal.length?`<div class="alert-group">
      <div class="alert-group-title" style="color:var(--bajo);">🔴 PORCENTAJES ≠ 100% — Notas NO calculables (${criticosPctMal.length})</div>
      ${criticosPctMal.map(a=>`<div class="alert-item alert-critico">⛔ ${a.msg}</div>`).join('')}
    </div>`:''}

    ${criticosSinCats.length?`<div class="alert-group">
      <div class="alert-group-title" style="color:var(--bajo);">🔴 SIN CATEGORÍAS CONFIGURADAS (${criticosSinCats.length})</div>
      ${criticosSinCats.map(a=>`<div class="alert-item alert-critico">⛔ ${a.msg}</div>`).join('')}
    </div>`:''}

    ${advertSinNotas.length?`<div class="alert-group">
      <div class="alert-group-title" style="color:var(--basico);">🟡 MATERIAS SIN NINGUNA NOTA (${advertSinNotas.length})</div>
      ${advertSinNotas.map(a=>`<div class="alert-item alert-advertencia">⚠️ ${a.msg}</div>`).join('')}
    </div>`:''}

    ${advertParciales.length?`<div class="alert-group">
      <div class="alert-group-title" style="color:var(--basico);">🟡 NOTAS INCOMPLETAS — Faltan estudiantes (${advertParciales.length})</div>
      ${advertParciales.map(a=>`<div class="alert-item alert-advertencia">⚠️ ${a.msg}</div>`).join('')}
    </div>`:''}

    ${advertBackup.length?`<div class="alert-group">
      <div class="alert-group-title" style="color:var(--basico);">🟡 NOTAS DESDE BACKUP (${advertBackup.length})</div>
      ${advertBackup.map(a=>`<div class="alert-item alert-advertencia">⚠️ ${a.msg}</div>`).join('')}
    </div>`:''}

    ${advertSinAsig.length?`<div class="alert-group">
      <div class="alert-group-title" style="color:var(--gris-txt);">⚪ SIN ASIGNACIONES (${advertSinAsig.length})</div>
      ${advertSinAsig.map(a=>`<div class="alert-item" style="background:var(--gris-bg);border-color:var(--gris-borde);color:var(--gris-txt);">ℹ️ ${a.msg}</div>`).join('')}
    </div>`:''}

    <div class="alert-group">
      <div class="alert-group-title" style="color:var(--verde);">🟢 MATERIAS COMPLETAS (${infos.length})</div>
      ${infos.length
        ?infos.map(m=>`<div class="alert-item alert-info">✅ ${m}</div>`).join('')
        :'<div class="alert-item alert-info">ℹ️ Ninguna materia completa aún</div>'}
    </div>

    ${!criticos.length&&!advertencias.filter(a=>a.tipo!=='sin-asig').length
      ?'<div class="card" style="text-align:center;padding:30px;color:var(--verde);font-weight:700;font-size:16px;">🎉 ¡Todo completo y sin problemas!</div>':''}`;
}

window.updateCondNivel = function(idx){
  const input = document.getElementById(`cond_${idx}`);

  const val = parseFloat(input.value);
  if(!isNaN(val) && val>=1 && val<=5){
    const nv = nivelNota(Math.round(val*100)/100);
    span.className = `nota-cell ${nv.clase}`;
    span.textContent = nv.text;
  }
};

window.ponerTodos5 = function(courseId, period){
  const course   = window._DB.courses?.find(c=>c.id===courseId);
  if(!course) return;
  const students = getActiveStudents(course);
  students.forEach((_,idx)=>{
    const input = document.getElementById(`cond_${idx}`);
    if(input){ input.value='5.0'; updateCondNivel(idx); }
  });
};

window.guardarConducta = async function(courseId, period){
  const course   = window._DB.courses?.find(c=>c.id===courseId);
  if(!course) return;
  const students = getActiveStudents(course);
  const status   = document.getElementById('cond-status');

  // Recoger valores
  const conductaData = { _updatedAt: Date.now(), _updatedBy: 'admin', courseId, period };
  students.forEach((_,idx)=>{
    const input = document.getElementById(`cond_${idx}`);
    const val   = parseFloat(input?.value||'5');
    conductaData[String(idx)] = isNaN(val)?5.0:Math.min(5,Math.max(1,Math.round(val*10)/10));
  });

  if(status) status.textContent = '⏳ Guardando...';
  try {
    const docKey = `${courseId}_${period}`;
    await setDoc(doc(fireDb,'conducta',docKey), conductaData);
    if(!window._CONDUCTA) window._CONDUCTA={};
    window._CONDUCTA[docKey] = conductaData;
    if(status){
      status.textContent = '✅ Guardado correctamente';
      status.style.color = 'var(--verde)';
      setTimeout(()=>{ if(status) status.textContent=''; }, 3000);
    }
    console.log('[conducta] Guardado:', docKey, Object.keys(conductaData).length-3, 'estudiantes');
  } catch(e){
    if(status){ status.textContent='❌ Error: '+e.message; status.style.color='var(--rojo)'; }
  }
};

// Función para leer la nota de conducta de un estudiante (usada en boletín)
function getConductaNota(courseId, studentIdx, period){
  if(!window._CONDUCTA) return 5.0;
  const docKey = `${courseId}_${period}`;
  const data   = window._CONDUCTA[docKey] || {};
  const val    = parseFloat(data[String(studentIdx)]);
  return isNaN(val) ? 5.0 : val;
}

// Colores y escala
const ESCALA = [
  {level:"superior",label:"Superior",min:4.6,max:5.0,color:"#16a34a",bg:"#dcfce7"},
  {level:"alto",    label:"Alto",    min:4.0,max:4.5,color:"#2563eb",bg:"#dbeafe"},
  {level:"basico",  label:"Básico",  min:3.6,max:3.9,color:"#d97706",bg:"#fef3c7"},
  {level:"bajo",    label:"Bajo",    min:1.0,max:3.5,color:"#dc2626",bg:"#fee2e2"},
];

function getNivel(nota){
  if(nota===null||nota===undefined) return null;
  const n=parseFloat(nota);
  if(n>=4.6) return ESCALA[0];
  if(n>=4.0) return ESCALA[1];
  if(n>=3.6) return ESCALA[2];
  return ESCALA[3];
}

function isPreescolar(courseName){
  const n=(courseName||'').toUpperCase();
  return n.includes("PREKINDER")||n.includes("KINDER")||n.includes("TRANSICI");
}

function getEmoji(nivel){
  if(!nivel) return '–';
  const map={superior:'😄',alto:'🙂',basico:'😐',bajo:'😟'};
  return map[nivel.level]||'–';
}

// Contar fallas del estudiante en el periodo
function contarFallas(courseId, studentIdx, period){
  const att = window._DB?.attendance || {};
  let fallas=0, tardanzas=0, excusas=0;
  Object.keys(att).forEach(key=>{
    if(!key.startsWith(courseId+'_')) return;
    const rec = att[key] || {};
    const st  = rec[String(studentIdx)];
    const status = st?.status || st || '';
    if(status==='ausente')   fallas++;
    if(status==='tardanza')  tardanzas++;
    if(status==='excusa')    excusas++;
  });
  return {fallas, tardanzas, excusas, total:fallas+tardanzas};
}

// Obtener TODOS los logros e indicadores para una materia/nota
function getLogroIndicador(teacherId, subjectId, courseId, period, nivel){
  const logros = window._DB?.logros || {};
  const keyD = `${teacherId}_${subjectId}__${courseId}_${period}`;
  const keyS = `${teacherId}_${subjectId}_${courseId}_${period}`;
  const arr  = (logros[keyD]||[]).length>0 ? logros[keyD] : (logros[keyS]||[]);
  if(!arr.length) return {logro:'', indicador:'', todos:[]};
  // Devolver todos los logros con sus indicadores
  const todos = arr
    .filter(l=>l&&l.text&&l.text.trim())
    .map(l=>({
      texto:     l.text||'',
      indicador: nivel ? (l[nivel.level]||'') : ''
    }));
  // Compatibilidad: logro e indicador = primer elemento
  return {
    logro:     todos[0]?.texto    || '',
    indicador: todos[0]?.indicador|| '',
    todos
  };
}

window.bolUpdateEstudiantes = function(){
  if(!window._DB) return;
  const courseId = document.getElementById('bol-course')?.value;
  const course   = window._DB.courses?.find(c=>c.id===courseId);
  const sel      = document.getElementById('bol-student');
  if(!sel) return;
  const students = course ? getActiveStudents(course) : [];
  sel.innerHTML = '<option value="">— Todos —</option>' +
    students.map((s,i)=>`<option value="${i}">${studentName(s)}</option>`).join('');
};

window.verBoletin = function(){
  const courseId = document.getElementById('bol-course')?.value;
  const period   = document.getElementById('bol-period')?.value || getActivePeriod();
  const stIdx    = document.getElementById('bol-student')?.value;
  if(!courseId){alert('Selecciona un curso');return;}
  const course   = window._DB.courses?.find(c=>c.id===courseId);
  if(!course) return;
  const students = getActiveStudents(course);
  const modal    = document.getElementById('bol-modal');
  const body     = document.getElementById('bol-modal-body');
  const titulo   = document.getElementById('bol-modal-titulo');

  if(stIdx!==''&&stIdx!==null&&stIdx!==undefined){
    const idx = parseInt(stIdx);
    titulo.textContent = `Boletín — ${studentName(students[idx])}`;
    body.innerHTML = buildBoletinHTML(course, students[idx], idx, period, students);
  } else {
    titulo.textContent = `Boletines — ${course.name} (${students.length} estudiantes)`;
    body.innerHTML = students.map((st,idx)=>
      `<div style="margin-bottom:32px;">${buildBoletinHTML(course,st,idx,period,students)}</div>`
    ).join('<hr style="border:none;border-top:3px dashed #ccc;margin:0 0 32px;">');
  }

  modal.style.display='block';
  document.body.style.overflow='hidden';
};

window.imprimirTodos = function(){
  const courseId = document.getElementById('bol-course')?.value;
  const period   = document.getElementById('bol-period')?.value || getActivePeriod();
  if(!courseId){alert('Selecciona un curso');return;}
  const course   = window._DB.courses?.find(c=>c.id===courseId);
  if(!course) return;
  const students = getActiveStudents(course);
  const pages    = students.map((st,idx)=>buildBoletinHTML(course,st,idx,period,students)).join('');
  abrirVentanaImpresion(pages);
};

window.imprimirActual = function(){
  const body = document.getElementById('bol-modal-body')?.innerHTML || '';
  abrirVentanaImpresion(body);
};

function abrirVentanaImpresion(html){
  const w = window.open('','_blank','width=900,height=700');
  w.document.write(`<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0;}
      body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f2f5;padding:20px;}
      .boletin-page{page-break-after:always;}
      .boletin-page:last-child{page-break-after:avoid;}
      @media print{
        body{background:#fff;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
        .boletin-page{box-shadow:none!important;margin:0 auto!important;page-break-after:always;}
        .boletin-page:last-child{page-break-after:avoid;}
      }
    </style>
  </head><body>${html}
  <script>setTimeout(()=>{window.print();},800);<\/script>
  </body></html>`);
  w.document.close();
}

function buildBoletinHTML(course, student, studentIdx, period, allStudents){
  const { teachers=[], subjects=[], schoolInfo={}, logros={}, observations={} } = window._DB||{};
  const si  = schoolInfo;
  const pre = isPreescolar(course.name);

  // Materias del curso
  const courseSubs = getCourseSubjects(course.id);

  // Director de curso
  const director = teachers.find(t=>t.id===course.directorId);

  // Calcular notas por materia
  let periods = period==='anual' ? ['1','2','3','4'] : [String(period)];

  // Separar materias normales de especiales (Disciplina va penúltima, Conducta última)
  const subsNormales = courseSubs.filter(sub=>!MATERIAS_ESPECIALES.includes(sub.id));
  // Disciplina: buscarla en subjects globalmente (puede tener grade sin assignment)
  const subDisciplina = (window._DB.subjects||[]).find(s=>s.id===DISCIPLINA_SID);

  const materias = subsNormales.map(sub=>{
    const teacher = teachers.find(t=>(t.assignments||[]).some(a=>a.subjectId===sub.id&&a.courseId===course.id))
                 || teachers.find(t=>{
                      const kD=`_${sub.id}__${course.id}_${periods[0]}`;
                      const kS=`_${sub.id}_${course.id}_${periods[0]}`;
                      return Object.keys(window._DB.grades||{}).find(k=>k.startsWith(t.id)&&(k.endsWith(kD)||k.endsWith(kS)));
                    });

    // Calcular nota por periodo(s)
    let nota = null;
    if(period==='anual'){
      const notas=['1','2','3','4'].map(p=>calcStudentGrade(course.id,sub.id,studentIdx,p)).filter(n=>n!==null);
      nota = notas.length>0 ? Math.round(notas.reduce((s,v)=>s+v,0)/notas.length*100)/100 : null;
    } else {
      nota = calcStudentGrade(course.id,sub.id,studentIdx,period);
    }

    const nivel = getNivel(nota);
    const logroData = teacher
      ? getLogroIndicador(teacher.id, sub.id, course.id, periods[0], nivel)
      : {logro:'',indicador:'',todos:[]};

    return {sub, teacher, nota, nivel, logro:logroData.logro, indicador:logroData.indicador, todos:logroData.todos||[], especial:false};
  });

  // Agregar Disciplina (penúltima) — buscar grade directo aunque no esté en assignments
  const discGradeKey = Object.keys(window._DB.grades||{}).find(k=>
    k.includes(DISCIPLINA_SID) && k.includes(course.id) && k.endsWith('_'+periods[0])
  );
  if(subDisciplina){
    const sub = subDisciplina;
    [(sub)].forEach(sub=>{
    const teacher2 = teachers.find(t=>(t.assignments||[]).some(a=>a.subjectId===sub.id&&a.courseId===course.id))
                  || teachers.find(t=>{
                       const kD=`_${sub.id}__${course.id}_${periods[0]}`;
                       const kS=`_${sub.id}_${course.id}_${periods[0]}`;
                       return Object.keys(window._DB.grades||{}).find(k=>k.startsWith(t.id)&&(k.endsWith(kD)||k.endsWith(kS)));
                     });
    let nota2=null;
    if(period==='anual'){
      const ns=['1','2','3','4'].map(p=>calcStudentGrade(course.id,sub.id,studentIdx,p)).filter(n=>n!==null);
      nota2=ns.length>0?Math.round(ns.reduce((s,v)=>s+v,0)/ns.length*100)/100:null;
    } else {
      nota2=calcStudentGrade(course.id,sub.id,studentIdx,period);
    }
    const nivel2=getNivel(nota2);
    const {logro:logro2,indicador:indicador2}=teacher2?getLogroIndicador(teacher2.id,sub.id,course.id,periods[0],nivel2):{logro:'',indicador:''};
    const logroDat2 = teacher2?getLogroIndicador(teacher2.id,sub.id,course.id,periods[0],nivel2):{logro:'',indicador:'',todos:[]};
    materias.push({sub,teacher:teacher2||{name:'—'},nota:nota2,nivel:nivel2,logro:logroDat2.logro,indicador:logroDat2.indicador,todos:logroDat2.todos||[],especial:true});
  });
  } // fin if(subDisciplina)

  // Agregar conducta al final de materias
  const condNota = getConductaNota(course.id, studentIdx, periods[0]);
  const condNivel= getNivel(condNota);
  materias.push({
    sub:     {id:CONDUCTA_SID, name:'CONDUCTA'},
